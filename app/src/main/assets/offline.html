<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOTReader — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #b8860b;
      font-family: 'Cinzel', Georgia, serif;
      text-align: center;
      padding: 2rem;
    }
    .offline-card {
      max-width: 400px;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #a89060;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: none;
      border: 1px solid #b8860b;
      color: #b8860b;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    button:active {
      background: rgba(184, 134, 11, 0.15);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>VOTReader</h1>
    <p>You are offline. Open the app while connected to the internet to cache content for offline use.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
