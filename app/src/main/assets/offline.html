<!DOCTYPE html>
<!-- Offline fallback (U18/U19): reachable only in a NARROW window — the SW
     serves this when a navigation request misses the cache AND the network is
     down. In practice index.html is itself a CORE_ASSET (precached), so once
     the app has been opened online, navigations succeed from cache and this
     page rarely shows. It's the first-visit-while-offline / cache-evicted
     safety net, not the normal offline experience (which is the cached app
     itself — scripture reads fully offline; the Garden's GitHub-hosted images
     are the one online-only feature, by design). -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEC-1: this is the one served HTML document outside index.html's hash-locked
       CSP. It renders zero dynamic content and loads nothing external, so lock it down
       hard — no scripts at all (the retry control is a plain link, below). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <title>VOTReader — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #b8860b;
      font-family: 'Cinzel', Georgia, serif;
      text-align: center;
      padding: 2rem;
    }
    .offline-card {
      max-width: 400px;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #a89060;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry {
      display: inline-block;
      text-decoration: none;
      background: none;
      border: 1px solid #b8860b;
      color: #b8860b;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    .retry:active {
      background: rgba(184, 134, 11, 0.15);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>VOTReader</h1>
    <p>You are offline. Open the app while connected to the internet to cache content for offline use.</p>
    <a class="retry" href="./index.html">Try Again</a>
  </div>
</body>
</html>
