  <!-- CSP — defensive containment. 'self' resolves to the serving origin on
       BOTH targets — appassets.androidplatform.net (Android WebViewAssetLoader)
       and the GitHub Pages origin (web PWA) — so a single policy covers both
       with no per-platform branching (W5.2; the explicit Android host was
       redundant with 'self' there and irrelevant on the web). All script/style/
       data is self-hosted; the Garden View loads images from GitHub raw
       user-content; the only network request is an optional connectivity ping
       to thevolumesoftruth.com. unsafe-inline is required because all script and
       style lives inline in this single-file build. blob: on script-src supports
       Export "Download as JSON" via Blob URL. media-src blob: is required for
       journal voice-memo playback — recordings are captured locally and played
       back from a Blob object URL; without it every <audio> src is rejected by
       the URL safety check (no network media is unlocked — blob: only). -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' blob:;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https://raw.githubusercontent.com https://github.com;
    font-src 'self' data:;
    connect-src 'self' https://www.thevolumesoftruth.com;
    media-src blob:;
    object-src 'none';
    frame-src 'none';
    base-uri 'self';
    form-action 'none';
  " />

  <!-- Lazy-corpus loader factory. Builds a (corpus, loader) pair for one
       lazy bundle file. The corpus object exposes useSyncExternalStore-
       compatible subscribe/getVersion. The loader returns a cached Promise
       — subsequent calls share one in-flight download. On script load,
       runs the named __finish*Init() hook (which wires the corpus globals
       into any cross-corpus registries that depended on them at boot
       time) + notifies subscribers + resolves.

       Used by:
         __bibleCorpus  / __loadBibleCorpus   (Q8.1) — books.js
         __matthewCorpus / __loadMatthewCorpus (Q8.2) — matthew.js (Study)
       -->
  <script>
  window.__makeLazyLoader = function(name, bundlePath, finishFnName) {
    var corpus = {
      loaded: false,
      _promise: null,
      _listeners: new Set(),
      subscribe: function(cb) { this._listeners.add(cb); var self = this; return function() { self._listeners.delete(cb); }; },
      getVersion: function() { return this.loaded ? 1 : 0; },
      _notify: function() { this.loaded = true; this._listeners.forEach(function(cb) { try { cb(); } catch (e) { console.warn(name + '-corpus subscriber threw', e); } }); }
    };
    var load = function() {
      if (corpus._promise) return corpus._promise;
      corpus._promise = new Promise(function(resolve, reject) {
        var script = document.createElement('script');
        script.src = bundlePath;
        script.async = false;
        script.onload = function() {
          try {
            if (typeof window[finishFnName] === 'function') window[finishFnName]();
            corpus._notify();
            resolve();
          } catch (e) { reject(e); }
        };
        script.onerror = function() {
          // Reset the promise so a later retry can succeed; reject this
          // promise so the caller can show an error state.
          corpus._promise = null;
          reject(new Error('Failed to load ' + bundlePath));
        };
        document.head.appendChild(script);
      });
      return corpus._promise;
    };
    return { corpus: corpus, load: load };
  };
  (function() {
    var bible = window.__makeLazyLoader('bible', 'dist/bundle-a-bible.js', '__finishBibleInit');
    window.__bibleCorpus = bible.corpus;
    window.__loadBibleCorpus = bible.load;
    var matthew = window.__makeLazyLoader('matthew', 'dist/bundle-a-matthew.js', '__finishMatthewInit');
    window.__matthewCorpus = matthew.corpus;
    window.__loadMatthewCorpus = matthew.load;
    var vot = window.__makeLazyLoader('vot', 'dist/bundle-a-vot.js', '__finishVotInit');
    window.__votCorpus = vot.corpus;
    window.__loadVotCorpus = vot.load;
  })();
  </script>

   1. Tokenize excerpt and each paragraph into alphanumeric+apostrophe runs.

      a small budget. Stop when budget exhausted or excerpt consumed.

      matched position].
