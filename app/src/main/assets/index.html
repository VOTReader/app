/* ═══════════════════════════════════════════════════════════════
   HIGHLIGHT & LINK STORAGE
   Persistent stores backed by localStorage. Components read via
   .get()/.getForKey() and write via .add()/.remove(). A global
   hlTick state (incremented on every mutation) triggers re-renders.
═══════════════════════════════════════════════════════════════ */
/* Saturated highlight palette. Yellow first (the OG highlighter). Brown
   and gray included for low-emphasis annotations. Order matters — the
   color ROW shows them in this order. */
const HL_COLORS = ['yellow','green','pink','red','orange','blue','purple','teal','brown','gray'];

/* ── useMarkAsRead — shared hook for mark-as-read window bridge ── */
function useMarkAsRead(enabled, onMarkRead) {
  useEffect(() => {
    if (!enabled) return;
    window.__onReadingComplete = onMarkRead;
    return () => {window.__onReadingComplete = null;};
  }, [enabled, onMarkRead]);
}

/* ── CachedStore factory — shared localStorage cache/load/save ── */
function CachedStore(storageKey, defaultVal) {
  return {
    _cache: null,
    _load() {
      if (this._cache) return this._cache;
      try { this._cache = JSON.parse(localStorage.getItem(storageKey) || JSON.stringify(defaultVal)); }
      catch (e) { this._cache = typeof defaultVal === 'object' ? (Array.isArray(defaultVal) ? [] : {}) : defaultVal; }
      return this._cache;
    },
    _save() {
      try { localStorage.setItem(storageKey, JSON.stringify(this._cache)); } catch (e) { console.warn('localStorage write failed for', storageKey, e); }
    },
    raw() { return this._load(); }
  };
}

/* ── Recent navigations (LinkPicker history) ── */
const RecentNavStore = Object.assign(CachedStore('vot-recent-nav', []), {
  list() { return this._load().slice(0, 20); },
  add(item) {
    if (!item || !item.kind) return;
    let data = this._load();
    const sig = JSON.stringify({ kind: item.kind, bookId: item.bookId, chapter: item.chapter, letterId: item.letterId, entryId: item.entryId });
    data = data.filter(x => JSON.stringify({ kind: x.kind, bookId: x.bookId, chapter: x.chapter, letterId: x.letterId, entryId: x.entryId }) !== sig);
    data.unshift({ ...item, ts: Date.now() });
    data = data.slice(0, 30);
    this._cache = data;
    this._save();
  }
});

/* ── One-time migration: vot-highlights → vot-annotations + vot-notes ──
   Old shape (per-segment): { id, groupId?, color, style:'highlight'|'underline',
     text, note?, start, end, created }
   New shape (per-segment): { id, groupId, kind:'highlight'|'underline'|'note',
     color, text, start, end, created, updated }
   Notes split off into vot-notes keyed by groupId:
     { groupId, notebookIds:[], body, color, fullText, keys[], created, updated }
   The old key vot-highlights is left in place as a backup. */
function migrateAnnotations() {
  try {
    if (localStorage.getItem('vot-ann-migrated') === '1') return;
    const oldRaw = localStorage.getItem('vot-highlights');
    if (oldRaw) {
      const old = JSON.parse(oldRaw);
      const newAnn = {};
      const newNotes = {};
      Object.keys(old).forEach(function(key) {
        const segs = old[key] || [];
        // Group orphan singles by id so they each get their own groupId
        const byGroup = new Map();
        segs.forEach(function(s) {
          const gid = s.groupId || s.id;
          if (!byGroup.has(gid)) byGroup.set(gid, []);
          byGroup.get(gid).push(s);
        });
        const out = [];
        byGroup.forEach(function(entries, gid) {
          // Determine kind for the whole group: any entry with a non-empty
          // note promotes the entire group to kind:'note'.
          const hasNote = entries.some(function(e) { return e.note && e.note.trim(); });
          const kind = hasNote ? 'note' : (entries[0].style === 'underline' ? 'underline' : 'highlight');
          entries.forEach(function(e) {
            out.push({
              id: e.id, groupId: gid, kind: kind, color: e.color || 'yellow',
              start: e.start, end: e.end, text: e.text || '',
              created: e.created || Date.now(), updated: e.created || Date.now()
            });
          });
          if (hasNote) {
            // Pull the longest non-empty note as the canonical body
            const bodySrc = entries.reduce(function(acc, e) {
              const t = (e.note || '').trim();
              return t.length > acc.length ? t : acc;
            }, '');
            const fullText = entries.map(function(e) { return e.text || ''; }).join(' … ');
            newNotes[gid] = {
              groupId: gid, notebookIds: [], body: bodySrc,
              color: entries[0].color || 'yellow', fullText: fullText,
              keys: [key], created: entries[0].created || Date.now(),
              updated: entries[0].created || Date.now()
            };
          }
        });
        if (out.length) newAnn[key] = out;
      });
      localStorage.setItem('vot-annotations', JSON.stringify(newAnn));
      localStorage.setItem('vot-notes', JSON.stringify(newNotes));
    }
    localStorage.setItem('vot-ann-migrated', '1');
  } catch (e) {
    console.warn('annotation migration failed; will retry next launch', e);
  }
}
migrateAnnotations();

/* AnnotationStore — segment-level records. Aliased as HighlightStore for
   back-compat with existing call sites. Every entry has a kind field
   ('highlight' | 'underline' | 'note') and a groupId (always present;
   single-segment annotations get a unique groupId == id at create time). */
const AnnotationStore = Object.assign(CachedStore('vot-annotations', {}), {
  get(key) { return this._load()[key] || []; },
  all() { return this._load(); },
  add(key, ann) {
    if (!ann.groupId) ann.groupId = ann.id;
    if (!ann.kind) ann.kind = 'highlight';
    if (!ann.created) ann.created = Date.now();
    ann.updated = Date.now();
    const data = this._load();
    if (!data[key]) data[key] = [];
    data[key].push(ann);
    this._save();
  },
  update(key, annId, patch) {
    const data = this._load();
    const arr = data[key];
    if (!arr) return;
    const idx = arr.findIndex(h => h.id === annId);
    if (idx >= 0) { arr[idx] = { ...arr[idx], ...patch, updated: Date.now() }; this._save(); }
  },
  remove(key, annId) {
    const data = this._load();
    if (!data[key]) return;
    data[key] = data[key].filter(h => h.id !== annId);
    if (data[key].length === 0) delete data[key];
    this._save();
  },
  removeAllForKey(key) {
    const data = this._load();
    delete data[key];
    this._save();
  },
  removeGroup(groupId) {
    const data = this._load();
    Object.keys(data).forEach(k => {
      data[k] = data[k].filter(h => h.groupId !== groupId);
      if (data[k].length === 0) delete data[k];
    });
    this._cache = data;
    this._save();
  },
  getByGroup(groupId) {
    const data = this._load();
    const out = [];
    Object.keys(data).forEach(k => data[k].forEach(h => { if (h.groupId === groupId) out.push({ key: k, ann: h }); }));
    return out;
  },
  // Recolor every segment in a group to a new color. One save.
  recolorGroup(groupId, color) {
    const data = this._load();
    const ts = Date.now();
    Object.keys(data).forEach(k => data[k].forEach(h => {
      if (h.groupId === groupId) { h.color = color; h.updated = ts; }
    }));
    this._save();
  },
  // Convert a group from one kind to another (e.g. highlight → note).
  // Caller is responsible for creating/removing the corresponding NoteStore record.
  convertGroup(groupId, kind) {
    const data = this._load();
    const ts = Date.now();
    Object.keys(data).forEach(k => data[k].forEach(h => {
      if (h.groupId === groupId) { h.kind = kind; h.updated = ts; }
    }));
    this._save();
  },
  // Find the group that covers the given range in `key`, if any.
  groupAt(key, start, end) {
    const arr = this.get(key);
    const hit = arr.find(h => h.start <= start && h.end >= end);
    return hit || null;
  }
});
// Back-compat alias — existing references throughout the file still work.
const HighlightStore = AnnotationStore;

/* NoteStore — note bodies as first-class records keyed by groupId.
   A note exists iff its group's kind === 'note'. */
const NoteStore = Object.assign(CachedStore('vot-notes', {}), {
  get(groupId) { return this._load()[groupId] || null; },
  all() { return this._load(); },
  list() {
    const data = this._load();
    return Object.keys(data).map(k => data[k]).sort((a, b) => (b.updated || b.created || 0) - (a.updated || a.created || 0));
  },
  count() { return Object.keys(this._load()).length; },
  set(groupId, fields) {
    const data = this._load();
    const existing = data[groupId];
    const ts = Date.now();
    data[groupId] = {
      groupId, notebookIds: [], body: '', color: 'yellow',
      fullText: '', keys: [], created: ts,
      ...(existing || {}),
      ...fields,
      updated: ts
    };
    this._save();
  },
  update(groupId, patch) {
    const data = this._load();
    if (!data[groupId]) return;
    data[groupId] = { ...data[groupId], ...patch, updated: Date.now() };
    this._save();
  },
  remove(groupId) {
    const data = this._load();
    delete data[groupId];
    this._save();
  },
  // Toggle a notebook membership on a note. No-op if the note doesn't exist.
  toggleNotebook(groupId, notebookId) {
    const data = this._load();
    const note = data[groupId];
    if (!note) return;
    const ids = Array.isArray(note.notebookIds) ? note.notebookIds.slice() : [];
    const i = ids.indexOf(notebookId);
    if (i >= 0) ids.splice(i, 1); else ids.push(notebookId);
    data[groupId] = { ...note, notebookIds: ids, updated: Date.now() };
    this._save();
  },
  // Strip a notebook from every note (used when a notebook is deleted).
  pruneNotebook(notebookId) {
    const data = this._load();
    const ts = Date.now();
    Object.keys(data).forEach(k => {
      const ids = (data[k].notebookIds || []).filter(id => id !== notebookId);
      if (ids.length !== (data[k].notebookIds || []).length) {
        data[k] = { ...data[k], notebookIds: ids, updated: ts };
      }
    });
    this._save();
  }
});

/* NotebookStore — named buckets for grouping notes. Notebooks have
   no color (kept simple by user direction); the color belongs to the
   note. A note can live in 0, 1, or many notebooks (multi-membership
   via NoteStore.notebookIds[]). */
const NotebookStore = Object.assign(CachedStore('vot-notebooks', { list: [] }), {
  list() {
    const data = this._load();
    return (data.list || []).slice().sort((a, b) => (a.sortIndex || 0) - (b.sortIndex || 0) || (a.created || 0) - (b.created || 0));
  },
  get(id) { return (this._load().list || []).find(n => n.id === id) || null; },
  add(name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return null;
    const data = this._load();
    if (!data.list) data.list = [];
    // Dedup by case-insensitive name — return the existing notebook so
    // tapping "Create" twice (or re-creating "Devotional") never spawns
    // indistinguishable duplicate cards/tags.
    const existing = data.list.find(n => (n.name || '').trim().toLowerCase() === trimmed.toLowerCase());
    if (existing) return existing;
    const id = 'nb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const ts = Date.now();
    const nb = { id, name: trimmed, sortIndex: data.list.length, created: ts, updated: ts };
    data.list.push(nb);
    this._save();
    return nb;
  },
  rename(id, name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    const data = this._load();
    const nb = (data.list || []).find(n => n.id === id);
    if (nb) { nb.name = trimmed; nb.updated = Date.now(); this._save(); }
  },
  remove(id) {
    const data = this._load();
    data.list = (data.list || []).filter(n => n.id !== id);
    this._save();
    // Cascade: strip the deleted notebook from every note that referenced it
    NoteStore.pruneNotebook(id);
  }
});

/* ── Source label & navigation helpers ──
   Notes anchor to one or more `hlKey` values (the containers their
   segments live in). For display + navigation we need to convert
   that array into a human label like "Proverbs 2:1-3" and an
   endpoint object compatible with navigateToLink(). */
function _bookTitle(bookId) {
  if (typeof BIBLE_BOOK_LIST !== 'undefined') {
    const b = BIBLE_BOOK_LIST.find(x => x.id === bookId);
    if (b) return b.title;
  }
  // Fallback: title-case the id
  return bookId.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
}
/* Compress a sorted list of integers into "1-3, 5, 7-9" form. */
function _verseRangeLabel(nums) {
  if (!nums.length) return '';
  const sorted = [...new Set(nums)].sort((a, b) => a - b);
  const parts = [];
  let s = sorted[0], p = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === p + 1) { p = sorted[i]; continue; }
    parts.push(s === p ? String(s) : (s + '-' + p));
    s = p = sorted[i];
  }
  parts.push(s === p ? String(s) : (s + '-' + p));
  return parts.join(', ');
}
function noteSourceLabel(note) {
  const keys = note.keys || [];
  if (!keys.length) return 'Note';
  // Group by (kind, primary id, chapter where applicable)
  const first = keys[0];
  const parts0 = first.split(':');
  const kind = parts0[0];
  if (kind === 'bible' || kind === 'study') {
    // Key shapes differ:
    //   bible:bookId:chapter:verse   (4 parts)
    //   study:bookId-chapter:verse   (3 parts — chapter is fused into p[1])
    const byChap = new Map();
    keys.forEach(k => {
      const p = k.split(':');
      let book, chap, verse;
      if (kind === 'study') {
        // p[1] = "matthew-22" (book + chap fused); p[2] = verse
        book = p[1];
        chap = (p[1].match(/-(\d+)$/) || [])[1] || '';
        verse = parseInt(p[2] || '0', 10);
      } else {
        book = p[1];
        chap = p[2];
        verse = parseInt(p[3] || '0', 10);
      }
      const ck = book + ':' + chap;
      if (!byChap.has(ck)) byChap.set(ck, []);
      byChap.get(ck).push(verse);
    });
    const segs = [];
    byChap.forEach((verses, ck) => {
      const [book, chap] = ck.split(':');
      const title = kind === 'bible' ? _bookTitle(book) :
        // study key shape e.g. "matthew-22"; strip off the chapter half
        (function() {
          const m = book.match(/^(.+)-(\d+)$/);
          return m ? (m[1].charAt(0).toUpperCase() + m[1].slice(1)) : book;
        })();
      segs.push(title + ' ' + chap + ':' + _verseRangeLabel(verses.filter(Boolean)));
    });
    return segs.join(' · ');
  }
  if (kind === 'letter' || kind === 'wtlb' || kind === 'blessed' || kind === 'holy-days') {
    // The same letter spans multiple block indices — title is enough
    const id = parts0[1];
    if (typeof findEntryContext === 'function') {
      const ctx = findEntryContext(id, kind);
      if (ctx && ctx.title) return ctx.title;
    }
    return id;
  }
  if (kind === 'journal') {
    // journal:<entryId>:<blockIdx>
    const eid = parts0[1];
    const je = (typeof JournalStore !== 'undefined') ? JournalStore.get(eid) : null;
    if (je) {
      const title = (typeof JournalHelpers !== 'undefined' && JournalHelpers.entryDisplayTitle)
        ? (JournalHelpers.entryDisplayTitle(je) || 'Untitled')
        : (je.title || 'Untitled');
      return 'Journal · ' + title;
    }
    return 'Journal Entry';
  }
  return first;
}
function noteSourceNav(note) {
  const keys = note.keys || [];
  if (!keys.length) return null;
  const k = keys[0];
  const p = k.split(':');
  const kind = p[0];
  if (kind === 'bible') {
    return { type: 'bible', key: k, bookId: p[1], chapter: parseInt(p[2], 10), verse: parseInt(p[3], 10) };
  }
  if (kind === 'study') {
    const m = (p[1] || '').match(/^(.+)-(\d+)$/);
    if (m) return { type: 'study', key: k, bookId: m[1], chapter: parseInt(m[2], 10), verse: parseInt(p[2] || '0', 10) };
  }
  if (kind === 'letter' || kind === 'wtlb' || kind === 'blessed' || kind === 'holy-days') {
    // findEntryContext locates the right collection/screen for the entry id.
    const ctx = (typeof findEntryContext === 'function') ? findEntryContext(p[1], kind) : null;
    return {
      type: kind, key: k,
      letterId: p[1], entryId: p[1],
      screen: ctx ? ctx.screen : null
    };
  }
  if (kind === 'journal') {
    return {
      type: 'journal', key: k,
      entryId: p[1],
      screen: 'journal-viewer'
    };
  }
  return null;
}

  <!-- ─── JOURNAL FEATURE — segregated module set ───

/* Boundary-card short labels (default to .label when same). Used by the

/* ═══════════════════════════════════════════════════════════════
   SCRIPTURE REFERENCE PRIMITIVES
   Shared by parseScriptureRef, lookupVersesFromBooks, searchNavIndex.
═══════════════════════════════════════════════════════════════ */

function _allBooks() { return window.__ALL_BOOKS || (typeof BOOKS !== 'undefined' ? BOOKS : {}); }
function _matthew() { return (typeof window !== 'undefined' && window.MATTHEW) || (typeof MATTHEW !== 'undefined' ? MATTHEW : null); }
function _studies() { return typeof BIBLE_STUDIES !== 'undefined' ? BIBLE_STUDIES : []; }

function parseRefStr(str) {
  if (!str) return null;
  const s = str.trim();
  const tagM = s.match(/\s*\(([A-Za-z]+)\)\s*$/);
  const clean = tagM ? s.slice(0, tagM.index).trim() : s;
  const m = clean.match(/^(\d?\s*[A-Za-z][A-Za-z\s]+?)\s+(\d+)(?::(\d+)(?:\s*-\s*(\d+))?)?$/);
  if (!m) return null;
  return {
    rawBook: m[1].trim(),
    chapter: parseInt(m[2], 10),
    verse: m[3] ? parseInt(m[3], 10) : null,
    verseEnd: m[4] ? parseInt(m[4], 10) : null,
    tag: tagM ? tagM[1] : null
  };
}

function findBook(rawName) {
  if (rawName == null) return null;
  const books = _allBooks();
  const q = String(rawName).toLowerCase().replace(/\s+/g, '');
  if (!q) return null;
  for (const k of Object.keys(books)) {
    const b = books[k];
    if (!b || !b.title) continue;
    const t = b.title.toLowerCase().replace(/\s+/g, '');
    if (t === q || t.startsWith(q) || b.id === q ||
        t === q + 's' || t.replace(/s$/, '') === q.replace(/s$/, ''))
      return k;
  }
  return null;
}

function parseScriptureRef(str) {
  const p = parseRefStr(str);
  if (!p || p.verse == null) return null;
  const bookKey = findBook(p.rawBook);
  if (!bookKey) return null;
  const books = _allBooks();
  const book = books[bookKey];
  const ch = book.chapters && book.chapters.find(c => c.num === p.chapter);
  if (!ch) return null;
  const v = ch.sections && ch.sections.flatMap(s => s.verses).find(v => v.n === p.verse);
  const label = book.title + ' ' + p.chapter + ':' + p.verse + (p.verseEnd ? '-' + p.verseEnd : '');
  return { bookId: bookKey, bookTitle: book.title, chapter: p.chapter, verse: p.verse, verseEnd: p.verseEnd, label, text: v ? v.text : '' };
}

/* Resolve verse text for a link endpoint */
function resolveVerseText(endpoint) {
  if (endpoint.type === 'bible') {
    const book = _allBooks()[endpoint.bookId];
    if (!book) return endpoint.preview || '';
    const ch = book.chapters && book.chapters.find(c => c.num === endpoint.chapter);
    if (!ch) return endpoint.preview || '';
    const v = ch.sections && ch.sections.flatMap(s => s.verses).find(v => v.n === endpoint.verse);
    return v ? v.text : endpoint.preview || '';
  }
  if (endpoint.type === 'study') {
    const M = _matthew();
    if (!M) return endpoint.preview || '';
    const ch = M.chapters && M.chapters.find(c => c.num === endpoint.chapter);
    if (!ch) return endpoint.preview || '';
    if (endpoint.verse) {
      const v = ch.verses && ch.verses.find(v => v.n === endpoint.verse);
      return v ? v.text : endpoint.preview || '';
    }
    return ch.title || endpoint.preview || '';
  }
  // Letter/WTLB/Blessed/Holy-Days endpoint — preview already carries excerpt
  // text or preview text saved at link-creation time.
  return endpoint.text || endpoint.preview || '';
}

/* Resolve any letter/WTLB/Blessed/Holy-Days/Bible-Study chapter id back to
   its rendering context — collection name, screen route, and (for studies)
   the parent study slug. Used by:
   - buildSourceEndpoint:  to set screen + studyId on link source endpoints
                           so LinkSidebar can navigate back from anywhere
   - openLinkPicker:       to resolve the source label from a hlKey
   - LinkSidebar:          to show category text for non-Bible endpoints
   - LetterExcerptPicker:  to find the entry data for excerpt selection
   `kindHint` lets the caller restrict the search to a specific scope when
   the source key prefix already tells us where to look (e.g. a `blessed:`
   hlKey should never match a WTLB One entry that happens to share an id).
   Returns null if no match found. */
function findEntryContext(id, kindHint) {
  if (!id) return null;
  const cols = kindHint ? COLLECTIONS.filter(c => c.kind === kindHint) : COLLECTIONS;
  for (const col of cols) {
    const pref = colPreface(col);
    if (pref && pref.id === id) return { kind: col.kind, screen: col.letterScreen, collection: col.label, title: pref.title || id, entry: pref };
    const arr = colLetters(col);
    if (!Array.isArray(arr)) continue;
    const f = arr.find(e => e && e.id === id);
    if (f) return { kind: col.kind, screen: col.letterScreen, collection: col.label, title: f.title || id, entry: f };
  }
  // Holy Days letter-type entries are rendered via LetterView and produce
  // hlKeys with the `letter:<id>:N` prefix — so notes anchored to them
  // arrive here with kindHint === 'letter'. But their ids only exist in
  // HOLY_DAYS, not in any letter-kind collection. Fall back to a HD lookup
  // so the source label resolves and noteSourceNav can return a navigable
  // endpoint (screen === 'holy-days-entry').
  if (kindHint === 'letter') {
    const hdCol = COL_BY_KEY && COL_BY_KEY.get ? COL_BY_KEY.get('holydays') : null;
    if (hdCol) {
      const arr = colLetters(hdCol);
      if (Array.isArray(arr)) {
        const f = arr.find(e => e && e.id === id);
        if (f) return { kind: 'holy-days', screen: hdCol.letterScreen, collection: hdCol.label, title: f.title || id, entry: f };
      }
    }
  }
  if (kindHint && kindHint !== 'letter') return null;
  var _bs = _studies();
  if (_bs.length > 0) {
    for (const study of _bs) {
      if (!study || !Array.isArray(study.chapters)) continue;
      const f = study.chapters.find(c => c && c.id === id);
      if (f) return { kind: 'study-letter', screen: 'bible-study-chapter', collection: study.title || 'Bible Study', title: f.title || id, entry: f, studyId: study.slug || study.id, studyChapterId: f.id };
    }
  }
  return null;
}

/* Category label for a book — uses OT_BOOK_IDS (built from BIBLE_BOOK_LIST at line ~9568) */
var _OT_BOOKS_INLINE = new Set(['genesis','exodus','leviticus','numbers','deuteronomy','joshua','judges','ruth',
  '1samuel','2samuel','1kings','2kings','1chronicles','2chronicles','ezra','nehemiah','esther',
  'job','psalms','proverbs','ecclesiastes','songofsolomon','isaiah','jeremiah','lamentations',
  'ezekiel','daniel','hosea','joel','amos','obadiah','jonah','micah','nahum','habakkuk',
  'zephaniah','haggai','zechariah','malachi']);
function bookCategory(bookId) {
  var ot = (typeof OT_BOOK_IDS !== 'undefined') ? OT_BOOK_IDS : _OT_BOOKS_INLINE;
  return ot.has(bookId) ? 'Old Testament' : 'New Testament';
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION INDEX
   Flat list of every navigable target (Bible chapter, letter,

function buildNavIndex() {

    const abbrevs = {

      'deuteronomy': 'deut', 'joshua': 'josh', 'judges': 'judg',
      '1samuel': '1sam', '2samuel': '2sam', '1kings': '1kgs', '2kings': '2kgs',
      '1chronicles': '1chr', '2chronicles': '2chr',
      'nehemiah': 'neh', 'psalms': 'ps', 'proverbs': 'prov',
      'ecclesiastes': 'ecc', 'songofsolomon': 'song',
      'isaiah': 'isa', 'jeremiah': 'jer', 'lamentations': 'lam',
      'ezekiel': 'eze', 'daniel': 'dan', 'hosea': 'hos',
      'obadiah': 'oba', 'jonah': 'jon', 'micah': 'mic', 'nahum': 'nah',
      'habakkuk': 'hab', 'zephaniah': 'zeph', 'haggai': 'hag',
      'zechariah': 'zech', 'malachi': 'mal',
      'matthew': 'mt', 'mark': 'mk', 'luke': 'lk', 'john': 'jn',
      'romans': 'rom', '1corinthians': '1cor', '2corinthians': '2cor',
      'galatians': 'gal', 'ephesians': 'eph', 'philippians': 'phil',
      'colossians': 'col', '1thessalonians': '1thess', '2thessalonians': '2thess',
      '1timothy': '1tim', '2timothy': '2tim', 'titus': 'titus',
      'philemon': 'phlm', 'hebrews': 'heb', 'james': 'jas',
      '1peter': '1pet', '2peter': '2pet', '1john': '1jn', '2john': '2jn', '3john': '3jn',
      'jude': 'jude', 'revelation': 'rev'
    };
    const abbr = abbrevs[book.id] || titleLc.slice(0, 3);
    book.chapters.forEach(ch => {
      const aliases = [
        titleLc + ' ' + ch.num,
        titleNoSpace + ch.num,
        abbr + ' ' + ch.num,
        abbr + ch.num,
        // First-3-letters fallback
        titleLc.slice(0, 3) + ' ' + ch.num

      items.push({
        kind: 'bible-chapter',
        bookId: book.id,
        chapter: ch.num,
        label: book.title + ' ' + ch.num,
        category: bookCategory(book.id),
        title: book.title,
        aliases: aliases.map(a => a.toLowerCase())

  });

  /* Letters / entries via COLLECTIONS registry. */
  const NAV_KIND = { letter: 'letter', wtlb: 'wtlb-entry', blessed: 'blessed-entry', 'holy-days': 'holy-days-entry' };
  const VOL_NUM = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7 };
  const NAV_ALIAS_BASES = {
    timothy: ['timothy', 'tim', 'letters from timothy', 'lft'],
    flock:   ['flock', 'letters to the flock', 'lttf', 'ltf'],
    rebuke:  ['rebuke', "the lord's rebuke", 'lr', "lord's rebuke"],
    wtlb1:   ['wtlb1', 'wtlb 1', 'wtlb part one', 'words to live by 1', 'wtlb one'],
    wtlb2:   ['wtlb2', 'wtlb 2', 'wtlb part two', 'words to live by 2', 'wtlb two'],
    blessed: ['blessed', 'the blessed'],

    const vn = VOL_NUM[col.volKey];

    if (pref && pref.id) {
      const pAliases = [pref.title.toLowerCase()];
      if (vn) pAliases.push(col.label.toLowerCase() + ' preface', 'v' + vn + ' preface');
      if (bases) bases.forEach(b => pAliases.push(b + ' preface'));

        kind: navKind, collection: col.label, screen: col.letterScreen,
        letterId: pref.id, letterNum: 0,
        label: pref.title, category: category, title: pref.title, aliases: pAliases

      const aliases = [entry.title.toLowerCase()];
      if (vn && entry.num != null) {

          'v'+vn+'l'+entry.num, 'v'+vn+' l'+entry.num,
          'vol '+vn+' letter '+entry.num, 'volume '+vn+' letter '+entry.num,
          col.label.toLowerCase()+' letter '+entry.num, col.label.toLowerCase()+' '+entry.num,
          'v'+vn+' '+entry.num, 'vol'+vn+' '+entry.num);
      }
      if (bases) {
        bases.forEach(b => {
          aliases.push(b + ' ' + (entry.num != null ? entry.num : ''));
          if (entry.num != null) {
            aliases.push(b + entry.num);
            if (col.kind === 'wtlb') aliases.push(b + ' #' + entry.num);
          }
        });
      }
      const item = {
        kind: navKind, collection: col.label, screen: col.letterScreen,
        label: entry.title, category: category, title: entry.title, aliases
      };
      if (isLetter) { item.letterId = entry.id; item.letterNum = entry.num; }
      else { item.entryId = entry.id; item.entryNum = entry.num; }
      items.push(item);
    });
  }

  /* Bible / Letter Studies (non-Matthew) — More Than a Man, Lamb of God, etc.
     Each chapter is its own target since these can be linked to with verse-
     like granularity (excerpt picker handles text-range selection). */
  if (Array.isArray(window.BIBLE_STUDIES)) {
    window.BIBLE_STUDIES.forEach(study => {
      if (!study || !Array.isArray(study.chapters)) return;
      const studyKey = (study.slug || study.id || '').toLowerCase();
      const studyTitleLc = (study.title || '').toLowerCase();
      study.chapters.forEach(ch => {
        if (!ch || !ch.id) return;
        const chTitle = ch.title || ('Chapter ' + (ch.num != null ? ch.num : ch.id));
        items.push({
          kind: 'study-letter-chapter',
          collection: study.title || 'Bible Study',
          screen: 'bible-study-chapter',
          studyId: study.slug || study.id,
          studyChapterId: ch.id,
          letterId: ch.id, // for openLinkPicker compat
          chapterNum: ch.num,
          label: chTitle,
          category: 'Bible Studies',
          title: chTitle,
          aliases: [
            chTitle.toLowerCase(),
            studyTitleLc,
            studyKey + ' ' + (ch.num != null ? ch.num : ''),
            studyKey + (ch.num != null ? ch.num : '')
          ].filter(Boolean)
        });
      });
    });
  }

  /* Matthew Study Bible chapters. */
  var _m = _matthew();
  if (_m && Array.isArray(_m.chapters)) {
    _m.chapters.forEach(ch => {
      items.push({
        kind: 'study-chapter',
        bookId: 'matthew', chapter: ch.num,
        screen: 'matthew-ch',
        label: 'Matthew Study Bible — Chapter ' + ch.num + (ch.title ? ': ' + ch.title : ''),

          'matthew study ' + ch.num, 'msb ' + ch.num, 'msb' + ch.num,
          'matthew sb ' + ch.num, 'matthew study bible ' + ch.num

  }

  window.__NAV_INDEX = items;
  return items;
}

/* Parse a query string into navigation candidates.
   Returns an array of { item, score } sorted by descending score. */
function searchNavIndex(query, limit) {
  limit = limit || 30;
  if (!query) return [];
  const q = query.toLowerCase().trim();
  const items = buildNavIndex();
  const scored = [];

  /* Try Bible reference parser first (handles "Eph 6:5", "Genesis 1:1-3" etc). */
  const refP = parseRefStr(q);
  let bibleRefHit = null;
  if (refP) {
    const bookKey = findBook(refP.rawBook);
    if (bookKey) {
      const books = _allBooks();
      const bookEntry = books[bookKey];
      if (bookEntry && bookEntry.chapters) {
        const chRec = bookEntry.chapters.find(c => c.num === refP.chapter);
        if (chRec) {
          const isStudy = bookEntry.id === 'matthew';
          const lbl = bookEntry.title + ' ' + refP.chapter + (refP.verse != null ? ':' + refP.verse + (refP.verseEnd ? '-' + refP.verseEnd : '') : '');
          bibleRefHit = isStudy ? {
            kind: 'study-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            screen: 'matthew-ch', label: lbl, category: 'Study Bible', title: bookEntry.title
          } : {
            kind: 'bible-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            label: lbl, category: bookCategory(bookEntry.id), title: bookEntry.title
          };
          scored.push({ item: bibleRefHit, score: 1000 });
        }
      }
    }
  }

  /* Match against all aliases. Score by alias quality:
     - exact match: 900
     - starts-with: 700 - len-diff
     - contains: 400 - position
     - title contains: 200 */
  for (const item of items) {
    if (bibleRefHit &&
        (item.kind === 'bible-chapter' || item.kind === 'study-chapter') &&
        item.bookId === bibleRefHit.bookId && item.chapter === bibleRefHit.chapter) {
      continue; // Already added with verse info from the Bible-ref parser
    }
    let best = 0;
    for (const a of item.aliases) {
      if (a === q) { best = Math.max(best, 900); continue; }
      if (a.startsWith(q)) { best = Math.max(best, 700 - (a.length - q.length)); continue; }
      const idx = a.indexOf(q);
      if (idx >= 0) { best = Math.max(best, 400 - idx); continue; }
    }
    // Title-only contains (lowercase) — even partial title words match
    const titleLc = (item.title || '').toLowerCase();
    if (titleLc.includes(q)) best = Math.max(best, 200);
    if (best > 0) scored.push({ item: item, score: best });
  }

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, limit);
}

/* Get a verse-text preview for a nav item (Bible/study chapters only). */
function navItemPreview(it) {
  if (it.kind === 'bible-chapter') {
    const b = _allBooks()[it.bookId];
    if (!b) return '';
    const ch = b.chapters && b.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.sections && ch.sections.flatMap(s => s.verses).find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    // Show chapter title or first verse
    return (ch.sections && ch.sections[0] && ch.sections[0].heading) || '';
  }
  if (it.kind === 'study-chapter') {
    const M = _matthew();
    if (!M) return '';
    const ch = M.chapters && M.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.verses && ch.verses.find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    return ch.title || '';
  }
  return '';
}

function SelectionToolbar({ hlTick, setHlTick, onLinkRequest, onNoteRequest, onBookmarkRequest }) {
  const [visible, setVisible] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [selInfo, setSelInfo] = useState(null); // { hlKey, start, end, text, existingHl, multiVerse }
  const [activeStyle, setActiveStyle] = useState('highlight'); // 'highlight' | 'underline'
  const toolbarRef = useRef(null);
  const suppressRef = useRef(false);

  // Compute character offset of a node+offset within a data-hl-key container's text
  const computeOffset = useCallback((container, node, offset) => {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    let charPos = 0;
    while (walker.nextNode()) {
      if (walker.currentNode === node) return charPos + offset;
      charPos += walker.currentNode.textContent.length;
    }
    return charPos + offset;
  }, []);

  // Find the data-hl-key container for a DOM node
  const findHlContainer = useCallback((node) => {
    let el = node.nodeType === 3 ? node.parentElement : node;
    while (el && !el.dataset.hlKey) el = el.parentElement;
    return el;
  }, []);

  // Track whether the pointer/finger is currently down (drag in progress)
  const dragRef = useRef(false);
  // Debounce timer for selectionchange → show (handle-drag scenario)
  const selChangeTimerRef = useRef(null);
  // Track tap target and position for tap-on-mark detection
  const tapTargetRef = useRef(null);
  const tapPosRef = useRef({ x: 0, y: 0 });

  // the toolbar when the user leaves the screen — otherwise the
  // always-mounted toolbar would persist with a stale selInfo anchored
  // to a hlKey that no longer exists.
  useEffect(() => {
    window.__hideSelectionToolbar = () => {
      setVisible(false);
      try { const s = window.getSelection(); if (s) s.removeAllRanges(); } catch (e) {}
    };
    return () => { window.__hideSelectionToolbar = null; };
  }, []);

  useEffect(() => {
    // Compute and show the toolbar from the current selection
    const computeAndShow = () => {
      if (suppressRef.current) return;
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
        setVisible(false);
        return;
      }
      const range = sel.getRangeAt(0);
      // Strip .fn-ref bubbles and .hl-note-icon elements from the selection text
      // so footnote numbers and note icons don't bleed into the link preview.
      const text = (() => {
        try {
          const frag = range.cloneContents();
          frag.querySelectorAll('.fn-ref, .hl-note-icon').forEach(function(el) { el.remove(); });
          return frag.textContent.trim();
        } catch (e) {
          return sel.toString().trim();
        }
      })();
      if (!text) { setVisible(false); return; }
      const container = findHlContainer(range.startContainer);
      const endContainer = findHlContainer(range.endContainer);
      const isMultiVerse = !container || !endContainer || endContainer !== container;
      if (isMultiVerse) {
        // Cross-container selection: find all [data-hl-key] containers that overlap
        const allHlContainers = Array.from(document.querySelectorAll('[data-hl-key]'))
          .filter(function(c) { return range.intersectsNode(c); });

        setSelInfo({ hlKey: null, start: 0, end: 0, text, existingHl: null, multiVerse: true, multiContainers: allHlContainers });
      } else {
        const hlKey = container.dataset.hlKey;
        const start = computeOffset(container, range.startContainer, range.startOffset);
        const end = computeOffset(container, range.endContainer, range.endOffset);
        if (start >= end) { setVisible(false); return; }
        const existing = HighlightStore.get(hlKey).find(h => h.start <= start && h.end >= end);
        setSelInfo({ hlKey, start, end, text, existingHl: existing || null, multiVerse: false });

      const toolbarW = 320;

      if (iconEl) {
        const gid = iconEl.getAttribute('data-group-id');
        if (gid && window.__openNote) { setVisible(false); window.__openNote(gid); return; }
      }
      const mark = e.target.closest('mark.hl-mark');
      if (mark) {
        const groupId = mark.getAttribute('data-group-id') || mark.getAttribute('data-hl-id');
        const kind = mark.getAttribute('data-kind') || 'highlight';
        const container = mark.closest('[data-hl-key]');
        const hlKey = container ? container.getAttribute('data-hl-key') : null;
        if (groupId && hlKey) {

    document.addEventListener('selectionchange', onSelectionChange);
    document.addEventListener('pointerdown', onPointerDown);

    return () => {
      document.removeEventListener('selectionchange', onSelectionChange);
      document.removeEventListener('pointerdown', onPointerDown);
      document.removeEventListener('pointerup', onPointerUp);
      document.removeEventListener('touchend', onPointerUp);
      document.removeEventListener('contextmenu', onContextMenu);
    };
  }, [computeOffset, findHlContainer, hlTick]);

  const applyHighlight = useCallback((color) => {
    if (!selInfo) return;
    suppressRef.current = true;
    const kind = activeStyle === 'underline' ? 'underline' : 'highlight';
    if (selInfo.multiVerse) {

      const sel = window.getSelection();
      const range = sel && sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
      const containers = selInfo.multiContainers ||
        (range ? Array.from(document.querySelectorAll('[data-hl-key]')).filter(function(c) { return range.intersectsNode(c); }) : []);
      const groupId = hlId();
      // Recolor semantics: only remove groups whose range EXACTLY matches
      // the new selection in this container — partial overlap is preserved
      // so users can layer highlights/underlines/notes.
      const groupsToRemove = new Set();
      containers.forEach(function(container) {
        var hlKey = container.dataset.hlKey;
        var containerLen = container.textContent.length;
        var start = range && container.contains(range.startContainer)
          ? computeOffset(container, range.startContainer, range.startOffset) : 0;
        var end = range && container.contains(range.endContainer)
          ? computeOffset(container, range.endContainer, range.endOffset) : containerLen;
        AnnotationStore.get(hlKey).forEach(function(h) {
          if (h.start === start && h.end === end && h.groupId) groupsToRemove.add(h.groupId);
        });
      });
      groupsToRemove.forEach(function(gid) { AnnotationStore.removeGroup(gid); NoteStore.remove(gid); });
      // Now add the new group — snap each container's range to word boundaries
      containers.forEach(function(container) {

        var containerText = container.textContent;

        var rawStart = range && container.contains(range.startContainer)

/* ═══════════════════════════════════════════════════════════════
   LINK PICKER  — full navigation picker
   Full-height bottom sheet. Search bar at top accepts:
     - Bible refs:   "Eph 6", "Ephesians 6:5", "1 Cor 7:32-35"
     - Volume:       "v1l2", "Vol 1 Letter 2", "Volume Two 5"
     - WTLB:         "WTLB1 33", "wtlb 2 #5"
     - Direct title: "The Wide Path"
     - Free text:    fuzzy match across all titles
   Shows Recent (history) when input is empty, else ranked results.
═══════════════════════════════════════════════════════════════ */

/* Convert a nav-index item into a link endpoint object usable by LinkStore. */
function navItemToEndpoint(it) {
  if (it.kind === 'bible-chapter') {
    const hasVerse = it.verse != null;
    const key = hasVerse ? bibleHlKey(it.bookId, it.chapter, it.verse) : ('bible:' + it.bookId + ':' + it.chapter);
    return {
      type: 'bible', key,
      bookId: it.bookId, chapter: it.chapter, verse: hasVerse ? it.verse : null,
      label: it.label, preview: navItemPreview(it)
    };
  }
  if (it.kind === 'letter') {
    return {
      type: 'letter', key: 'letter:' + it.letterId + ':0',
      letterId: it.letterId, screen: it.screen, collection: it.collection,
      label: it.label, preview: ''
    };
  }
  if (it.kind === 'wtlb-entry' || it.kind === 'blessed-entry' || it.kind === 'holy-days-entry') {
    const _type = it.kind === 'holy-days-entry' ? 'holy-days' : it.kind === 'blessed-entry' ? 'blessed' : 'wtlb';
    return {
      type: _type, key: 'wtlb:' + it.entryId + ':0',
      entryId: it.entryId, screen: it.screen, collection: it.collection,
      label: it.label, preview: ''
    };
  }
  if (it.kind === 'study-chapter') {
    const v = it.verse || null;
    const key = v ? ('study:' + it.bookId + '-' + it.chapter + ':' + v) : ('study:' + it.bookId + '-' + it.chapter + ':0');
    return {
      type: 'study', key: key,
      bookId: it.bookId, chapter: it.chapter, verse: v,
      screen: it.screen || 'matthew-ch',
      label: it.label, preview: navItemPreview(it)
    };
  }
  if (it.kind === 'study-letter-chapter') {
    // Bible-study chapter (non-Matthew). The hlKey shape mirrors letters
    // (`letter:{chapterId}:0`) so per-block link icons work in LetterView,
    // which is what renders these chapters via the letterShim.
    return {
      type: 'study-letter', key: 'letter:' + it.studyChapterId + ':0',
      letterId: it.studyChapterId,
      studyId: it.studyId, studyChapterId: it.studyChapterId,
      screen: it.screen || 'bible-study-chapter',
      collection: it.collection,
      label: it.label, preview: ''
    };
  }
  return null;
}

/* Build the source endpoint object from a sourceKey + optional excerpt offsets.
   Pulled out of LinkPicker so refinement screens (verse-picker, excerpt-picker)
   can reuse the same shape when finalizing a link. */
function buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText) {
  const parts = sourceKey.split(':');
  const excerpt = sourceStart != null ? { start: sourceStart, end: sourceEnd, text: sourceText } : {};
  if (parts[0] === 'bible') {
    return { type: 'bible', key: sourceKey, bookId: parts[1], chapter: parseInt(parts[2], 10), verse: parseInt(parts[3], 10), label: sourceLabel || sourceKey };
  }
  if (parts[0] === 'study') {
    // Matthew Study Bible verse. parts[1] is "matthew-N", parts[2] is verse
    const m = parts[1].match(/^(.+)-(\d+)$/);
    const bookId = m ? m[1] : 'matthew';
    const chapter = m ? parseInt(m[2], 10) : null;
    const verse = parts[2] && parts[2] !== '0' ? parseInt(parts[2], 10) : null;
    return { type: 'study', key: sourceKey, bookId, chapter, verse, screen: 'matthew-ch', label: sourceLabel || sourceKey };
  }
  // letter / wtlb / blessed / holy-days — look up so the source endpoint
  // carries the right screen + studyId so it can be navigated back to.
  // Pass parts[0] as a kind-hint so id collisions across collections (e.g.
  // "introduction" exists in both WTLB One and The Blessed) resolve to the
  // collection that matches the source key's prefix.
  if (parts[0] === 'letter' || parts[0] === 'wtlb' || parts[0] === 'blessed' || parts[0] === 'holy-days') {
    const id = parts[1];
    const ctx = findEntryContext(id, parts[0]);
    if (ctx && ctx.kind === 'study-letter') {
      return {
        type: 'study-letter', key: sourceKey,
        letterId: id, studyId: ctx.studyId, studyChapterId: ctx.studyChapterId,
        screen: ctx.screen, collection: ctx.collection,
        label: sourceLabel || ctx.title, ...excerpt
      };
    }
    if (ctx) {
      const base = {
        type: ctx.kind, key: sourceKey, screen: ctx.screen,
        collection: ctx.collection, label: sourceLabel || ctx.title, ...excerpt
      };
      if (ctx.kind === 'letter') base.letterId = id;
      else base.entryId = id;
      return base;
    }
    // Fallback: keep prior shape so we degrade gracefully on unknown ids
    if (parts[0] === 'letter') return { type: 'letter', key: sourceKey, letterId: id, label: sourceLabel || sourceKey, ...excerpt };
    if (parts[0] === 'wtlb')   return { type: 'wtlb',   key: sourceKey, entryId: id,  label: sourceLabel || sourceKey, ...excerpt };
    return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
  }
  if (parts[0] === 'journal') {
    // journal:<entryId>:<blockIdx>  — the user's own journal entry can be
    // a link source. The endpoint navigates back to the entry viewer.
    const eid = parts[1];
    let label = sourceLabel;
    if (!label && typeof JournalStore !== 'undefined') {
      const je = JournalStore.get(eid);
      if (je && typeof JournalHelpers !== 'undefined') {
        label = 'Journal · ' + (JournalHelpers.entryDisplayTitle(je) || 'Untitled');
      }
    }
    return { type: 'journal', key: sourceKey, entryId: eid, screen: 'journal-viewer', label: label || sourceKey, ...excerpt };
  }
  return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
}

function LinkPicker({ sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, hlTick, setHlTick, onClose, onRequestRefine, lastCreatedLink, onLinkCreated, mode, onPickTarget }) {
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  // Re-read RecentNavStore every render so newly-added picks float to the top
  // without remounting the picker. Cheap localStorage read; runs at most once
  // per render.
  const [, setRecentTick] = useState(0);
  const bumpRecent = useCallback(() => setRecentTick(t => t + 1), []);
  const recent = RecentNavStore.list();
  useEffect(() => {
    if (inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
  }, []);

  // Android back button closes the picker (same save/restore pattern as every
  // other overlay in the app — picks up the previous closer on unmount).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = onClose;
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // Compute search results (or empty when input is empty)
  const results = useMemo(() => {
    if (!input.trim()) return [];
    return searchNavIndex(input.trim(), 30).map(s => s.item);
  }, [input]);

  const createLinkTo = useCallback((item) => {
    if (!item) return;
    const target = navItemToEndpoint(item);
    if (!target) return;
    RecentNavStore.add(item);

    // mode === 'card' → return the target directly without prompting for an
    // excerpt. Used by Journal's "Insert card" flow when the user only wants
    // a chapter/letter title (no body excerpt).
    if (mode === 'card' && onPickTarget) {
      onPickTarget(target, item);
      return;
    }

    // Refinement step:
    //   Bible/study chapter without a specific verse → verse picker
    //   Letter/WTLB/Blessed/Holy-Days → excerpt picker (text range)
    //   In 'excerpt' mode we ALWAYS run the picker (even for already-versed
    //   refs like "Eph 6:5") so the user can narrow further; in link/picker
    //   default mode we only refine when a chapter has no verse yet.
    const needsVersePicker =
      (target.type === 'bible' || target.type === 'study') &&
      (mode === 'excerpt' || !target.verse);
    const needsExcerptPicker =
      target.type === 'letter' || target.type === 'wtlb' ||
      target.type === 'blessed' || target.type === 'holy-days' ||
      target.type === 'study-letter';
    if (needsVersePicker || needsExcerptPicker) {
      onRequestRefine && onRequestRefine({
        kind: needsVersePicker ? 'verse' : 'excerpt',
        target, item
      });

    }

    // Source-less mode without refinement (rare — only Bible refs with both
    // book and verse pre-supplied AND not in excerpt mode). In picker mode,
    // hand the target back; in link mode, require a source to persist.
    if (mode === 'card' || mode === 'excerpt') {
      onPickTarget && onPickTarget(target, item);
      return;
    }
    if (!sourceKey) return;
    // Direct create: stay open so user can confirm (✓) or undo (×).
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, target);
    if (newLink) {
      setHlTick(t => t + 1);
      bumpRecent();
      onLinkCreated(newLink);
    }
  }, [sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, bumpRecent, onLinkCreated, mode, onPickTarget]);

  // Render a row for a nav item (used in both Results and Recent lists)
  const renderItemRow = (item, key) => {
    return React.createElement("button", {
      key: key, className: "navpick-row",
      onClick: () => createLinkTo(item)
    },
      React.createElement("div", { className: "navpick-row-icon navpick-row-icon-" + item.kind },
        item.kind === 'bible-chapter' ? (item.category === 'Old Testament' ? 'OT' : 'NT') :
        item.kind === 'study-chapter' ? 'SB' :
        item.kind === 'study-letter-chapter' ? 'LS' :
        (COL_NAV_ICON.get(item.collection) || '?')
      ),
      React.createElement("div", { className: "navpick-row-text" },
        React.createElement("div", { className: "navpick-row-label" }, item.label),
        React.createElement("div", { className: "navpick-row-cat" }, item.category || '')
      )
    );
  };

  const isEmptyQuery = !input.trim();

  return React.createElement("div", { className: "link-picker-overlay", onClick: onClose },
    React.createElement("div", { className: "link-picker-sheet navpick-sheet", onClick: e => e.stopPropagation() },
      // Header: title + red × (undo last link) + green ✓ (confirm & close)
      React.createElement("div", { className: "navpick-header" },
        React.createElement("span", { className: "navpick-title" }, mode === 'card' ? "Embed a Card" : mode === 'excerpt' ? "Embed an Excerpt" : "Link"),
        React.createElement("button", {
          className: "navpick-close navpick-close-undo",
          onClick: () => {
            if (lastCreatedLink) {
              LinkStore.remove(lastCreatedLink.id);
              onLinkCreated(null);
            }
            onClose();
          },
          "aria-label": "Cancel"
        }, "×"),
        lastCreatedLink && React.createElement("button", {
          className: "navpick-confirm-green",
          onClick: onClose,
          "aria-label": "Done"
        },
          React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement("polyline", { points: "20 6 9 17 4 12" })
          )
        )
      ),
      // Search input (rounded pill matching reference)
      React.createElement("div", { className: "navpick-search-wrap" },
        React.createElement("input", {
          ref: inputRef, className: "navpick-search-input",
          placeholder: "Search for verses, letters, or titles…",
          value: input, onChange: e => setInput(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter' && results.length > 0) createLinkTo(results[0]); }
        })

      // Body: Recent OR Results
      React.createElement("div", { className: "navpick-body" },
        isEmptyQuery ? (
          recent.length > 0 ?
            React.createElement(React.Fragment, null,
              React.createElement("div", { className: "navpick-section-label" }, "Recent"),

              React.createElement("div", { className: "navpick-empty-title" }, "Search to link"),
              React.createElement("div", { className: "navpick-empty-hint" }, "Examples: \"Eph 6:5\", \"v1l2\", \"WTLB1 33\", or a letter title.")

            )
