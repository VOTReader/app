  <!-- CSP — defensive containment. All script/style/data is self-hosted; the
       Garden View loads images from GitHub raw user-content. No external API
       calls anywhere. unsafe-inline is required because all script and style
       lives inline in this single-file build. blob: on script-src supports
       Export "Download as JSON" via Blob URL. media-src blob: is required for
       journal voice-memo playback — recordings are captured locally and played
       back from a Blob object URL; without it every <audio> src is rejected by
       the URL safety check (no network media is unlocked — blob: only). -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' https://appassets.androidplatform.net;
    script-src 'self' https://appassets.androidplatform.net 'unsafe-inline' blob:;
    style-src 'self' https://appassets.androidplatform.net 'unsafe-inline';
    img-src 'self' https://appassets.androidplatform.net data: blob: https://raw.githubusercontent.com https://github.com;
    font-src 'self' https://appassets.androidplatform.net data:;
    connect-src 'self' https://appassets.androidplatform.net https://www.thevolumesoftruth.com;
    media-src blob:;
    object-src 'none';
    frame-src 'none';
    base-uri 'self';
    form-action 'none';
  " />

   1. Tokenize excerpt and each paragraph into alphanumeric+apostrophe runs.

      token, look ahead ≤3 stream tokens for a match. Skip on mismatch up to
      a small budget. Stop when budget exhausted or excerpt consumed.

/* ═══════════════════════════════════════════════════════════════
   VOT LETTER REGISTRY
   Maps "<collection>::<letter title>" → { id, screen, activeReadKey, volKey }
   Used by matthew.js votNote tap-through to resolve the destination screen.
   Built once at load from all available letter collections.
═══════════════════════════════════════════════════════════════ */
const VOT_LETTER_REGISTRY = (() => {
  const reg = new Map();
  const add = (collection, entries, screen, volKey) => {
    if (!entries) return;
    const list = Array.isArray(entries) ? entries : [entries];
    for (const l of list) {
      if (!l || !l.title || !l.id) continue;
      reg.set(collection + "::" + l.title, { id: l.id, screen, volKey, activeReadKey: "vol:" + volKey });
    }
  };
  for (const col of COLLECTIONS) {
    const letters = colLetters(col);
    if (!letters) continue;
    const pref = colPreface(col);
    if (pref) add(col.registryLabel, pref, col.letterScreen, col.volKey);
    add(col.registryLabel, letters, col.letterScreen, col.volKey);
    // Hidden Manna: also register by exact title (vol === letter pattern in matthew.js)
    if (col.volKey === 'hm') {
      for (const l of (Array.isArray(letters) ? letters : [])) {
        if (l && l.title && l.id) reg.set(l.title + "::" + l.title, { id: l.id, screen: col.letterScreen, volKey: col.volKey, activeReadKey: "vol:" + col.volKey });
      }
    }
  }
  // Alias: matthew.js ch5:1-11 references The Blessed by its full wiki title with vol=null
  var _bArr = colLetterArr(COL_BY_KEY.get('blessed'));
  if (_bArr.length > 0) {
    const intro = _bArr.find((e) => e.id === "introduction");
    if (intro) reg.set("null::The Blessed: More Declarations of Blessedness From The Lord, Our God and Savior", { id: intro.id, screen: "blessed-entry", volKey: "blessed", activeReadKey: "vol:blessed" });
  }
  // Bible Studies — register so matthew.js votNotes can tap through
  for (const study of _studies()) {
    if (!study || !study.title || !study.slug) continue;
    const firstCh = study.chapters && study.chapters[0] || null;
    if (!firstCh) continue;
    reg.set(study.title + "::" + study.title, { id: firstCh.id, screen: "bible-study-chapter", studyId: study.slug, studyChapterId: firstCh.id, volKey: "study-" + study.slug, activeReadKey: "bible-study-" + study.slug, isStudy: true });
  }
  return reg;
})();
