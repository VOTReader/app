  <!-- CSP — defensive containment. 'self' resolves to the serving origin on
       BOTH targets — appassets.androidplatform.net (Android WebViewAssetLoader)
       and the GitHub Pages origin (web PWA) — so a single policy covers both
       with no per-platform branching (W5.2; the explicit Android host was
       redundant with 'self' there and irrelevant on the web). All script/style/
       data is self-hosted; the only outbound requests are the Garden View's
       images from GitHub (github.com 302-redirects to *.githubusercontent.com,
       so img-src keeps github.com — it's the redirect's initial hop). U21
       removed the old connectivity ping to thevolumesoftruth.com (now
       navigator.onLine, zero egress), so that host is gone from connect-src.
       SCRIPT-SRC HARDENING (U10): script-src carries NO 'unsafe-inline'. Each
       inline script element below is allowed by the sha256 of its source — the
       'sha256-…' tokens are generated + kept in sync by tools/sync-csp-hashes.js
       (build:csp + pre-commit; CI verifies with --check), so an inline-script
       edit can't silently drift the policy. Nonces are impossible on static
       hosting (no server to mint a per-response value); hashes are the only
       option. The HTML parser normalizes CR/CRLF→LF before hashing, so the same
       tokens match whether the file is served LF (Pages) or CRLF (a Windows-
       built APK). blob: was also dropped from script-src — Export uses an <a
       download> blob HREF, never a blob script (no Worker/eval).
       style-src KEEPS 'unsafe-inline' by necessity: React style={{}} emits inline
       style="" attributes app-wide, which have no static hash/nonce path.
       media-src blob: is required for journal voice-memo playback — recordings
       are captured locally and played from a Blob object URL; without it every
       <audio> src is rejected (no network media is unlocked — blob: only).
       connect-src is 'self' (SE2): the app makes ZERO document-context
       fetch/XHR (grep=0), so no remote host needs to be reachable from the
       page — the SW's own corpus fetch is same-origin + not page-CSP-governed.
       img-src KEEPS the GitHub hosts: the web Garden renders release-asset
       <img>s cross-origin (the one online-only feature). -->

  <script>
    /* ── Old-WebView polyfills — MUST be the very first script ──────────────
       minSdk 26 (Android 8) ships System WebView as old as Chromium ~58, and
       a non-Play-updated Android 9 ships Chromium 69 (verified on an API-28
       emulator). A few runtime APIs the app uses are newer than that floor,
       and an unguarded reference throws at parse/exec time and BLACK-SCREENS
       the whole app. (The esbuild `--target=chrome69` flag handles modern
       SYNTAX like ?. / ?? — these are runtime APIs it can't transpile.)
       Each polyfill is feature-detected (no-op on a modern WebView):
         - globalThis            (Chromium 71)
         - Promise.allSettled    (Chromium 76) — used by store hydration (boot)
         - Promise.any           (Chromium 85) — used by idb-adapter / health
       Kept tiny + spec-faithful; this is the one place such shims live. */
    (function(){
      if (typeof globalThis === 'undefined') {
        try {
          // Standard self-reference fallback for engines without globalThis.
          Object.defineProperty(Object.prototype, '__magic__', {
            get: function(){ return this; }, configurable: true
          });
          __magic__.globalThis = __magic__;            // eslint-disable-line
          delete Object.prototype.__magic__;
        } catch (e) {
          if (typeof window !== 'undefined') window.globalThis = window;
        }
      }
      var P = (typeof Promise !== 'undefined') ? Promise : null;
      if (P && typeof P.allSettled !== 'function') {
        P.allSettled = function(iterable){
          return P.all(Array.prototype.map.call(iterable, function(p){
            return P.resolve(p).then(
              function(v){ return { status: 'fulfilled', value: v }; },
              function(r){ return { status: 'rejected', reason: r }; }
            );
          }));
        };
      }
      if (P && typeof P.any !== 'function') {
        P.any = function(iterable){
          var arr = Array.prototype.slice.call(iterable);
          return new P(function(resolve, reject){
            if (arr.length === 0) { reject(new Error('All promises were rejected')); return; }
            var errs = new Array(arr.length), remaining = arr.length;
            arr.forEach(function(p, i){
              P.resolve(p).then(resolve, function(e){
                errs[i] = e;
                if (--remaining === 0) {
                  var agg = (typeof AggregateError === 'function')
                    ? new AggregateError(errs, 'All promises were rejected')
                    : new Error('All promises were rejected');
                  reject(agg);
                }
              });
            });
          });
        };
      }
    })();
  </script>
  <script>
    /* Resource-load error capture — feeds tools/smoke.js so the harness
       can surface stale-path / 404 regressions that the regular console
       .error capture misses (resource failures don't go through
       console.error). Runs BEFORE any other script so it catches very
       early load failures too. Zero overhead in production: just one
       event listener that pushes onto an array. */
    window.__votResourceErrs = [];
    window.addEventListener('error', function(e){
      try {
        if (e.target && e.target !== window && (e.target.src || e.target.href)) {
          window.__votResourceErrs.push({
            tag: e.target.tagName,
            url: e.target.src || e.target.href
          });
          return;
        }
        /* AUDIT-PLAN E2 — uncaught JS error (not a resource load). With no
           telemetry by policy, the in-app DiagnosticLog is the ONLY failure
           trace, and it previously captured NOTHING thrown from event handlers,
           async effects, setTimeout callbacks, or store subscribers (i.e.
           everything outside React's ErrorBoundary). DiagnosticLog lives in
           bundle-b (loaded after this), so guard on its presence; messages are
           path-sanitized by DiagnosticLog itself. */
        if (window.DiagnosticLog && window.DiagnosticLog.error) {
          var m = (e && (e.message || (e.error && e.error.message))) || 'uncaught error';
          var at = (e && e.filename) ? (' @ ' + e.filename + ':' + (e.lineno || 0)) : '';
          window.DiagnosticLog.error('uncaught', m + at);
        }
      } catch(x){}
    }, true);
    /* E2 — unhandled promise rejections (the async sibling of the above). */
    window.addEventListener('unhandledrejection', function(e){
      try {
        if (window.DiagnosticLog && window.DiagnosticLog.error) {
          var r = e && e.reason;
          var msg = (r && (r.message || (r.toString && r.toString()))) || 'unhandled rejection';
          window.DiagnosticLog.error('unhandledrejection', String(msg));
        }
      } catch(x){}
    });
  </script>

  <!-- Lazy-corpus loader factory. Builds a (corpus, loader) pair for one
       lazy bundle file. The corpus object exposes useSyncExternalStore-
       compatible subscribe/getVersion. The loader returns a cached Promise
       — subsequent calls share one in-flight download. On script load,
       runs the named __finish*Init() hook (which wires the corpus globals
       into any cross-corpus registries that depended on them at boot
       time) + notifies subscribers + resolves.

       Used by:
         __bibleCorpus   / __loadBibleCorpus   (Q8.1) — books.js
         __matthewCorpus / __loadMatthewCorpus (Q8.2) — matthew.js (Study)
         __votCorpus     / __loadVotCorpus     (Q8.3) — 14 VOT corpora
       -->
  <script>
  window.__makeLazyLoader = function(name, bundlePath, finishFnName) {
    var corpus = {
      loaded: false,
      error: false,           // E1: set when the bundle fails to load (offline / 404 / old-WebView parse error)
      _promise: null,
      _version: 0,            // monotonic; bumps on load OR error so useSyncExternalStore re-renders for both
      _listeners: new Set(),
      subscribe: function(cb) { this._listeners.add(cb); var self = this; return function() { self._listeners.delete(cb); }; },
      getVersion: function() { return this._version; },
      _bump: function() {
        this._version += 1;
        this._listeners.forEach(function(cb) { try { cb(); } catch (e) { console.warn(name + '-corpus subscriber threw', e); } });
      },
      _notify: function() { this.loaded = true; this.error = false; this._bump(); },
      _setError: function() { this.error = true; this._bump(); }
    };
    var load = function() {
      if (corpus._promise) return corpus._promise;
      // Retry: clear a prior error so subscribers flip back to the loading state.
      if (corpus.error) { corpus.error = false; corpus._bump(); }
      corpus._promise = new Promise(function(resolve, reject) {
        var t0 = Date.now();
        var script = document.createElement('script');
        script.src = bundlePath;
        script.async = false;
        script.onload = function() {
          try {
            if (typeof window[finishFnName] === 'function') window[finishFnName]();
            corpus._notify();
            // W7.4: record the lazy-load duration (download + parse + finishInit)
            // to the JS DiagnosticLog. Guarded — bundle-b (which defines it) has
            // loaded long before any user-triggered lazy load, but be safe.
            if (window.DiagnosticLog && typeof window.DiagnosticLog.timing === 'function') {
              try { window.DiagnosticLog.timing('corpus', name, Date.now() - t0); } catch (_e) {}
            }
            resolve();
          } catch (e) {
            // Script loaded but its finishInit threw — same recovery path.
            corpus._promise = null;
            corpus._setError();
            if (window.DiagnosticLog && typeof window.DiagnosticLog.error === 'function') {
              try { window.DiagnosticLog.error('corpus', 'init failed for ' + name); } catch (_e2) {}
            }
            reject(e);
          }
        };
        script.onerror = function() {
          // Reset the promise so a later retry can succeed; flag the error so
          // the route can show a retry affordance instead of a perpetual
          // spinner (E1); and leave a diagnostic trace (E3 — the success path
          // logs a timing, the failure path previously logged nothing).
          corpus._promise = null;
          corpus._setError();
          if (window.DiagnosticLog && typeof window.DiagnosticLog.error === 'function') {
            try { window.DiagnosticLog.error('corpus', 'failed to load ' + bundlePath); } catch (_e) {}
          }
          reject(new Error('Failed to load ' + bundlePath));
        };
        document.head.appendChild(script);
      });
      return corpus._promise;
    };
    return { corpus: corpus, load: load };
  };
  (function() {
    var bible = window.__makeLazyLoader('bible', 'dist/bundle-a-bible.js', '__finishBibleInit');
    window.__bibleCorpus = bible.corpus;
    window.__loadBibleCorpus = bible.load;
    var matthew = window.__makeLazyLoader('matthew', 'dist/bundle-a-matthew.js', '__finishMatthewInit');
    window.__matthewCorpus = matthew.corpus;
    window.__loadMatthewCorpus = matthew.load;
    var vot = window.__makeLazyLoader('vot', 'dist/bundle-a-vot.js', '__finishVotInit');
    window.__votCorpus = vot.corpus;
    window.__loadVotCorpus = vot.load;
  })();
  </script>
