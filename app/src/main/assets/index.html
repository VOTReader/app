/* Saturated highlight palette. Yellow first (the OG highlighter). Brown

/* ── Source label & navigation helpers ──
   Notes anchor to one or more `hlKey` values (the containers their
   segments live in). For display + navigation we need to convert
   that array into a human label like "Proverbs 2:1-3" and an
   endpoint object compatible with navigateToLink(). */
function _bookTitle(bookId) {
  if (typeof BIBLE_BOOK_LIST !== 'undefined') {
    const b = BIBLE_BOOK_LIST.find(x => x.id === bookId);
    if (b) return b.title;
  }
  // Fallback: title-case the id
  return bookId.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
}
/* Compress a sorted list of integers into "1-3, 5, 7-9" form. */
function _verseRangeLabel(nums) {
  if (!nums.length) return '';
  const sorted = [...new Set(nums)].sort((a, b) => a - b);
  const parts = [];
  let s = sorted[0], p = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === p + 1) { p = sorted[i]; continue; }
    parts.push(s === p ? String(s) : (s + '-' + p));
    s = p = sorted[i];
  }
  parts.push(s === p ? String(s) : (s + '-' + p));
  return parts.join(', ');
}
function noteSourceLabel(note) {
  const keys = note.keys || [];
  if (!keys.length) return 'Note';
  // Group by (kind, primary id, chapter where applicable)
  const first = keys[0];
  const parts0 = first.split(':');
  const kind = parts0[0];
  if (kind === 'bible' || kind === 'study') {
    // Key shapes differ:
    //   bible:bookId:chapter:verse   (4 parts)
    //   study:bookId-chapter:verse   (3 parts — chapter is fused into p[1])
    const byChap = new Map();
    keys.forEach(k => {
      const p = k.split(':');
      let book, chap, verse;
      if (kind === 'study') {
        // p[1] = "matthew-22" (book + chap fused); p[2] = verse
        book = p[1];
        chap = (p[1].match(/-(\d+)$/) || [])[1] || '';
        verse = parseInt(p[2] || '0', 10);
      } else {
        book = p[1];
        chap = p[2];
        verse = parseInt(p[3] || '0', 10);
      }
      const ck = book + ':' + chap;
      if (!byChap.has(ck)) byChap.set(ck, []);
      byChap.get(ck).push(verse);
    });
    const segs = [];
    byChap.forEach((verses, ck) => {
      const [book, chap] = ck.split(':');
      const title = kind === 'bible' ? _bookTitle(book) :
        // study key shape e.g. "matthew-22"; strip off the chapter half
        (function() {
          const m = book.match(/^(.+)-(\d+)$/);
          return m ? (m[1].charAt(0).toUpperCase() + m[1].slice(1)) : book;
        })();
      segs.push(title + ' ' + chap + ':' + _verseRangeLabel(verses.filter(Boolean)));
    });
    return segs.join(' · ');
  }
  if (kind === 'letter' || kind === 'wtlb' || kind === 'blessed' || kind === 'holy-days') {
    // The same letter spans multiple block indices — title is enough
    const id = parts0[1];
    if (typeof findEntryContext === 'function') {
      const ctx = findEntryContext(id, kind);
      if (ctx && ctx.title) return ctx.title;
    }
    return id;
  }
  if (kind === 'journal') {
    // journal:<entryId>:<blockIdx>
    const eid = parts0[1];
    const je = (typeof JournalStore !== 'undefined') ? JournalStore.get(eid) : null;
    if (je) {
      const title = (typeof JournalHelpers !== 'undefined' && JournalHelpers.entryDisplayTitle)
        ? (JournalHelpers.entryDisplayTitle(je) || 'Untitled')
        : (je.title || 'Untitled');
      return 'Journal · ' + title;
    }
    return 'Journal Entry';
  }
  return first;
}
function noteSourceNav(note) {
  const keys = note.keys || [];
  if (!keys.length) return null;
  const k = keys[0];
  const p = k.split(':');
  const kind = p[0];
  if (kind === 'bible') {
    return { type: 'bible', key: k, bookId: p[1], chapter: parseInt(p[2], 10), verse: parseInt(p[3], 10) };
  }
  if (kind === 'study') {
    const m = (p[1] || '').match(/^(.+)-(\d+)$/);
    if (m) return { type: 'study', key: k, bookId: m[1], chapter: parseInt(m[2], 10), verse: parseInt(p[2] || '0', 10) };
  }
  if (kind === 'letter' || kind === 'wtlb' || kind === 'blessed' || kind === 'holy-days') {
    // findEntryContext locates the right collection/screen for the entry id.
    const ctx = (typeof findEntryContext === 'function') ? findEntryContext(p[1], kind) : null;
    return {
      type: kind, key: k,
      letterId: p[1], entryId: p[1],
      screen: ctx ? ctx.screen : null
    };
  }
  if (kind === 'journal') {
    return {
      type: 'journal', key: k,
      entryId: p[1],
      screen: 'journal-viewer'
    };
  }
  return null;
}

/* Category label for a book — uses OT_BOOK_IDS (built from BIBLE_BOOK_LIST at line ~9568) */
var _OT_BOOKS_INLINE = new Set(['genesis','exodus','leviticus','numbers','deuteronomy','joshua','judges','ruth',

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION INDEX
   Flat list of every navigable target (Bible chapter, letter,
   WTLB entry, study chapter, etc.) with aliases for shortcut
   matching. Built lazily, cached on window.__NAV_INDEX.
═══════════════════════════════════════════════════════════════ */
function buildNavIndex() {
  if (window.__NAV_INDEX) return window.__NAV_INDEX;
  const items = [];

  /* Bible books → chapters. Each book gets a chapter-level entry. */
  const books = _allBooks();
  Object.values(books).forEach(book => {
    if (!book || !book.chapters) return;
    const titleLc = book.title.toLowerCase();
    const titleNoSpace = titleLc.replace(/\s+/g, '');
    // Common abbreviations (a few hand-picked; full list isn't needed because
    // matching tolerates leading-N + first-3-letters)
    const abbrevs = {
      'genesis': 'gen', 'exodus': 'exo', 'leviticus': 'lev', 'numbers': 'num',
      'deuteronomy': 'deut', 'joshua': 'josh', 'judges': 'judg',
      '1samuel': '1sam', '2samuel': '2sam', '1kings': '1kgs', '2kings': '2kgs',
      '1chronicles': '1chr', '2chronicles': '2chr',
      'nehemiah': 'neh', 'psalms': 'ps', 'proverbs': 'prov',
      'ecclesiastes': 'ecc', 'songofsolomon': 'song',
      'isaiah': 'isa', 'jeremiah': 'jer', 'lamentations': 'lam',
      'ezekiel': 'eze', 'daniel': 'dan', 'hosea': 'hos',
      'obadiah': 'oba', 'jonah': 'jon', 'micah': 'mic', 'nahum': 'nah',
      'habakkuk': 'hab', 'zephaniah': 'zeph', 'haggai': 'hag',
      'zechariah': 'zech', 'malachi': 'mal',
      'matthew': 'mt', 'mark': 'mk', 'luke': 'lk', 'john': 'jn',
      'romans': 'rom', '1corinthians': '1cor', '2corinthians': '2cor',
      'galatians': 'gal', 'ephesians': 'eph', 'philippians': 'phil',
      'colossians': 'col', '1thessalonians': '1thess', '2thessalonians': '2thess',
      '1timothy': '1tim', '2timothy': '2tim', 'titus': 'titus',
      'philemon': 'phlm', 'hebrews': 'heb', 'james': 'jas',
      '1peter': '1pet', '2peter': '2pet', '1john': '1jn', '2john': '2jn', '3john': '3jn',
      'jude': 'jude', 'revelation': 'rev'
    };
    const abbr = abbrevs[book.id] || titleLc.slice(0, 3);
    book.chapters.forEach(ch => {
      const aliases = [
        titleLc + ' ' + ch.num,
        titleNoSpace + ch.num,
        abbr + ' ' + ch.num,
        abbr + ch.num,
        // First-3-letters fallback
        titleLc.slice(0, 3) + ' ' + ch.num
      ];
      items.push({
        kind: 'bible-chapter',
        bookId: book.id,
        chapter: ch.num,
        label: book.title + ' ' + ch.num,
        category: bookCategory(book.id),
        title: book.title,
        aliases: aliases.map(a => a.toLowerCase())
      });
    });
  });

  /* Letters / entries via COLLECTIONS registry. */
  const NAV_KIND = { letter: 'letter', wtlb: 'wtlb-entry', blessed: 'blessed-entry', 'holy-days': 'holy-days-entry' };
  const VOL_NUM = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7 };
  const NAV_ALIAS_BASES = {
    timothy: ['timothy', 'tim', 'letters from timothy', 'lft'],
    flock:   ['flock', 'letters to the flock', 'lttf', 'ltf'],
    rebuke:  ['rebuke', "the lord's rebuke", 'lr', "lord's rebuke"],
    wtlb1:   ['wtlb1', 'wtlb 1', 'wtlb part one', 'words to live by 1', 'wtlb one'],
    wtlb2:   ['wtlb2', 'wtlb 2', 'wtlb part two', 'words to live by 2', 'wtlb two'],
    blessed: ['blessed', 'the blessed'],
    holydays:['holy days', 'hd']
  };

  for (const col of COLLECTIONS) {
    if (col.volKey === 'hm') continue;
    const navKind = NAV_KIND[col.kind] || 'letter';
    const isLetter = navKind === 'letter';
    const vn = VOL_NUM[col.volKey];
    const bases = NAV_ALIAS_BASES[col.volKey];
    const category = col.volKey === 'holydays' ? 'Holy Days' : col.label;

    const pref = colPreface(col);
    if (pref && pref.id) {
      const pAliases = [pref.title.toLowerCase()];
      if (vn) pAliases.push(col.label.toLowerCase() + ' preface', 'v' + vn + ' preface');
      if (bases) bases.forEach(b => pAliases.push(b + ' preface'));
      items.push({
        kind: navKind, collection: col.label, screen: col.letterScreen,
        letterId: pref.id, letterNum: 0,
        label: pref.title, category: category, title: pref.title, aliases: pAliases
      });
    }

    colLetterArr(col).forEach(entry => {
      const aliases = [entry.title.toLowerCase()];
      if (vn && entry.num != null) {
        aliases.push(
          'v'+vn+'l'+entry.num, 'v'+vn+' l'+entry.num,
          'vol '+vn+' letter '+entry.num, 'volume '+vn+' letter '+entry.num,
          col.label.toLowerCase()+' letter '+entry.num, col.label.toLowerCase()+' '+entry.num,
          'v'+vn+' '+entry.num, 'vol'+vn+' '+entry.num);
      }
      if (bases) {
        bases.forEach(b => {
          aliases.push(b + ' ' + (entry.num != null ? entry.num : ''));
          if (entry.num != null) {
            aliases.push(b + entry.num);
            if (col.kind === 'wtlb') aliases.push(b + ' #' + entry.num);
          }
        });
      }
      const item = {
        kind: navKind, collection: col.label, screen: col.letterScreen,
        label: entry.title, category: category, title: entry.title, aliases
      };
      if (isLetter) { item.letterId = entry.id; item.letterNum = entry.num; }
      else { item.entryId = entry.id; item.entryNum = entry.num; }
      items.push(item);
    });
  }

  /* Bible / Letter Studies (non-Matthew) — More Than a Man, Lamb of God, etc.
     Each chapter is its own target since these can be linked to with verse-
     like granularity (excerpt picker handles text-range selection). */
  if (Array.isArray(window.BIBLE_STUDIES)) {
    window.BIBLE_STUDIES.forEach(study => {
      if (!study || !Array.isArray(study.chapters)) return;
      const studyKey = (study.slug || study.id || '').toLowerCase();
      const studyTitleLc = (study.title || '').toLowerCase();
      study.chapters.forEach(ch => {
        if (!ch || !ch.id) return;
        const chTitle = ch.title || ('Chapter ' + (ch.num != null ? ch.num : ch.id));
        items.push({
          kind: 'study-letter-chapter',
          collection: study.title || 'Bible Study',
          screen: 'bible-study-chapter',
          studyId: study.slug || study.id,
          studyChapterId: ch.id,
          letterId: ch.id, // for openLinkPicker compat
          chapterNum: ch.num,
          label: chTitle,
          category: 'Bible Studies',
          title: chTitle,
          aliases: [
            chTitle.toLowerCase(),
            studyTitleLc,
            studyKey + ' ' + (ch.num != null ? ch.num : ''),
            studyKey + (ch.num != null ? ch.num : '')
          ].filter(Boolean)
        });
      });
    });
  }

  /* Matthew Study Bible chapters. */
  var _m = _matthew();
  if (_m && Array.isArray(_m.chapters)) {
    _m.chapters.forEach(ch => {
      items.push({
        kind: 'study-chapter',
        bookId: 'matthew', chapter: ch.num,
        screen: 'matthew-ch',
        label: 'Matthew Study Bible — Chapter ' + ch.num + (ch.title ? ': ' + ch.title : ''),
        category: 'Bible Studies', title: ch.title || ('Chapter ' + ch.num),
        aliases: [
          'matthew study ' + ch.num, 'msb ' + ch.num, 'msb' + ch.num,
          'matthew sb ' + ch.num, 'matthew study bible ' + ch.num
        ]
      });
    });
  }

  window.__NAV_INDEX = items;
  return items;
}

/* Parse a query string into navigation candidates.
   Returns an array of { item, score } sorted by descending score. */
function searchNavIndex(query, limit) {
  limit = limit || 30;
  if (!query) return [];
  const q = query.toLowerCase().trim();
  const items = buildNavIndex();
  const scored = [];

  /* Try Bible reference parser first (handles "Eph 6:5", "Genesis 1:1-3" etc). */
  const refP = parseRefStr(q);
  let bibleRefHit = null;
  if (refP) {
    const bookKey = findBook(refP.rawBook);
    if (bookKey) {
      const books = _allBooks();
      const bookEntry = books[bookKey];
      if (bookEntry && bookEntry.chapters) {
        const chRec = bookEntry.chapters.find(c => c.num === refP.chapter);
        if (chRec) {
          const isStudy = bookEntry.id === 'matthew';
          const lbl = bookEntry.title + ' ' + refP.chapter + (refP.verse != null ? ':' + refP.verse + (refP.verseEnd ? '-' + refP.verseEnd : '') : '');
          bibleRefHit = isStudy ? {
            kind: 'study-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            screen: 'matthew-ch', label: lbl, category: 'Study Bible', title: bookEntry.title
          } : {
            kind: 'bible-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            label: lbl, category: bookCategory(bookEntry.id), title: bookEntry.title
          };
          scored.push({ item: bibleRefHit, score: 1000 });
        }
      }
    }
  }

  /* Match against all aliases. Score by alias quality:
     - exact match: 900
     - starts-with: 700 - len-diff
     - contains: 400 - position
     - title contains: 200 */
  for (const item of items) {
    if (bibleRefHit &&
        (item.kind === 'bible-chapter' || item.kind === 'study-chapter') &&
        item.bookId === bibleRefHit.bookId && item.chapter === bibleRefHit.chapter) {
      continue; // Already added with verse info from the Bible-ref parser
    }
    let best = 0;
    for (const a of item.aliases) {
      if (a === q) { best = Math.max(best, 900); continue; }
      if (a.startsWith(q)) { best = Math.max(best, 700 - (a.length - q.length)); continue; }
      const idx = a.indexOf(q);
      if (idx >= 0) { best = Math.max(best, 400 - idx); continue; }
    }
    // Title-only contains (lowercase) — even partial title words match
    const titleLc = (item.title || '').toLowerCase();
    if (titleLc.includes(q)) best = Math.max(best, 200);
    if (best > 0) scored.push({ item: item, score: best });
  }

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, limit);
}

/* Get a verse-text preview for a nav item (Bible/study chapters only). */
function navItemPreview(it) {
  if (it.kind === 'bible-chapter') {
    const b = _allBooks()[it.bookId];
    if (!b) return '';
    const ch = b.chapters && b.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.sections && ch.sections.flatMap(s => s.verses).find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    // Show chapter title or first verse
    return (ch.sections && ch.sections[0] && ch.sections[0].heading) || '';
  }
  if (it.kind === 'study-chapter') {
    const M = _matthew();
    if (!M) return '';
    const ch = M.chapters && M.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.verses && ch.verses.find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    return ch.title || '';
  }
  return '';
}

function SelectionToolbar({ hlTick, setHlTick, onLinkRequest, onNoteRequest, onBookmarkRequest }) {
  const [visible, setVisible] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [selInfo, setSelInfo] = useState(null); // { hlKey, start, end, text, existingHl, multiVerse }
  const [activeStyle, setActiveStyle] = useState('highlight'); // 'highlight' | 'underline'
  const toolbarRef = useRef(null);
  const suppressRef = useRef(false);

  // Compute character offset of a node+offset within a data-hl-key container's text
  const computeOffset = useCallback((container, node, offset) => {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    let charPos = 0;
    while (walker.nextNode()) {
      if (walker.currentNode === node) return charPos + offset;
      charPos += walker.currentNode.textContent.length;
    }
    return charPos + offset;
  }, []);

  // Find the data-hl-key container for a DOM node
  const findHlContainer = useCallback((node) => {
    let el = node.nodeType === 3 ? node.parentElement : node;
    while (el && !el.dataset.hlKey) el = el.parentElement;
    return el;
  }, []);

  // Track whether the pointer/finger is currently down (drag in progress)
  const dragRef = useRef(false);
  // Debounce timer for selectionchange → show (handle-drag scenario)
  const selChangeTimerRef = useRef(null);
  // Track tap target and position for tap-on-mark detection
  const tapTargetRef = useRef(null);
  const tapPosRef = useRef({ x: 0, y: 0 });

  // Expose a hide bridge so the App-level navigation effect can dismiss
  // the toolbar when the user leaves the screen — otherwise the
  // always-mounted toolbar would persist with a stale selInfo anchored
  // to a hlKey that no longer exists.
  useEffect(() => {
    window.__hideSelectionToolbar = () => {
      setVisible(false);
      try { const s = window.getSelection(); if (s) s.removeAllRanges(); } catch (e) {}
    };
    return () => { window.__hideSelectionToolbar = null; };
  }, []);

  useEffect(() => {
    // Compute and show the toolbar from the current selection
    const computeAndShow = () => {
      if (suppressRef.current) return;
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
        setVisible(false);
        return;
      }
      const range = sel.getRangeAt(0);
      // Strip .fn-ref bubbles and .hl-note-icon elements from the selection text
      // so footnote numbers and note icons don't bleed into the link preview.
      const text = (() => {
        try {
          const frag = range.cloneContents();
          frag.querySelectorAll('.fn-ref, .hl-note-icon').forEach(function(el) { el.remove(); });
          return frag.textContent.trim();
        } catch (e) {
          return sel.toString().trim();
        }
      })();
      if (!text) { setVisible(false); return; }
      const container = findHlContainer(range.startContainer);
      const endContainer = findHlContainer(range.endContainer);
      const isMultiVerse = !container || !endContainer || endContainer !== container;
      if (isMultiVerse) {
        // Cross-container selection: find all [data-hl-key] containers that overlap
        const allHlContainers = Array.from(document.querySelectorAll('[data-hl-key]'))
          .filter(function(c) { return range.intersectsNode(c); });
        if (allHlContainers.length === 0) { setVisible(false); return; }
        setSelInfo({ hlKey: null, start: 0, end: 0, text, existingHl: null, multiVerse: true, multiContainers: allHlContainers });
      } else {
        const hlKey = container.dataset.hlKey;
        const start = computeOffset(container, range.startContainer, range.startOffset);
        const end = computeOffset(container, range.endContainer, range.endOffset);
        if (start >= end) { setVisible(false); return; }
        const existing = HighlightStore.get(hlKey).find(h => h.start <= start && h.end >= end);
        setSelInfo({ hlKey, start, end, text, existingHl: existing || null, multiVerse: false });

      const rect = range.getBoundingClientRect();
      const toolbarW = 320;
      let x = rect.left + rect.width / 2 - toolbarW / 2;

      if (!sel || sel.isCollapsed || sel.rangeCount === 0) {

          }

        // adjustment. Debounce so we wait for the user to finish dragging.

      const iconEl = e.target.closest('.hl-note-icon');
      if (iconEl) {
        const gid = iconEl.getAttribute('data-group-id');
        if (gid && window.__openNote) { setVisible(false); window.__openNote(gid); return; }
      }
      const mark = e.target.closest('mark.hl-mark');
      if (mark) {
        const groupId = mark.getAttribute('data-group-id') || mark.getAttribute('data-hl-id');
        const kind = mark.getAttribute('data-kind') || 'highlight';
        const container = mark.closest('[data-hl-key]');
        const hlKey = container ? container.getAttribute('data-hl-key') : null;
        if (groupId && hlKey) {
          setVisible(false);
          if (kind === 'note' && window.__openNote) { window.__openNote(groupId); return; }

        }

    };

    document.addEventListener('selectionchange', onSelectionChange);
    document.addEventListener('pointerdown', onPointerDown);

    document.addEventListener('touchend', onPointerUp);
    document.addEventListener('contextmenu', onContextMenu);

    return () => {
      document.removeEventListener('selectionchange', onSelectionChange);
      document.removeEventListener('pointerdown', onPointerDown);
      document.removeEventListener('pointerup', onPointerUp);
      document.removeEventListener('touchend', onPointerUp);
      document.removeEventListener('contextmenu', onContextMenu);
    };
  }, [computeOffset, findHlContainer, hlTick]);

  const applyHighlight = useCallback((color) => {
    if (!selInfo) return;
    suppressRef.current = true;
    const kind = activeStyle === 'underline' ? 'underline' : 'highlight';
    if (selInfo.multiVerse) {
      // Multi-container: all spans share ONE groupId so they act as one annotation
      const sel = window.getSelection();
      const range = sel && sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
      const containers = selInfo.multiContainers ||
        (range ? Array.from(document.querySelectorAll('[data-hl-key]')).filter(function(c) { return range.intersectsNode(c); }) : []);
      const groupId = hlId();
      // Recolor semantics: only remove groups whose range EXACTLY matches
      // the new selection in this container — partial overlap is preserved
      // so users can layer highlights/underlines/notes.
      const groupsToRemove = new Set();
      containers.forEach(function(container) {
        var hlKey = container.dataset.hlKey;
        var containerLen = container.textContent.length;
        var start = range && container.contains(range.startContainer)
          ? computeOffset(container, range.startContainer, range.startOffset) : 0;
        var end = range && container.contains(range.endContainer)
          ? computeOffset(container, range.endContainer, range.endOffset) : containerLen;
        AnnotationStore.get(hlKey).forEach(function(h) {
          if (h.start === start && h.end === end && h.groupId) groupsToRemove.add(h.groupId);
        });
      });
      groupsToRemove.forEach(function(gid) { AnnotationStore.removeGroup(gid); NoteStore.remove(gid); });
      // Now add the new group — snap each container's range to word boundaries
      containers.forEach(function(container) {
        var hlKey = container.dataset.hlKey;
        var containerText = container.textContent;
        var containerLen = containerText.length;
        var rawStart = range && container.contains(range.startContainer)
          ? computeOffset(container, range.startContainer, range.startOffset) : 0;
        var rawEnd = range && container.contains(range.endContainer)
          ? computeOffset(container, range.endContainer, range.endOffset) : containerLen;
        var snap = snapRangeToWords(containerText, rawStart, rawEnd);
        if (snap.start >= snap.end) return;
        AnnotationStore.add(hlKey, {
          id: hlId(), groupId: groupId, kind: kind,
          start: snap.start, end: snap.end, color: color,
          text: containerText.slice(snap.start, snap.end),
          created: Date.now()

      // Single container — only remove EXACT-RANGE matches (recolor flow).
      // Partial overlap stacks: the user can layer multiple highlights,
      // underlines, and notes on the same passage. Range snaps to whole-word
      // boundaries first so the visual mark never lands mid-word.

function LinkSidebar({ hlKey, hlTick, setHlTick, onClose, onNavigate }) {

/* ═══════════════════════════════════════════════════════════════
   LINK PICKER  — full navigation picker
   Full-height bottom sheet. Search bar at top accepts:
     - Bible refs:   "Eph 6", "Ephesians 6:5", "1 Cor 7:32-35"
     - Volume:       "v1l2", "Vol 1 Letter 2", "Volume Two 5"
     - WTLB:         "WTLB1 33", "wtlb 2 #5"
     - Direct title: "The Wide Path"
     - Free text:    fuzzy match across all titles
   Shows Recent (history) when input is empty, else ranked results.
═══════════════════════════════════════════════════════════════ */

/* Convert a nav-index item into a link endpoint object usable by LinkStore. */
function navItemToEndpoint(it) {
  if (it.kind === 'bible-chapter') {
    const hasVerse = it.verse != null;
    const key = hasVerse ? bibleHlKey(it.bookId, it.chapter, it.verse) : ('bible:' + it.bookId + ':' + it.chapter);
    return {
      type: 'bible', key,
      bookId: it.bookId, chapter: it.chapter, verse: hasVerse ? it.verse : null,
      label: it.label, preview: navItemPreview(it)
    };
  }
  if (it.kind === 'letter') {
    return {
      type: 'letter', key: 'letter:' + it.letterId + ':0',
      letterId: it.letterId, screen: it.screen, collection: it.collection,
      label: it.label, preview: ''
    };
  }
  if (it.kind === 'wtlb-entry' || it.kind === 'blessed-entry' || it.kind === 'holy-days-entry') {
    const _type = it.kind === 'holy-days-entry' ? 'holy-days' : it.kind === 'blessed-entry' ? 'blessed' : 'wtlb';
    return {
      type: _type, key: 'wtlb:' + it.entryId + ':0',
      entryId: it.entryId, screen: it.screen, collection: it.collection,
      label: it.label, preview: ''
    };
  }
  if (it.kind === 'study-chapter') {
    const v = it.verse || null;
    const key = v ? ('study:' + it.bookId + '-' + it.chapter + ':' + v) : ('study:' + it.bookId + '-' + it.chapter + ':0');
    return {
      type: 'study', key: key,
      bookId: it.bookId, chapter: it.chapter, verse: v,
      screen: it.screen || 'matthew-ch',
      label: it.label, preview: navItemPreview(it)
    };
  }
  if (it.kind === 'study-letter-chapter') {
    // Bible-study chapter (non-Matthew). The hlKey shape mirrors letters
    // (`letter:{chapterId}:0`) so per-block link icons work in LetterView,
    // which is what renders these chapters via the letterShim.
    return {
      type: 'study-letter', key: 'letter:' + it.studyChapterId + ':0',
      letterId: it.studyChapterId,
      studyId: it.studyId, studyChapterId: it.studyChapterId,
      screen: it.screen || 'bible-study-chapter',
      collection: it.collection,
      label: it.label, preview: ''
    };
  }
  return null;
}

/* Build the source endpoint object from a sourceKey + optional excerpt offsets.
   Pulled out of LinkPicker so refinement screens (verse-picker, excerpt-picker)
   can reuse the same shape when finalizing a link. */
function buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText) {
  const parts = sourceKey.split(':');
  const excerpt = sourceStart != null ? { start: sourceStart, end: sourceEnd, text: sourceText } : {};
  if (parts[0] === 'bible') {
    return { type: 'bible', key: sourceKey, bookId: parts[1], chapter: parseInt(parts[2], 10), verse: parseInt(parts[3], 10), label: sourceLabel || sourceKey };
  }
  if (parts[0] === 'study') {
    // Matthew Study Bible verse. parts[1] is "matthew-N", parts[2] is verse
    const m = parts[1].match(/^(.+)-(\d+)$/);
    const bookId = m ? m[1] : 'matthew';
    const chapter = m ? parseInt(m[2], 10) : null;
    const verse = parts[2] && parts[2] !== '0' ? parseInt(parts[2], 10) : null;
    return { type: 'study', key: sourceKey, bookId, chapter, verse, screen: 'matthew-ch', label: sourceLabel || sourceKey };
  }
  // letter / wtlb / blessed / holy-days — look up so the source endpoint
  // carries the right screen + studyId so it can be navigated back to.
  // Pass parts[0] as a kind-hint so id collisions across collections (e.g.
  // "introduction" exists in both WTLB One and The Blessed) resolve to the
  // collection that matches the source key's prefix.
  if (parts[0] === 'letter' || parts[0] === 'wtlb' || parts[0] === 'blessed' || parts[0] === 'holy-days') {
    const id = parts[1];
    const ctx = findEntryContext(id, parts[0]);
    if (ctx && ctx.kind === 'study-letter') {
      return {
        type: 'study-letter', key: sourceKey,
        letterId: id, studyId: ctx.studyId, studyChapterId: ctx.studyChapterId,
        screen: ctx.screen, collection: ctx.collection,
        label: sourceLabel || ctx.title, ...excerpt
      };
    }
    if (ctx) {
      const base = {
        type: ctx.kind, key: sourceKey, screen: ctx.screen,
        collection: ctx.collection, label: sourceLabel || ctx.title, ...excerpt
      };
      if (ctx.kind === 'letter') base.letterId = id;
      else base.entryId = id;
      return base;
    }
    // Fallback: keep prior shape so we degrade gracefully on unknown ids
    if (parts[0] === 'letter') return { type: 'letter', key: sourceKey, letterId: id, label: sourceLabel || sourceKey, ...excerpt };
    if (parts[0] === 'wtlb')   return { type: 'wtlb',   key: sourceKey, entryId: id,  label: sourceLabel || sourceKey, ...excerpt };
    return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
  }
  if (parts[0] === 'journal') {
    // journal:<entryId>:<blockIdx>  — the user's own journal entry can be
    // a link source. The endpoint navigates back to the entry viewer.
    const eid = parts[1];
    let label = sourceLabel;
    if (!label && typeof JournalStore !== 'undefined') {
      const je = JournalStore.get(eid);
      if (je && typeof JournalHelpers !== 'undefined') {
        label = 'Journal · ' + (JournalHelpers.entryDisplayTitle(je) || 'Untitled');
      }
    }
    return { type: 'journal', key: sourceKey, entryId: eid, screen: 'journal-viewer', label: label || sourceKey, ...excerpt };
  }
  return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
}

/* persistLink is defined in src/stores/link-store.js */

function LinkPicker({ sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, hlTick, setHlTick, onClose, onRequestRefine, lastCreatedLink, onLinkCreated, mode, onPickTarget }) {
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  // Re-read RecentNavStore every render so newly-added picks float to the top
  // without remounting the picker. Cheap localStorage read; runs at most once
  // per render.
  const [, setRecentTick] = useState(0);
  const bumpRecent = useCallback(() => setRecentTick(t => t + 1), []);
  const recent = RecentNavStore.list();
  useEffect(() => {
    if (inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
  }, []);

  // Android back button closes the picker (same save/restore pattern as every
  // other overlay in the app — picks up the previous closer on unmount).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = onClose;
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // Compute search results (or empty when input is empty)
  const results = useMemo(() => {
    if (!input.trim()) return [];
    return searchNavIndex(input.trim(), 30).map(s => s.item);
  }, [input]);

  const createLinkTo = useCallback((item) => {
    if (!item) return;
    const target = navItemToEndpoint(item);
    if (!target) return;
    RecentNavStore.add(item);

    // mode === 'card' → return the target directly without prompting for an
    // excerpt. Used by Journal's "Insert card" flow when the user only wants
    // a chapter/letter title (no body excerpt).
    if (mode === 'card' && onPickTarget) {
      onPickTarget(target, item);
      return;
    }

    // Refinement step:
    //   Bible/study chapter without a specific verse → verse picker
    //   Letter/WTLB/Blessed/Holy-Days → excerpt picker (text range)
    //   In 'excerpt' mode we ALWAYS run the picker (even for already-versed
    //   refs like "Eph 6:5") so the user can narrow further; in link/picker
    //   default mode we only refine when a chapter has no verse yet.
    const needsVersePicker =
      (target.type === 'bible' || target.type === 'study') &&
      (mode === 'excerpt' || !target.verse);
    const needsExcerptPicker =
      target.type === 'letter' || target.type === 'wtlb' ||
      target.type === 'blessed' || target.type === 'holy-days' ||
      target.type === 'study-letter';
    if (needsVersePicker || needsExcerptPicker) {
      onRequestRefine && onRequestRefine({
        kind: needsVersePicker ? 'verse' : 'excerpt',
        target, item
      });
      return; // refinement screen takes over (it leaves us back here on confirm)
    }

    // Source-less mode without refinement (rare — only Bible refs with both
    // book and verse pre-supplied AND not in excerpt mode). In picker mode,
    // hand the target back; in link mode, require a source to persist.
    if (mode === 'card' || mode === 'excerpt') {
      onPickTarget && onPickTarget(target, item);
      return;
    }
    if (!sourceKey) return;
    // Direct create: stay open so user can confirm (✓) or undo (×).
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, target);
    if (newLink) {
      setHlTick(t => t + 1);
      bumpRecent();
      onLinkCreated(newLink);
    }
  }, [sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, bumpRecent, onLinkCreated, mode, onPickTarget]);

  // Render a row for a nav item (used in both Results and Recent lists)
  const renderItemRow = (item, key) => {
    return React.createElement("button", {
      key: key, className: "navpick-row",
      onClick: () => createLinkTo(item)
    },
      React.createElement("div", { className: "navpick-row-icon navpick-row-icon-" + item.kind },
        item.kind === 'bible-chapter' ? (item.category === 'Old Testament' ? 'OT' : 'NT') :
        item.kind === 'study-chapter' ? 'SB' :
        item.kind === 'study-letter-chapter' ? 'LS' :
        (COL_NAV_ICON.get(item.collection) || '?')
      ),
      React.createElement("div", { className: "navpick-row-text" },
        React.createElement("div", { className: "navpick-row-label" }, item.label),
        React.createElement("div", { className: "navpick-row-cat" }, item.category || '')
      )
    );
  };

  const isEmptyQuery = !input.trim();

  return React.createElement("div", { className: "link-picker-overlay", onClick: onClose },
    React.createElement("div", { className: "link-picker-sheet navpick-sheet", onClick: e => e.stopPropagation() },
      // Header: title + red × (undo last link) + green ✓ (confirm & close)
      React.createElement("div", { className: "navpick-header" },
        React.createElement("span", { className: "navpick-title" }, mode === 'card' ? "Embed a Card" : mode === 'excerpt' ? "Embed an Excerpt" : "Link"),
        React.createElement("button", {
          className: "navpick-close navpick-close-undo",
          onClick: () => {
            if (lastCreatedLink) {
              LinkStore.remove(lastCreatedLink.id);
              onLinkCreated(null);
            }
            onClose();
          },
          "aria-label": "Cancel"
        }, "×"),
        lastCreatedLink && React.createElement("button", {
          className: "navpick-confirm-green",
          onClick: onClose,
          "aria-label": "Done"
        },
          React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement("polyline", { points: "20 6 9 17 4 12" })
          )
        )
      ),
      // Search input (rounded pill matching reference)
      React.createElement("div", { className: "navpick-search-wrap" },
        React.createElement("input", {
          ref: inputRef, className: "navpick-search-input",
          placeholder: "Search for verses, letters, or titles…",
          value: input, onChange: e => setInput(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter' && results.length > 0) createLinkTo(results[0]); }
        })
      ),
      // Body: Recent OR Results
      React.createElement("div", { className: "navpick-body" },
        isEmptyQuery ? (
          recent.length > 0 ?
            React.createElement(React.Fragment, null,
              React.createElement("div", { className: "navpick-section-label" }, "Recent"),
              recent.map((item, i) => renderItemRow(item, 'r' + i))
            ) :
            React.createElement("div", { className: "navpick-empty" },
              React.createElement("div", { className: "navpick-empty-title" }, "Search to link"),
              React.createElement("div", { className: "navpick-empty-hint" }, "Examples: \"Eph 6:5\", \"v1l2\", \"WTLB1 33\", or a letter title.")
            )
        ) : (
          results.length > 0 ?
            React.createElement(React.Fragment, null,
              React.createElement("div", { className: "navpick-section-label" }, "Results"),
              results.map((item, i) => renderItemRow(item, 's' + i))
            ) :
            React.createElement("div", { className: "navpick-empty" },
              React.createElement("div", { className: "navpick-empty-title" }, "No matches"),
              React.createElement("div", { className: "navpick-empty-hint" }, "Try \"Genesis 1\", \"Eph 6:5\", \"V2 letter 5\", \"The Wide Path\", \"WTLB1 33\".")
            )
        )
      )
    )

/* ═══════════════════════════════════════════════════════════════
   VERSE PICKER SCREEN
   Full-screen overlay shown after the user picks a chapter (with
   no verse) in LinkPicker. Shows every verse of the chapter with
   tap-to-select; tap a 2nd verse to extend to a range. The check
   icon in the header confirms and creates the link.
═══════════════════════════════════════════════════════════════ */
function VersePickerScreen({ refineRequest, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose, returnTargetInsteadOfLink }) {
  const target = refineRequest.target;
  const item = refineRequest.item;
  const isStudy = target.type === 'study';
  const bodyRef = useRef(null);
  // Native-selection capture. Shape:
  //   { verseStart, verseEnd, charStart, charEnd, text }
  //   verseStart/verseEnd: verse numbers spanned
  //   charStart: offset within verseStart's text where the selection begins
  //   charEnd: offset within verseEnd's text where the selection ends
  //   text: the actual selected substring (used for preview + Journal excerpt)
  const [selInfo, setSelInfo] = useState(null);

  // Resolve chapter object
  const chapter = useMemo(() => {
    if (isStudy) {
      const M = _matthew();
      return M && M.chapters.find(c => c.num === target.chapter) || null;
    }
    const b = _allBooks()[target.bookId];
    return b && b.chapters.find(c => c.num === target.chapter) || null;
  }, [isStudy, target.bookId, target.chapter]);

  // Flat verses list — handles both Bible (sections[].verses[]) and study (verses[]) shapes
  const verses = useMemo(() => {
    if (!chapter) return [];
    if (chapter.verses) return chapter.verses;
    if (chapter.sections) return chapter.sections.flatMap(s => s.verses);
    return [];
  }, [chapter]);

  // Android back button goes back to LinkPicker (same save/restore pattern).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = () => onClose(null);
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // captureSelectionSync — find the verse element(s) the user selected, build
  // a span descriptor with the actual selected text plus verse-level + char-
  // level offsets so downstream consumers (Journal excerpt, link overlay
  // renderer) can position the selection precisely.
  //
  // The verse num lives on the verse element's `data-verse` attribute. We
  // walk DOM Ranges to compute the char offset within the verse's text-only
  // content (which is the verse text excluding the leading "N " number span).
  const captureSelectionSync = useCallback(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
    const range = sel.getRangeAt(0);
    const startN = range.startContainer;
    const endN = range.endContainer;
    const startVerseEl = (startN.nodeType === 3 ? startN.parentElement : startN).closest('[data-verse]');
    const endVerseEl = (endN.nodeType === 3 ? endN.parentElement : endN).closest('[data-verse]');
    if (!startVerseEl || !endVerseEl) return null;
    if (!bodyRef.current || !bodyRef.current.contains(startVerseEl) || !bodyRef.current.contains(endVerseEl)) return null;
    const startVerse = parseInt(startVerseEl.getAttribute('data-verse'), 10);
    const endVerse = parseInt(endVerseEl.getAttribute('data-verse'), 10);
    // Offset within the verse's TEXT node (the `.picker-verse-text` span).
    function offsetWithinVerseText(verseEl, container, offset) {
      const textEl = verseEl.querySelector('.picker-verse-text');
      if (!textEl) return 0;
      const r = document.createRange();
      r.selectNodeContents(textEl);
      try {
        r.setEnd(container, offset);
      } catch (e) {
        // Selection endpoint sits outside the verse text (e.g. on the
        // verse-number span). Snap to 0 or verse-text length depending on
        // which side this is.
        return 0;
      }
      return r.toString().length;
    }
    let charStart = offsetWithinVerseText(startVerseEl, range.startContainer, range.startOffset);
    let charEnd = offsetWithinVerseText(endVerseEl, range.endContainer, range.endOffset);
    // Snap to word boundaries within each verse's text so trailing spaces
    // and partial words don't sneak into the excerpt.
    const startVText = (verses.find(v => v.n === startVerse) || {}).text || '';
    const endVText = (verses.find(v => v.n === endVerse) || {}).text || '';
    const snappedStart = snapRangeToWords(startVText, charStart, startVText.length).start;
    const snappedEndPos = snapRangeToWords(endVText, 0, charEnd).end;
    charStart = Math.max(0, Math.min(snappedStart, startVText.length));
    charEnd = Math.max(0, Math.min(snappedEndPos, endVText.length));
    return {
      verseStart: startVerse,
      verseEnd: endVerse,
      charStart: charStart,
      charEnd: charEnd,
      text: sel.toString()
    };
  }, [verses]);

  const captureSelection = useCallback(() => {
    setTimeout(function() {
      const info = captureSelectionSync();
      if (info) setSelInfo(info);
    }, 150);
  }, [captureSelectionSync]);

  const handleVerseTap = useCallback((vn) => {
    // Tap a verse number to quick-select the whole verse. Sets a synthetic
    // selInfo and visually selects the verse in the DOM so the user gets a
    // single-tap path that doesn't require drag-selection on mobile.
    const v = verses.find(x => x.n === vn);
    if (!v) return;
    setSelInfo({
      verseStart: vn,
      verseEnd: vn,
      charStart: 0,
      charEnd: (v.text || '').length,
      text: v.text || ''
    });
    // Clear any native selection so the visual is purely the .is-selected ring.
    try {
      const sel = window.getSelection();
      sel && sel.removeAllRanges && sel.removeAllRanges();
    } catch (e) {}
  }, [verses]);

  const confirmLink = useCallback(() => {
    const refinedTarget = { ...target };
    // Fall back to a fresh synchronous capture so a tap-confirm-faster-than-
    // 150ms doesn't lose the excerpt.
    const info = selInfo || captureSelectionSync();
    if (!info) { onClose(null); return; }
    const v1 = info.verseStart;
    const v2 = info.verseEnd;
    refinedTarget.verse = v1;
    if (v2 && v2 !== v1) refinedTarget.verseEnd = v2;
    const v1Obj = verses.find(v => v.n === v1) || null;
    const v2Obj = verses.find(v => v.n === v2) || null;
    const v1FullLen = v1Obj ? (v1Obj.text || '').length : 0;
    const v2FullLen = v2Obj ? (v2Obj.text || '').length : 0;
    const isPartialStart = info.charStart > 0;
    const isPartialEnd = info.charEnd < v2FullLen;
    const isPartial = isPartialStart || isPartialEnd;
    if (isPartial) {
      refinedTarget.charStart = info.charStart;
      refinedTarget.charEnd = info.charEnd;
      refinedTarget.partial = true;
    }
    // Storage key. Whole-verse spans keep the existing format (so link
    // overlays still wire up). Partial spans append a ':S-E' suffix where
    // S/E are flat-offset markers across the verse range.
    const verseFrag = v1 + (v2 && v2 !== v1 ? '-' + v2 : '');
    let baseKey;
    if (isStudy) {
      baseKey = 'study:' + target.bookId + '-' + target.chapter + ':' + verseFrag;
    } else {
      baseKey = bibleHlKey(target.bookId, target.chapter, v1) + (v2 && v2 !== v1 ? '-' + v2 : '');
    }
    refinedTarget.key = isPartial ? baseKey + ':' + info.charStart + '-' + info.charEnd : baseKey;
    const baseLabel = item.title || target.label.replace(/\s\d+(?::\d+(?:-\d+)?)?$/, '');
    refinedTarget.label = baseLabel + ' ' + target.chapter + ':' + verseFrag;
    refinedTarget.text = info.text;
    refinedTarget.preview = info.text || (v1Obj && v1Obj.text) || '';

    // Two call patterns:
    //   • Link mode (default): persist + bump hlTick + signal LinkPicker.
    //   • Journal/return mode: hand the refined target back to the caller
    //     via onClose so the Journal can create a verse-block from it.
    if (returnTargetInsteadOfLink) {
      onClose(refinedTarget);
      return;
    }
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, refinedTarget);
    if (newLink) setHlTick(t => t + 1);
    onClose(newLink || null);
  }, [selInfo, captureSelectionSync, target, item, isStudy, verses, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose, returnTargetInsteadOfLink]);

  if (!chapter) {
    return React.createElement("div", { className: "picker-screen" },
      React.createElement("div", { className: "picker-header" },
        React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
        React.createElement("span", { className: "picker-title" }, "Select Verse")
      ),
      React.createElement("div", { className: "picker-empty" }, "Chapter not found.")
    );
  }

  const titleText = (item.title || target.label.replace(/\s\d+$/, '')) + ' ' + target.chapter;
  const hasSelection = !!selInfo;
  const previewText = selInfo ? (selInfo.text || '') : '';

  return React.createElement("div", { className: "picker-screen" },
    React.createElement("div", { className: "picker-header" },
      React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
      React.createElement("span", { className: "picker-title" }, "Select Text"),
      React.createElement("button", {
        className: "picker-confirm",
        onClick: confirmLink, "aria-label": "Confirm",
        title: hasSelection ? "Use this excerpt" : "Use the whole chapter"
      },
        React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.4", strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("polyline", { points: "20 6 9 17 4 12" })
        )
      )
    ),
    React.createElement("div", { className: "picker-body picker-body-letter",
      onTouchEnd: captureSelection, onMouseUp: captureSelection
    },
      React.createElement("div", { className: "picker-letter-title" }, titleText),
      React.createElement("div", { className: "picker-letter-subtitle" }, isStudy ? "Matthew Study Bible" : "Bible Chapter"),
      React.createElement("div", {
        className: "picker-selection-hint" + (hasSelection ? "" : " picker-selection-hint-empty")
      }, hasSelection
        ? previewText
        : "Highlight any portion to link. Or tap a verse number to grab the whole verse."
      ),
      React.createElement("div", { ref: bodyRef, className: "picker-verses" },
        verses.map(v => React.createElement("p", {
          key: v.n,
          className: "picker-verse-selectable",
          'data-verse': v.n
        },
          React.createElement("span", {
            className: "picker-verse-num",
            onClick: function(e) { e.stopPropagation(); handleVerseTap(v.n); }
          }, v.n + " "),
          React.createElement("span", { className: "picker-verse-text" }, v.text)
        ))
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   LETTER EXCERPT PICKER SCREEN
   Full-screen overlay shown after the user picks a Letter/WTLB/
   Blessed/Holy-Days entry in LinkPicker. Renders the entry's body
   text and lets the user select a text range with native selection.
   The check icon captures the selection's character offsets and
   stores them on the link's target endpoint.
═══════════════════════════════════════════════════════════════ */
function LetterExcerptPickerScreen({ refineRequest, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose, returnTargetInsteadOfLink }) {
  const target = refineRequest.target;
  const item = refineRequest.item;
  const bodyRef = useRef(null);
  const [selInfo, setSelInfo] = useState(null); // { blockIdx, start, end, text }

  // Resolve entry data via the centralized context lookup, which already
  // covers volume letters (with prefaces), Timothy/Flock/Rebuke, WTLB One/Two,
  // The Blessed, Holy Days, AND Bible Study chapters (non-Matthew).
  const entry = useMemo(() => {
    const id = target.letterId || target.entryId || target.studyChapterId;
    if (!id) return null;
    const ctx = findEntryContext(id);
    return ctx ? ctx.entry : null;
  }, [target.letterId, target.entryId, target.studyChapterId]);

  // Build a flat array of plain-text blocks from the entry. Each block's
  // `key` is the bare data-index that LetterView/WtlbEntryView use for their
  // hlKey, so a stored link with a "letter:id:N:start-end" target will
  // prefix-match the rendered block element.
  const blocks = useMemo(() => {
    if (!entry) return [];
    if (entry.paragraphs) {
      return entry.paragraphs.map((p, i) => ({
        key: String(i),
        text: (p.text || '').replace(/_([^_]+)_/g, '$1').replace(/\*\*([^*]+)\*\*/g, '$1').replace(/\{\{ref:([^}]+)\}\}/g, '$1').replace(/\{\{nav:([^}]+)\}\}/g, '')
      }));
    }
    if (entry.blocks) {
      return entry.blocks.map((b, i) => {
        let text = '';
        if (b.type === 'para' || b.type === 'closing-fn' || b.type === 'intro') {
          text = (b.segments || []).map(s => s.t === 'fn' ? '' : (s.v || '')).join('');
        } else if (b.type === 'closing') {
          text = b.text || '';
        } else if (b.type === 'poetry') {
          text = ((b.lines || b.segments) || []).map(line =>
            Array.isArray(line) ? line.map(s => s.t === 'fn' ? '' : (s.v || '')).join('') :
            (line && line.t === 'fn' ? '' : (line && line.v) || '')
          ).join('\n');
        } else if (b.type === 'note' || b.type === 'scripture') {
          text = b.text || '';
        }
        // Keep original index even when text is empty so link-back keys match.
        return { key: String(i), text };
      }).filter(b => b.text.trim().length > 0);
    }
    return [];
  }, [entry]);

  // Android back button goes back to LinkPicker (same save/restore pattern).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = () => onClose(null);
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // Capture native selection. Two paths:
  //   captureSelectionSync — runs immediately, returns selInfo or null.
  //     Used as the fallback inside confirmLink so a fast user (select →
  //     tap ✓ within 150 ms) doesn't lose their excerpt to the race
  //     between the touchend timeout and React's state commit.
  //   captureSelection — deferred 150 ms, calls the sync fn then commits
  //     to state for UI (selection-hint quote). The delay is preserved
  //     because on Android the native selection occasionally isn't
  //     finalized immediately on touchend.
  const captureSelectionSync = useCallback(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
    const range = sel.getRangeAt(0);
    const startNode = range.startContainer;
    const blockEl = startNode.nodeType === 3 ? startNode.parentElement.closest('[data-block-key]') : startNode.closest && startNode.closest('[data-block-key]');
    if (!blockEl || !bodyRef.current || !bodyRef.current.contains(blockEl)) return null;
    const blockKey = blockEl.dataset.blockKey;
    const fullText = blockEl.textContent;
    const preRange = document.createRange();
    preRange.selectNodeContents(blockEl);
    preRange.setEnd(range.startContainer, range.startOffset);
    var start = preRange.toString().length;
    var end = start + range.toString().length;
    var snapped = snapRangeToWords(fullText, start, end);
    start = snapped.start;
    return { blockKey, start, end, text: fullText.slice(start, end) };
  }, []);
  const captureSelection = useCallback(() => {
    setTimeout(function() {
      const info = captureSelectionSync();
      if (info) setSelInfo(info);
    }, 150);
  }, [captureSelectionSync]);

  const confirmLink = useCallback(() => {
    const refinedTarget = { ...target };
    // Fall back to a fresh synchronous capture so a tap-confirm-faster-
    // than-150-ms doesn't lose the excerpt. window.getSelection() still
    // holds the user's selection at the moment the ✓ button is tapped
    // (button taps don't clear native text selection by default).
    var info = selInfo || captureSelectionSync();
    if (info) {
      refinedTarget.blockKey = info.blockKey;
      refinedTarget.start = info.start;
      refinedTarget.end = info.end;
      refinedTarget.text = info.text;
      refinedTarget.preview = info.text;
      refinedTarget.partial = true;
      // Refine the key so per-block link icons are scoped correctly
      const baseKey = target.key.split(':').slice(0, 2).join(':');
      refinedTarget.key = baseKey + ':' + info.blockKey + ':' + info.start + '-' + info.end;
    }
    if (returnTargetInsteadOfLink) {
      onClose(refinedTarget);
      return;
    }
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, refinedTarget);
    if (newLink) setHlTick(t => t + 1);
    onClose(newLink || null);
  }, [selInfo, captureSelectionSync, target, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose, returnTargetInsteadOfLink]);

  if (!entry) {
    return React.createElement("div", { className: "picker-screen" },
      React.createElement("div", { className: "picker-header" },
        React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
        React.createElement("span", { className: "picker-title" }, "Select Text to Link")
      ),
      React.createElement("div", { className: "picker-empty" }, "Letter not found.")
    );
  }

  const titleText = entry.title || item.label;
  const subtitleText = item.collection || (target.type === 'blessed' ? 'The Blessed' :
                       target.type === 'holy-days' ? 'Holy Days' : '');
  const hasSelection = !!selInfo;

  return React.createElement("div", { className: "picker-screen" },
    React.createElement("div", { className: "picker-header" },
      React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
      React.createElement("span", { className: "picker-title" }, "Select Text to Link"),
      React.createElement("button", {
        className: "picker-confirm",
        onClick: confirmLink, "aria-label": "Confirm",
        title: hasSelection ? "Link this excerpt" : "Link the whole letter"
      },
        React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.4", strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("polyline", { points: "20 6 9 17 4 12" })
        )
      )
    ),
    React.createElement("div", { className: "picker-body picker-body-letter", ref: bodyRef,
      onMouseUp: captureSelection, onTouchEnd: captureSelection
    },
      React.createElement("div", { className: "picker-letter-title" }, titleText),
      subtitleText && React.createElement("div", { className: "picker-letter-subtitle" }, subtitleText),
      hasSelection && React.createElement("div", { className: "picker-selection-hint" },
        '"' + (selInfo.text.length > 80 ? selInfo.text.slice(0, 77) + '…' : selInfo.text) + '"'
      ),
      !hasSelection && React.createElement("div", { className: "picker-selection-hint picker-selection-hint-empty" },
        "Long-press and drag to select an excerpt, then tap ✓. Tap ✓ without selecting to link the whole letter."
      ),
      blocks.map(b => React.createElement("p", {
        key: b.key,
        "data-block-key": b.key,
        className: "picker-letter-block"
      }, b.text))
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   NOTE SHEET
   Bottom sheet for adding/editing a note on a highlight.
═══════════════════════════════════════════════════════════════ */
/* NoteSheet — read + edit modes for a single note (group).
   Opens in 'read' mode by default; SelectionToolbar's Note action and
   the action chip's Convert→Note path open in 'edit' mode for fresh notes.
   The ⋯ menu surfaces Edit · Recolor · Delete (with inline confirm) · Share.
   Notebook membership lives behind a placeholder until Commit 2. */
function NoteSheet({ groupId, startInEditMode, hlTick, setHlTick, onClose, onOpenNotebookPicker }) {
  const note = useMemo(() => NoteStore.get(groupId), [groupId, hlTick]);
  const segs = useMemo(() => AnnotationStore.getByGroup(groupId), [groupId, hlTick]);
  const [mode, setMode] = useState(startInEditMode ? 'edit' : 'read');
  const [body, setBody] = useState(note ? note.body || '' : '');
  const [menuOpen, setMenuOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [showColors, setShowColors] = useState(false);
  const textareaRef = useRef(null);

  useEffect(() => {
    if (mode === 'edit' && textareaRef.current) {
      textareaRef.current.focus();
      // Move cursor to end so Edit-after-existing-content lands at the tail
      const len = textareaRef.current.value.length;
      textareaRef.current.setSelectionRange(len, len);
    }
  }, [mode]);

  if (!note || !segs.length) {
    // Note record went missing — close
    return null;
  }
  const color = note.color || 'yellow';
  const anchor = note.fullText || segs.map(s => s.ann.text || '').join(' … ');
  const truncatedAnchor = anchor.length > 220 ? anchor.slice(0, 220) + '…' : anchor;

  const save = () => {
    NoteStore.update(groupId, { body });
    setHlTick(t => t + 1);
    onClose();
  };

  const cancelEdit = () => {
    setBody(note.body || '');
    if (startInEditMode && !note.body) {
      // Fresh new note, never saved — convert back to a plain highlight
      // so the selection the user made is preserved on screen.
      AnnotationStore.convertGroup(groupId, 'highlight');
      NoteStore.remove(groupId);
      setHlTick(t => t + 1);
      onClose();
      return;
    }
    setMode('read');
  };

  const recolor = (c) => {
    AnnotationStore.recolorGroup(groupId, c);
    NoteStore.update(groupId, { color: c });
    setHlTick(t => t + 1);
    setShowColors(false);
    setMenuOpen(false);
  };

  const remove = () => {
    AnnotationStore.removeGroup(groupId);
    NoteStore.remove(groupId);
    setHlTick(t => t + 1);
    onClose();
  };

  const share = () => {
    const text = anchor + (note.body ? '\n\n' + note.body : '');
    if (navigator.share) navigator.share({ text }).catch(() => {});
    else navigator.clipboard.writeText(text).catch(() => {});
    setMenuOpen(false);
  };

  const closeOverlay = () => {
    if (menuOpen) { setMenuOpen(false); setConfirmDelete(false); setShowColors(false); return; }
    onClose();
  };

  // Blank notes are allowed — the body can be empty.
  const canSave = true;
  // Tapping the header color dot opens the color picker — works in either
  // mode AND closes any other panel that's open (menu, delete confirm).
  const openColorPicker = () => {
    setShowColors(true);
    setMenuOpen(false);
    setConfirmDelete(false);
  };

  return React.createElement("div", { className: "note-sheet-overlay", onClick: closeOverlay },
    React.createElement("div", { className: "note-sheet", onClick: e => e.stopPropagation() },
      // Header: color dot (tappable) · "Note" · ⋯ menu (read mode only)
      React.createElement("div", { className: "note-sheet-header" },
        React.createElement("button", {
          className: "note-sheet-color-dot ann-chip-color-btn",
          "data-color": color,
          onClick: openColorPicker,
          title: "Change color",
          "aria-label": "Change note color"
        }),
        React.createElement("div", { className: "note-sheet-title" }, mode === 'edit' ? (note.body ? 'Edit note' : 'New note') : 'Note'),
        mode === 'read' && React.createElement("button", {
          className: "note-sheet-menu-btn",
          onClick: () => { setMenuOpen(v => !v); setShowColors(false); setConfirmDelete(false); },
          "aria-label": "Options"
        },
          React.createElement("svg", { viewBox: "0 0 24 24", fill: "currentColor" },
            React.createElement("circle", { cx: "12", cy: "5", r: "1.7" }),
            React.createElement("circle", { cx: "12", cy: "12", r: "1.7" }),
            React.createElement("circle", { cx: "12", cy: "19", r: "1.7" })
          )
        )
      ),
      // Color picker takes over the body area when opened — by tapping the
      // header dot OR the ⋯ menu's "Change color" item.
      showColors
        ? React.createElement("div", { className: "note-sheet-menu-colors" },
            React.createElement("button", { className: "ann-chip-back", onClick: () => setShowColors(false), title: "Back" }, "‹"),
            HL_COLORS.map(c => React.createElement("button", {
              key: c,
              className: "ann-chip-color-btn" + (color === c ? ' active' : ''),
              "data-color": c,
              onClick: () => recolor(c),
              title: c
            }))
          )
        : React.createElement(React.Fragment, null,
            // Anchor text (italic quote)
            React.createElement("div", { className: "note-sheet-anchor" }, "“", truncatedAnchor, "”"),
            // Date row — read mode only. Shows when the note was last edited
            // (or when it was created if never edited). Subtle Cinzel caps
            // so it doesn't compete with the body content.
            mode === 'read' && (note.updated || note.created) && React.createElement("div", { className: "note-sheet-date" },
              relativeDate(note.updated || note.created)
            ),
            // Edit mode: always-visible color row so users can pick a color
            // without needing to open the ⋯ menu first.
            mode === 'edit' && React.createElement("div", { className: "note-edit-colors" },
              HL_COLORS.map(c => React.createElement("button", {
                key: c,
                className: "ann-chip-color-btn" + (color === c ? ' active' : ''),
                "data-color": c,
                onClick: () => recolor(c),
                title: c
              }))
            ),
            // Notebook chips (only in read mode and only if any are assigned)
            mode === 'read' && (note.notebookIds || []).length > 0 && React.createElement("div", { className: "note-sheet-nb-chips" },
              (note.notebookIds || []).map(id => {
                const nb = NotebookStore.get(id);
                if (!nb) return null;
                return React.createElement("span", { key: id, className: "note-sheet-nb-chip" },
                  React.createElement("svg", { viewBox: "0 0 24 24" },
                    React.createElement("path", { d: "M4 4h11l5 5v11a1 1 0 0 1-1 1H4z" }),
                    React.createElement("polyline", { points: "15 4 15 9 20 9" })
                  ),
                  nb.name
                );
              })
            ),
            // Body — read mode displays it; edit mode shows textarea
            mode === 'read' ? (
              note.body
                ? React.createElement("div", { className: "note-sheet-body" }, note.body)
                : React.createElement("div", { className: "note-sheet-empty" }, "Empty note. Tap ⋯ → Edit to add text.")
            ) : React.createElement("textarea", {
              ref: textareaRef, className: "note-sheet-textarea",
              value: body, onChange: e => setBody(e.target.value),
              placeholder: "Write your note…",
              onFocus: () => {
                setTimeout(() => {
                  try { textareaRef.current && textareaRef.current.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } catch (e) {}
                }, 220);
              }
            }),
            // Edit mode: notebook assignment row — always visible so users
            // can assign to a notebook during creation, not just after.
            mode === 'edit' && React.createElement("button", {
              className: "note-edit-nb-row",
              onClick: () => { onOpenNotebookPicker && onOpenNotebookPicker(groupId); }
            },
              React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", strokeWidth: "1.8", strokeLinecap: "round", strokeLinejoin: "round" },
                React.createElement("path", { d: "M4 4h11l5 5v11a1 1 0 0 1-1 1H4z" }),
                React.createElement("polyline", { points: "15 4 15 9 20 9" })
              ),
              (note.notebookIds || []).length > 0
                ? ((note.notebookIds || []).map(id => { const nb = NotebookStore.get(id); return nb ? nb.name : null; }).filter(Boolean).join(', ') || "Add to notebook…")
                : "Add to notebook…"
            ),
            // Read mode: no Edit footer — use ⋯ → Edit. Edit mode: Cancel + Save.
            // Save is always enabled — blank notes are valid.
            mode === 'edit' && React.createElement("div", { className: "note-sheet-footer" },
              React.createElement("button", { className: "note-sheet-secondary", onClick: cancelEdit }, "Cancel"),
              React.createElement("button", { className: "note-sheet-save", onClick: save }, "Save")
            ),
            // ⋯ menu panel (read mode only). Color sub-panel was hoisted above
            // so the menu only carries the action items + delete confirm.
            mode === 'read' && menuOpen && React.createElement("div", { className: "note-sheet-menu" },
              confirmDelete
                ? React.createElement("div", { className: "ann-chip-confirm" },
                    React.createElement("span", { className: "ann-chip-confirm-q" }, "Delete this note?"),
                    React.createElement("button", { className: "ann-chip-confirm-btn ann-chip-confirm-cancel", onClick: () => setConfirmDelete(false) }, "Cancel"),
                    React.createElement("button", { className: "ann-chip-confirm-btn ann-chip-confirm-yes", onClick: remove }, "Yes, delete")
                  )
                : React.createElement(React.Fragment, null,
                    React.createElement("button", { className: "note-sheet-menu-item", onClick: () => { setMenuOpen(false); setMode('edit'); } }, "Edit note"),
                    React.createElement("button", { className: "note-sheet-menu-item", onClick: () => { setMenuOpen(false); openColorPicker(); } }, "Change color"),
                    React.createElement("button", {
                      className: "note-sheet-menu-item",
                      onClick: () => { setMenuOpen(false); onOpenNotebookPicker && onOpenNotebookPicker(groupId); }
                    }, ((note.notebookIds || []).length > 0 ? "Manage notebooks…" : "Add to notebook…")),
                    React.createElement("button", { className: "note-sheet-menu-item", onClick: share }, "Share"),
                    React.createElement("button", { className: "note-sheet-menu-item danger", onClick: () => setConfirmDelete(true) }, "Delete note")
                  )
            )
          )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   NOTEBOOK PICKER SHEET
   Bottom sheet that toggles a note's notebook membership. Multi-
   select: tap rows to check/uncheck, changes apply immediately.
   Inline "+ New notebook" creates one without leaving the sheet.
═══════════════════════════════════════════════════════════════ */
function NotebookPickerSheet({ groupId, hlTick, setHlTick, onClose }) {
  const note = useMemo(() => NoteStore.get(groupId), [groupId, hlTick]);
  const notebooks = useMemo(() => NotebookStore.list(), [hlTick]);
  const [newName, setNewName] = useState('');
  const [confirmDeleteNb, setConfirmDeleteNb] = useState(null); // notebook id or null
  const inputRef = useRef(null);

  if (!note) return null;
  const memberIds = new Set(note.notebookIds || []);

  const createNotebook = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    const nb = NotebookStore.add(trimmed);
    if (nb) {
      // Auto-add the note to the freshly-created notebook
      NoteStore.toggleNotebook(groupId, nb.id);
      setHlTick(t => t + 1);
      setNewName('');
    }
  };

  const toggle = (nbId) => {
    NoteStore.toggleNotebook(groupId, nbId);
    setHlTick(t => t + 1);
  };

  const deleteNb = (nbId) => {
    NotebookStore.remove(nbId);
    setHlTick(t => t + 1);
    setConfirmDeleteNb(null);
  };

  return React.createElement("div", { className: "nb-picker-overlay", onClick: onClose },
    React.createElement("div", { className: "nb-picker", onClick: e => e.stopPropagation() },
      React.createElement("div", { className: "nb-picker-header" },
        React.createElement("span", { className: "nb-picker-title" }, memberIds.size > 0 ? "Manage Notebooks" : "Add to Notebook"),
        React.createElement("button", { className: "nb-picker-close", onClick: onClose, "aria-label": "Close" }, "×")
      ),
      React.createElement("div", { className: "nb-picker-new" },
        React.createElement("input", {
          ref: inputRef,
          className: "nb-picker-new-input",
          type: "text",
          placeholder: "New notebook name…",
          value: newName,
          onChange: e => setNewName(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); createNotebook(); } },
          maxLength: 60
        }),
        React.createElement("button", {
          className: "nb-picker-new-btn" + (newName.trim() ? '' : ' disabled'),
          onClick: createNotebook,
          disabled: !newName.trim()
        }, "Create")
      ),
      notebooks.length === 0
        ? React.createElement("div", { className: "nb-picker-empty" }, "No notebooks yet. Type a name above to create your first one.")
        : React.createElement("div", { className: "nb-picker-list" },

// Parse a ref string like "John 3:16", "Romans 1:1-5", "Psalm 50:3-4",
// or comma-separated "1 Cor 7:7, 9". Returns { start, end, verses? } or null.
// For comma refs, `verses` is the explicit list (e.g. [7, 9]).
function parseRefRange(ref) {
  const clean = ref.replace(/\s*\(.*?\)\s*/g, "").trim();
  // Comma-separated verses: "7:7, 9" or "7:7, 9, 11"
  const cm = clean.match(/:(\d+(?:\s*,\s*\d+)+)$/);
  if (cm) {
    const nums = cm[1].split(/\s*,\s*/).map(Number);
    if (nums.length >= 2) return { start: nums[0], end: nums[nums.length - 1], verses: nums };
  }
  const m = clean.match(/:(\d+)(?:-(\d+))?$/);
  if (!m) return null;
  const start = parseInt(m[1], 10);
  const end = m[2] ? parseInt(m[2], 10) : start;
  return end > start ? { start, end } : null;
}

// Split a multi-verse text string into segments with verse numbers.

// on them — the captured N must fall within the expected verse range so

  // ":", "?" etc. and the fetcher joins them with a single space.

      const textStart = markers[i].markerEnd;

    }
