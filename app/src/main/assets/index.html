/* ═══════════════════════════════════════════════════════════════
   NAVIGATION INDEX
   Flat list of every navigable target (Bible chapter, letter,
   WTLB entry, study chapter, etc.) with aliases for shortcut
   matching. Built lazily, cached on window.__NAV_INDEX.
═══════════════════════════════════════════════════════════════ */
function buildNavIndex() {
  if (window.__NAV_INDEX) return window.__NAV_INDEX;
  const items = [];

  /* Bible books → chapters. Each book gets a chapter-level entry. */
  const books = _allBooks();
  Object.values(books).forEach(book => {
    if (!book || !book.chapters) return;
    const titleLc = book.title.toLowerCase();
    const titleNoSpace = titleLc.replace(/\s+/g, '');
    // Common abbreviations (a few hand-picked; full list isn't needed because
    // matching tolerates leading-N + first-3-letters)
    const abbrevs = {
      'genesis': 'gen', 'exodus': 'exo', 'leviticus': 'lev', 'numbers': 'num',
      'deuteronomy': 'deut', 'joshua': 'josh', 'judges': 'judg',
      '1samuel': '1sam', '2samuel': '2sam', '1kings': '1kgs', '2kings': '2kgs',
      '1chronicles': '1chr', '2chronicles': '2chr',
      'nehemiah': 'neh', 'psalms': 'ps', 'proverbs': 'prov',
      'ecclesiastes': 'ecc', 'songofsolomon': 'song',
      'isaiah': 'isa', 'jeremiah': 'jer', 'lamentations': 'lam',
      'ezekiel': 'eze', 'daniel': 'dan', 'hosea': 'hos',
      'obadiah': 'oba', 'jonah': 'jon', 'micah': 'mic', 'nahum': 'nah',
      'habakkuk': 'hab', 'zephaniah': 'zeph', 'haggai': 'hag',
      'zechariah': 'zech', 'malachi': 'mal',
      'matthew': 'mt', 'mark': 'mk', 'luke': 'lk', 'john': 'jn',
      'romans': 'rom', '1corinthians': '1cor', '2corinthians': '2cor',
      'galatians': 'gal', 'ephesians': 'eph', 'philippians': 'phil',
      'colossians': 'col', '1thessalonians': '1thess', '2thessalonians': '2thess',
      '1timothy': '1tim', '2timothy': '2tim', 'titus': 'titus',
      'philemon': 'phlm', 'hebrews': 'heb', 'james': 'jas',
      '1peter': '1pet', '2peter': '2pet', '1john': '1jn', '2john': '2jn', '3john': '3jn',
      'jude': 'jude', 'revelation': 'rev'
    };
    const abbr = abbrevs[book.id] || titleLc.slice(0, 3);
    book.chapters.forEach(ch => {
      const aliases = [
        titleLc + ' ' + ch.num,
        titleNoSpace + ch.num,
        abbr + ' ' + ch.num,
        abbr + ch.num,
        // First-3-letters fallback
        titleLc.slice(0, 3) + ' ' + ch.num
      ];
      items.push({
        kind: 'bible-chapter',
        bookId: book.id,
        chapter: ch.num,
        label: book.title + ' ' + ch.num,
        category: bookCategory(book.id),
        title: book.title,
        aliases: aliases.map(a => a.toLowerCase())
      });
    });
  });

  /* Letters / entries via COLLECTIONS registry. */
  const NAV_KIND = { letter: 'letter', wtlb: 'wtlb-entry', blessed: 'blessed-entry', 'holy-days': 'holy-days-entry' };
  const VOL_NUM = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7 };
  const NAV_ALIAS_BASES = {
    timothy: ['timothy', 'tim', 'letters from timothy', 'lft'],
    flock:   ['flock', 'letters to the flock', 'lttf', 'ltf'],
    rebuke:  ['rebuke', "the lord's rebuke", 'lr', "lord's rebuke"],
    wtlb1:   ['wtlb1', 'wtlb 1', 'wtlb part one', 'words to live by 1', 'wtlb one'],
    wtlb2:   ['wtlb2', 'wtlb 2', 'wtlb part two', 'words to live by 2', 'wtlb two'],
    blessed: ['blessed', 'the blessed'],
    holydays:['holy days', 'hd']
  };

  for (const col of COLLECTIONS) {
    if (col.volKey === 'hm') continue;
    const navKind = NAV_KIND[col.kind] || 'letter';
    const isLetter = navKind === 'letter';
    const vn = VOL_NUM[col.volKey];
    const bases = NAV_ALIAS_BASES[col.volKey];
    const category = col.volKey === 'holydays' ? 'Holy Days' : col.label;

    const pref = colPreface(col);
    if (pref && pref.id) {
      const pAliases = [pref.title.toLowerCase()];
      if (vn) pAliases.push(col.label.toLowerCase() + ' preface', 'v' + vn + ' preface');
      if (bases) bases.forEach(b => pAliases.push(b + ' preface'));
      items.push({
        kind: navKind, collection: col.label, screen: col.letterScreen,
        letterId: pref.id, letterNum: 0,
        label: pref.title, category: category, title: pref.title, aliases: pAliases
      });
    }

    colLetterArr(col).forEach(entry => {
      const aliases = [entry.title.toLowerCase()];
      if (vn && entry.num != null) {
        aliases.push(
          'v'+vn+'l'+entry.num, 'v'+vn+' l'+entry.num,
          'vol '+vn+' letter '+entry.num, 'volume '+vn+' letter '+entry.num,
          col.label.toLowerCase()+' letter '+entry.num, col.label.toLowerCase()+' '+entry.num,
          'v'+vn+' '+entry.num, 'vol'+vn+' '+entry.num);
      }
      if (bases) {
        bases.forEach(b => {
          aliases.push(b + ' ' + (entry.num != null ? entry.num : ''));
          if (entry.num != null) {
            aliases.push(b + entry.num);
            if (col.kind === 'wtlb') aliases.push(b + ' #' + entry.num);
          }
        });
      }
      const item = {
        kind: navKind, collection: col.label, screen: col.letterScreen,
        label: entry.title, category: category, title: entry.title, aliases
      };
      if (isLetter) { item.letterId = entry.id; item.letterNum = entry.num; }
      else { item.entryId = entry.id; item.entryNum = entry.num; }
      items.push(item);
    });
  }

  /* Bible / Letter Studies (non-Matthew) — More Than a Man, Lamb of God, etc.
     Each chapter is its own target since these can be linked to with verse-
     like granularity (excerpt picker handles text-range selection). */
  if (Array.isArray(window.BIBLE_STUDIES)) {
    window.BIBLE_STUDIES.forEach(study => {
      if (!study || !Array.isArray(study.chapters)) return;
      const studyKey = (study.slug || study.id || '').toLowerCase();
      const studyTitleLc = (study.title || '').toLowerCase();
      study.chapters.forEach(ch => {
        if (!ch || !ch.id) return;
        const chTitle = ch.title || ('Chapter ' + (ch.num != null ? ch.num : ch.id));
        items.push({
          kind: 'study-letter-chapter',
          collection: study.title || 'Bible Study',
          screen: 'bible-study-chapter',
          studyId: study.slug || study.id,
          studyChapterId: ch.id,
          letterId: ch.id, // for openLinkPicker compat
          chapterNum: ch.num,
          label: chTitle,
          category: 'Bible Studies',
          title: chTitle,
          aliases: [
            chTitle.toLowerCase(),
            studyTitleLc,
            studyKey + ' ' + (ch.num != null ? ch.num : ''),
            studyKey + (ch.num != null ? ch.num : '')
          ].filter(Boolean)
        });
      });
    });
  }

  /* Matthew Study Bible chapters. */
  var _m = _matthew();
  if (_m && Array.isArray(_m.chapters)) {
    _m.chapters.forEach(ch => {
      items.push({
        kind: 'study-chapter',
        bookId: 'matthew', chapter: ch.num,
        screen: 'matthew-ch',
        label: 'Matthew Study Bible — Chapter ' + ch.num + (ch.title ? ': ' + ch.title : ''),
        category: 'Bible Studies', title: ch.title || ('Chapter ' + ch.num),
        aliases: [
          'matthew study ' + ch.num, 'msb ' + ch.num, 'msb' + ch.num,
          'matthew sb ' + ch.num, 'matthew study bible ' + ch.num
        ]
      });
    });
  }

  window.__NAV_INDEX = items;
  return items;
}

/* Parse a query string into navigation candidates.
   Returns an array of { item, score } sorted by descending score. */
function searchNavIndex(query, limit) {
  limit = limit || 30;
  if (!query) return [];
  const q = query.toLowerCase().trim();
  const items = buildNavIndex();
  const scored = [];

  /* Try Bible reference parser first (handles "Eph 6:5", "Genesis 1:1-3" etc). */
  const refP = parseRefStr(q);
  let bibleRefHit = null;
  if (refP) {
    const bookKey = findBook(refP.rawBook);
    if (bookKey) {
      const books = _allBooks();
      const bookEntry = books[bookKey];
      if (bookEntry && bookEntry.chapters) {
        const chRec = bookEntry.chapters.find(c => c.num === refP.chapter);
        if (chRec) {
          const isStudy = bookEntry.id === 'matthew';
          const lbl = bookEntry.title + ' ' + refP.chapter + (refP.verse != null ? ':' + refP.verse + (refP.verseEnd ? '-' + refP.verseEnd : '') : '');
          bibleRefHit = isStudy ? {
            kind: 'study-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            screen: 'matthew-ch', label: lbl, category: 'Study Bible', title: bookEntry.title
          } : {
            kind: 'bible-chapter', bookId: bookEntry.id,
            chapter: refP.chapter, verse: refP.verse, verseEnd: refP.verseEnd,
            label: lbl, category: bookCategory(bookEntry.id), title: bookEntry.title
          };
          scored.push({ item: bibleRefHit, score: 1000 });
        }
      }
    }
  }

  /* Match against all aliases. Score by alias quality:
     - exact match: 900
     - starts-with: 700 - len-diff
     - contains: 400 - position
     - title contains: 200 */
  for (const item of items) {
    if (bibleRefHit &&
        (item.kind === 'bible-chapter' || item.kind === 'study-chapter') &&
        item.bookId === bibleRefHit.bookId && item.chapter === bibleRefHit.chapter) {
      continue; // Already added with verse info from the Bible-ref parser
    }
    let best = 0;
    for (const a of item.aliases) {
      if (a === q) { best = Math.max(best, 900); continue; }
      if (a.startsWith(q)) { best = Math.max(best, 700 - (a.length - q.length)); continue; }
      const idx = a.indexOf(q);
      if (idx >= 0) { best = Math.max(best, 400 - idx); continue; }
    }
    // Title-only contains (lowercase) — even partial title words match
    const titleLc = (item.title || '').toLowerCase();
    if (titleLc.includes(q)) best = Math.max(best, 200);
    if (best > 0) scored.push({ item: item, score: best });
  }

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, limit);
}

/* Get a verse-text preview for a nav item (Bible/study chapters only). */
function navItemPreview(it) {
  if (it.kind === 'bible-chapter') {
    const b = _allBooks()[it.bookId];
    if (!b) return '';
    const ch = b.chapters && b.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.sections && ch.sections.flatMap(s => s.verses).find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    // Show chapter title or first verse
    return (ch.sections && ch.sections[0] && ch.sections[0].heading) || '';
  }
  if (it.kind === 'study-chapter') {
    const M = _matthew();
    if (!M) return '';
    const ch = M.chapters && M.chapters.find(c => c.num === it.chapter);
    if (!ch) return '';
    if (it.verse) {
      const v = ch.verses && ch.verses.find(v => v.n === it.verse);
      return v ? v.text : '';
    }
    return ch.title || '';
  }
  return '';
}

/* ═══════════════════════════════════════════════════════════════
   HIGHLIGHTABLE TEXT
   Renders a text string with highlight marks applied. Used by
   verse renderers, letter segments, and WTLB paragraphs.
═══════════════════════════════════════════════════════════════ */
/* Build the className for a mark based on annotation kind. */
function annMarkClass(ann, isFirst, isLast) {
  const kind = ann.kind || (ann.style === 'underline' ? 'underline' : 'highlight');
  if (kind === 'note') {
    return 'hl-mark hl-note hl-' + ann.color +
      (isFirst ? ' first-segment' : '') +
      (isLast ? ' last-segment' : '');
  }
  if (kind === 'underline') return 'hl-mark hl-underline hl-' + ann.color;
  return 'hl-mark hl-' + ann.color;
}

/* HighlightableText renders text with overlap-aware nested marks.
   Sweep-line algorithm:
     1. Build a sorted list of boundary positions from every annotation's
        start/end (plus 0 and text.length).
     2. Each adjacent pair of boundaries defines a segment where the SET
        of active annotations is constant.
     3. Render each segment as a chain of nested <mark> elements — one per
        active annotation. Outer = earliest start (tiebreak by id); inner
        elements paint background/decoration ON TOP of outer ones, which
        is the visual we want (more-specific overrides broader).
   Multiple <mark> elements may exist for a single annotation (one per
   segment that it spans). applyNoteIcons treats the LAST mark per group
   in document order as the icon anchor — so a single icon still emits
   for the whole annotation, even when it spans several segments. */
function HighlightableText({ text, hlKey, hlTick }) {
  const annotations = useMemo(() => AnnotationStore.get(hlKey), [hlKey, hlTick]);
  if (!text) return null;
  if (!annotations || annotations.length === 0) {
    return React.createElement("span", { "data-hl-key": hlKey }, text);
  }
  // Clamp ranges to text bounds and drop empties
  const valid = annotations
    .map(a => ({ ann: a, s: Math.max(0, Math.min(a.start, text.length)), e: Math.max(0, Math.min(a.end, text.length)) }))
    .filter(v => v.s < v.e);
  if (valid.length === 0) {
    return React.createElement("span", { "data-hl-key": hlKey }, text);
  }
  // Build sweep boundaries
  const set = new Set([0, text.length]);
  valid.forEach(v => { set.add(v.s); set.add(v.e); });
  const positions = [...set].sort((x, y) => x - y);
  // Compute segments (each with the active annotations)
  const segments = [];
  for (let i = 0; i < positions.length - 1; i++) {
    const ss = positions[i], se = positions[i + 1];
    if (ss >= se) continue;
    const active = valid
      .filter(v => v.s <= ss && v.e >= se)
      .map(v => v.ann)
      .sort((a, b) => a.start - b.start || (a.id || '').localeCompare(b.id || ''));
    segments.push({ start: ss, end: se, active });
  }
  // Track first/last segment per group so the first-segment/last-segment
  // classes (used by tap routing helpers like applyNoteIcons) are accurate.
  const firstSegByGroup = new Map();
  const lastSegByGroup = new Map();
  segments.forEach((seg, idx) => {
    seg.active.forEach(a => {
      if (!firstSegByGroup.has(a.groupId)) firstSegByGroup.set(a.groupId, idx);
      lastSegByGroup.set(a.groupId, idx);
    });
  });
  // Mid-word boundary detection: if segment N's right edge falls between two
  // word characters in the original text, mark segment N for "no break after"
  // — a CSS ::after pseudo with a word-joiner glyph will prevent the browser
  // from breaking a word across the mark/text seam.
  const isWordChar = (c) => !!c && /[\w’'-]/.test(c);
  segments.forEach((seg, idx) => {
    if (idx < segments.length - 1) {
      const lastCh = text[seg.end - 1];
      const nextCh = text[seg.end];
      if (isWordChar(lastCh) && isWordChar(nextCh)) seg.noBreakAfter = true;
    }
  });
  return React.createElement("span", { "data-hl-key": hlKey },
    segments.map((seg, segIdx) => {
      const segText = text.slice(seg.start, seg.end);
      if (seg.active.length === 0) {
        // Plain text — wrap in a span only if we need the no-break-after marker.
        if (seg.noBreakAfter) {
          return React.createElement("span", { key: 'p' + segIdx, "data-no-break-after": "1" }, segText);
        }
        return React.createElement(React.Fragment, { key: 'p' + segIdx }, segText);
      }
      // Wrap text inside-out: i = active.length - 1 is innermost, i = 0 is outermost.
      // The OUTERMOST element gets the React key for the span's children array.
      let node = segText;
      for (let i = seg.active.length - 1; i >= 0; i--) {
        const ann = seg.active[i];
        const kind = ann.kind || (ann.style === 'underline' ? 'underline' : 'highlight');
        const isFirst = firstSegByGroup.get(ann.groupId) === segIdx;
        const isLast = lastSegByGroup.get(ann.groupId) === segIdx;
        const isOutermost = i === 0;
        const props = {
          key: isOutermost ? 'm' + segIdx : 'm' + segIdx + '_' + i,
          className: annMarkClass(ann, isFirst, isLast),
          "data-hl-id": ann.id,
          "data-group-id": ann.groupId,
          "data-kind": kind
        };
        if (isOutermost && seg.noBreakAfter) props["data-no-break-after"] = "1";
        node = React.createElement("mark", props, node);
      }
      return node;
    })
  );
}

/* ═══════════════════════════════════════════════════════════════
   DOM-BASED HIGHLIGHT OVERLAY
   For views with complex children (LetterView, WtlbEntryView),
   we can't use the React-based HighlightableText. Instead,
   after React renders, we walk the DOM and wrap highlighted
   character ranges in <mark> elements.
═══════════════════════════════════════════════════════════════ */
/* Inject inline chain icons at the end of each linked text range inside
   [data-hl-dom] containers. Re-runs on every hlTick. Click → onLinkOpen(blockKey)
   which opens the sidebar showing all links touching that block. */
/* Inline link icons — placed at (or as close as possible to) the END
   of each linked text range. The icon "slides off" three kinds of bad
   placement so it never interrupts content:

     1. Mid-word — slide forward to the end of the current word.
        (Defensive: snapRangeToWords already aligns starts on word
        boundaries, but the parallel-session change to snapRangeToWords
        deliberately leaves END exactly where the user released — so
        the user can intentionally end mid-word but the icon shouldn't.)
     2. Closing punctuation — slide past `.,;:!?)…—` and friends so
        the icon reads as belonging to the word, not splitting the
        punctuation off ("word."[icon] instead of "word"[icon]".").
     3. Adjacent fn-ref / scripture-ref / letter-link / note-icon /
        verse-link-icon — slide PAST these inline elements so the
        icon never lands directly before one (where, on Android, the
        icon would block the tap target — the original bug that drove
        the parallel session to end-of-paragraph placement).

   Multiple links ending at the same offset merge into one icon with
   a `title` count; tapping any icon opens the link sidebar for the
   block, which lists every link touching it.

   CSS: `.inline-link-icon` no longer sets `user-select: none` — the
   span is empty (SVG paths can't be selected anyway), and dropping
   the `none` lets drag-selection pass across the icon on Android
   without breaking. */
function applyDOMLinks() {
  document.querySelectorAll('[data-hl-key][data-hl-dom]').forEach(function(container) {
    var hlKey = container.getAttribute('data-hl-key');
    container.querySelectorAll('.inline-link-icon').forEach(function(el) { el.remove(); });
    container.normalize();

    var links = LinkStore.getForKeyPrefix(hlKey);
    if (!links.length) return;

    // Collect end positions for endpoints attached to this container
    // (either the block itself or a more-specific subkey), merging
    // duplicates so two links ending at the same offset become one
    // icon with count=2.
    //
    // End position can live in two places depending on how the endpoint
    // was built:
    //   (a) A `:N-M` suffix on the key — used by target endpoints that
    //       went through verse-picker / excerpt-picker refinement
    //       (e.g. "letter:foo:2:42-87" or "bible:genesis:1:1").
    //   (b) Separate `start`/`end` fields on the endpoint object — used
    //       by SOURCE endpoints, which carry the user's selection range
    //       but keep the key bare (e.g. key="letter:workers:1",
    //       start=42, end=87, text="…sentence…").
    //
    // Without the (b) fallback, the icon for the source side of an
    // excerpt-to-excerpt link couldn't find its position and slid all
    // the way to end-of-paragraph — the regression the user reported.
    var keyPrefix = hlKey + ':';
    var byEndPos = {};
    links.forEach(function(link) {
      [link.a, link.b].forEach(function(ep) {
        if (!ep || !ep.key) return;
        if (ep.key !== hlKey && ep.key.indexOf(keyPrefix) !== 0) return;
        var endPos = null;
        var m = ep.key.match(/:(\d+)-(\d+)$/);
        if (m) {
          endPos = parseInt(m[2], 10);
        } else if (typeof ep.end === 'number') {
          endPos = ep.end;
        }
        if (endPos == null) return;
        byEndPos[endPos] = (byEndPos[endPos] || 0) + 1;
      });
    });
    if (Object.keys(byEndPos).length === 0) {
      // Legacy link (no :start-end suffix) — fall back to one icon at
      // end of block, same as the prior end-of-paragraph behavior.
      container.appendChild(_buildLinkIcon(hlKey, links.length));
      return;
    }

    // Process highest position first so each insertion doesn't shift the
    // character offsets of earlier (lower-offset) insertions still pending.
    var positions = Object.keys(byEndPos).map(Number).sort(function(a, b) { return b - a; });
    positions.forEach(function(endPos) {
      _insertLinkIconAt(container, hlKey, endPos, byEndPos[endPos]);
    });
  });
}

function _buildLinkIcon(hlKey, count) {
  var icon = document.createElement('span');
  icon.className = 'inline-link-icon';
  icon.title = count + ' link' + (count > 1 ? 's' : '');
  icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
  var openSidebar = function(e) {
    e.preventDefault(); e.stopPropagation();
    if (window.__openLinkSidebar) window.__openLinkSidebar(hlKey);
  };
  icon.addEventListener('click', openSidebar);
  icon.addEventListener('touchend', openSidebar);
  return icon;
}

function _insertLinkIconAt(container, hlKey, endPos, count) {
  var WORD = /[\w’'\-]/;
  var CLOSE_PUNCT = /[.,;:!?)\]}”’…—]/;
  // Inline elements the icon must NOT land directly before — sliding
  // past keeps their tap targets clear and matches user intent
  // (icons should bracket the linked phrase, not interrupt
  // reference / footnote markers).
  var SKIP_RX = /\b(fn-ref|tap-ref|letter-link-ref|verse-link-icon|hl-note-icon)\b/;

  function isSkip(el) {
    return el && el.nodeType === 1 && el.className && SKIP_RX.test(el.className);
  }
  function isPhraseChar(c) { return !!c && (WORD.test(c) || CLOSE_PUNCT.test(c)); }

  /* Starting from `node`, walk forward through the DOM looking for the
     first "insertable" position that isn't directly before a skip element.
     A skip element is jumped over as a unit. When the current node has no
     nextSibling, walk UP to the parent and try again — this handles cases
     like `<span>...written.</span><span class="fn-ref">1</span>` where the
     fn-ref is a sibling of the text's wrapper, not of the text itself.
     Returns the DOM node to insert before, or null to append to container. */
  function nextInsertionPoint(node) {
    var cur = node;
    while (cur && cur !== container) {
      var sib = cur.nextSibling;
      if (sib === null) {
        cur = cur.parentElement;
        continue;
      }
      if (isSkip(sib)) {
        cur = sib;
        continue;
      }
      return sib;
    }
    return null;
  }

  // Collect all text nodes in document order. We slide across text-node
  // boundaries (through inline emphasis wrappers like <em>/<strong>/<i>)
  // when there's no visible whitespace between them — Android selection
  // handles often snap to text-node boundaries, so a user dragging into
  // an italicised phrase like "...become the <em>same?</em>..." can land
  // the selection END at the boundary BEFORE the <em>. Without the cross-
  // node slide the icon ends up at "...become the [icon]same?" — exactly
  // the bug the user reported. With the slide we follow the phrase into
  // the next text node until reaching real whitespace.
  var textNodes = [];
  var w = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
  while (w.nextNode()) textNodes.push(w.currentNode);

  // Find the text node + local offset for endPos.
  var charPos = 0, nodeIdx = -1, localOffset = 0;
  for (var i = 0; i < textNodes.length; i++) {
    var nodeEnd = charPos + textNodes[i].length;
    if (endPos > charPos && endPos <= nodeEnd) {
      nodeIdx = i;
      localOffset = endPos - charPos;
      break;
    }
    charPos = nodeEnd;
  }
  if (nodeIdx < 0) {
    container.appendChild(_buildLinkIcon(hlKey, count));
    return;
  }

  // If endPos landed INSIDE a skip element (fn-ref bubble's "1" text node,
  // a letter-link's label text, etc.), slide past the whole skip element
  // instead of placing the icon inside it.
  var ancestor = textNodes[nodeIdx].parentElement;
  var skipAncestor = null;
  while (ancestor && ancestor !== container) {
    if (isSkip(ancestor)) skipAncestor = ancestor;
    ancestor = ancestor.parentElement;
  }
  if (skipAncestor) {
    var ref = nextInsertionPoint(skipAncestor);
    var icon = _buildLinkIcon(hlKey, count);
    if (ref) ref.parentNode.insertBefore(icon, ref);
    else container.appendChild(icon);
    return;
  }

  // Block-level tags that visually break the reading flow. When sliding
  // across text-node boundaries, we STOP if the path between two adjacent
  // text nodes contains any of these — but we KEEP going through inline
  // emphasis wrappers (em/strong/i/b/span/etc.) so a phrase like
  // "...the <em>same?</em> Therefore..." reads as one continuous unit
  // for icon-placement purposes.
  var BLOCK_TAGS = /^(BR|P|DIV|H[1-6]|LI|BLOCKQUOTE|HR|UL|OL|TR|TD|TH|TABLE|SECTION|ARTICLE|HEADER|FOOTER|NAV|MAIN|FIGURE|FIGCAPTION|PRE|ADDRESS)$/;
  function hasBlockBetween(prevTextNode, nextTextNode) {
    var bw = document.createTreeWalker(container, NodeFilter.SHOW_ALL, null, false);
    bw.currentNode = prevTextNode;
    var n;
    while ((n = bw.nextNode())) {
      if (n === nextTextNode) return false;
      if (n.nodeType === 1 && BLOCK_TAGS.test(n.tagName)) return true;
    }
    return true;
  }

  // Slide forward through phrase characters (word chars + closing
  // punctuation), crossing text-node boundaries whenever the next text
  // node is in the SAME inline context — i.e., no block element on the
  // DOM path between them. This is what makes the icon flow through an
  // <em>-wrapped phrase even when Android's selection handle dropped at
  // the text-node boundary BEFORE the <em>.
  // Skip elements (fn-ref, etc.) are jumped over by advancing the
  // node index past any of their child text nodes — they're part of
  // the visible reading flow but the icon shouldn't land inside them.
  while (true) {
    var text = textNodes[nodeIdx].nodeValue;
    while (localOffset < text.length && isPhraseChar(text[localOffset])) {
      localOffset++;
    }
    if (localOffset < text.length) break;          // stopped at whitespace mid-node
    var nextNodeIdx = nodeIdx + 1;
    while (nextNodeIdx < textNodes.length) {
      var na = textNodes[nextNodeIdx].parentElement;
      var inSkip = false;
      while (na && na !== container) {
        if (isSkip(na)) { inSkip = true; break; }
        na = na.parentElement;
      }
      if (!inSkip) break;
      nextNodeIdx++;
    }
    if (nextNodeIdx >= textNodes.length) break;     // no more nodes
    if (hasBlockBetween(textNodes[nodeIdx], textNodes[nextNodeIdx])) break;
    nodeIdx = nextNodeIdx;
    localOffset = 0;
  }

  // Final placement.
  var finalNode = textNodes[nodeIdx];
  var finalText = finalNode.nodeValue;
  var insertBeforeNode = null;
  if (localOffset >= finalText.length) {
    insertBeforeNode = nextInsertionPoint(finalNode);
  } else if (localOffset === 0) {
    insertBeforeNode = finalNode;
  } else {
    insertBeforeNode = finalNode.splitText(localOffset);
  }
  var iconEl = _buildLinkIcon(hlKey, count);
  if (insertBeforeNode) {
    insertBeforeNode.parentNode.insertBefore(iconEl, insertBeforeNode);
  } else {
    container.appendChild(iconEl);
  }
}

/* Find the nearest word-boundary insertion point AFTER a mark. If the
   mark ends in the middle of a word, the icon slides forward to the
   first whitespace/punctuation/end-of-container boundary so it never
   appears mid-word. Returns either { kind: 'afterMark' } meaning insert
   immediately after the mark element, or { kind: 'beforeNode', node }
   meaning split that text node and insert before the split-off tail.
   The mark's data range is unchanged — only the visual icon position
   shifts; the wavy active-state underline still reflects what was
   actually selected. */
function findNoteIconInsertionPoint(mark) {
  const container = mark.closest('[data-hl-key]');
  if (!container) return { kind: 'afterMark' };
  // Boundary chars: any whitespace OR closing punctuation (so a mark
  // ending right before a comma/period gets its icon AFTER the punct,
  // which reads more naturally).
  const boundaryRx = /[\s.,;:!?)\]}”’—\-]/;
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
  let pastMark = false;
  while (walker.nextNode()) {
    const tn = walker.currentNode;
    if (mark.contains(tn)) { pastMark = true; continue; }
    if (!pastMark) continue;
    const text = tn.nodeValue;
    if (text.length === 0) continue;
    // If this text node starts with a boundary char, no shift needed
    if (boundaryRx.test(text[0])) return { kind: 'afterMark' };
    // Otherwise, find the first boundary char in this text node
    const m = text.match(boundaryRx);
    if (m) {
      // Insert AFTER the boundary char so e.g. "wor[icon]d" becomes "word[icon] " — the
      // icon ends up just past the word that the mark started inside.
      // We split at idx+1 so the boundary stays attached to the preceding word.
      const splitAt = m.index + 1;
      if (splitAt >= text.length) return { kind: 'afterMark' };
      const tail = tn.splitText(splitAt);
      return { kind: 'beforeNode', node: tail };
    }
    // No boundary in this text node — keep walking; the next sibling
    // element edge is itself a boundary, so fall through to afterMark
    // if no later text node has a boundary either.
  }
  return { kind: 'afterMark' };
}

/* applyNoteIcons — places one 📝 icon per note group at the nearest
   word boundary after the group's last segment. When two or more
   groups would land at the same insertion point (e.g. two notes
   covering the same passage end at the same word), the icons merge
   into a single badge-decorated icon that opens a disambiguation
   popover. Rebuilds icons fully each call. */
/* Char offset from container start to position immediately AFTER a mark.
   Range.toString().length gives the character count, which lines up with
   the offsets in AnnotationStore (computed against container.textContent). */
function _markCharEnd(mark) {
  const container = mark.closest('[data-hl-key]');
  if (!container) return -1;
  try {
    const range = document.createRange();
    range.selectNodeContents(container);
    range.setEndAfter(mark);
    return range.toString().length;
  } catch (e) { return -1; }
}

function applyNoteIcons() {
  document.querySelectorAll('.hl-note-icon').forEach(el => el.remove());
  // Per-group last mark in document order
  const lastByGroup = new Map();
  document.querySelectorAll('mark.hl-note[data-group-id]').forEach(mark => {
    lastByGroup.set(mark.getAttribute('data-group-id'), mark);
  });
  // Merge groups whose marks end at the same CHARACTER OFFSET inside the same
  // container. This catches overlapping notes whose last marks are nested
  // (e.g. yellow wraps green; both end at char 22) so they share one icon
  // with a count badge. The icon's click handler routes the merged set to
  // the multi-note disambiguation popover.
  const groupsByTarget = new Map(); // key: hlKey:charEnd → list of {gid, mark, ip}
  lastByGroup.forEach((mark, gid) => {
    const ip = findNoteIconInsertionPoint(mark);
    const container = mark.closest('[data-hl-key]');
    const hlKey = container ? container.getAttribute('data-hl-key') : '';
    const charEnd = _markCharEnd(mark);
    const key = hlKey + ':' + charEnd;
    if (!groupsByTarget.has(key)) groupsByTarget.set(key, []);
    groupsByTarget.get(key).push({ gid, mark, ip });
  });

  groupsByTarget.forEach(entries => {
    const primary = entries[0];
    const allGids = entries.map(e => e.gid);
    const container = primary.mark.closest('[data-hl-key]');
    const hlKey = container ? container.getAttribute('data-hl-key') : '';
    const colorClass = (primary.mark.className.match(/\bhl-(yellow|green|pink|red|orange|blue|purple|teal|brown|gray|cyan)\b/) || [])[0] || '';
    const icon = document.createElement('span');
    icon.className = 'hl-note-icon' + (colorClass ? ' ' + colorClass : '') + (entries.length > 1 ? ' hl-note-icon-badge' : '');
    icon.setAttribute('data-group-id', primary.gid);
    icon.setAttribute('data-group-ids', allGids.join(','));
    icon.setAttribute('data-hl-key', hlKey);
    if (entries.length > 1) icon.setAttribute('data-count', String(entries.length));
    icon.title = entries.length > 1 ? (entries.length + ' notes here') : 'Open note';
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>';
    var _openIcon = function(x, y) {
      if (entries.length > 1 && window.__showMultiNote) {
        window.__showMultiNote(allGids, x, y);
      } else if (window.__openNote) {
        window.__openNote(primary.gid);
      }
    };
    icon.addEventListener('click', function(e) {
      e.stopPropagation();
      _openIcon(e.clientX, e.clientY);
    });
    /* Android WebView sometimes doesn't fire 'click' on inline DOM-injected
       spans. Adding a touchend handler (with preventDefault to suppress the
       subsequent synthetic click and prevent text-selection interference)
       guarantees the icon opens the note on Android. */
    icon.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var t = e.changedTouches && e.changedTouches[0];
      _openIcon(t ? t.clientX : 0, t ? t.clientY : 0);
    });
    const ip = primary.ip;
    if (ip.kind === 'beforeNode' && ip.node && ip.node.parentNode) {
      // Glue the icon to the preceding word: if the preceding text node ends
      // in a regular space, MOVE that space to the tail (post-icon) text node.
      // The wrap point (the space) now sits AFTER the icon, so the line breaks
      // between the icon and the next word — not between the highlighted text
      // and the icon. Without this, a mid-word annotation would push the icon
      // (and whatever highlight tail follows it) to the next line, splitting
      // the visual highlight awkwardly across lines.
      const prev = ip.node.previousSibling;
      if (prev && prev.nodeType === 3 && / $/.test(prev.nodeValue)) {
        prev.nodeValue = prev.nodeValue.replace(/ $/, '');
        ip.node.nodeValue = ' ' + ip.node.nodeValue;
      }
      ip.node.parentNode.insertBefore(icon, ip.node);
    } else if (primary.mark.nextSibling) {
      primary.mark.parentNode.insertBefore(icon, primary.mark.nextSibling);
    } else {
      primary.mark.parentNode.appendChild(icon);
    }
  });
}

/* applyActiveNoteState — toggle .is-active on the marks/icons whose
   groupId matches window.__activeNoteGroup. Called after DOM rebuilds
   (so freshly-rendered marks pick up the active state) and from the
   App effect when noteSheetTarget changes. */
function applyActiveNoteState() {
  document.querySelectorAll('.hl-note.is-active, .hl-note-icon.is-active')
    .forEach(el => el.classList.remove('is-active'));
  const gid = window.__activeNoteGroup;
  if (!gid) return;
  const safe = String(gid).replace(/"/g, '\\"');

function applyDOMHighlights() {
  document.querySelectorAll('[data-hl-key]').forEach(function(container) {
    // Skip React-managed containers (HighlightableText)
    if (container.querySelector('mark.hl-mark[data-hl-id]') || container.childElementCount === 0 && container.textContent && !container.querySelector('mark.hl-dom')) {
      if (!container.hasAttribute('data-hl-dom')) return;
    }
    if (!container.hasAttribute('data-hl-dom')) return;

    var hlKey = container.getAttribute('data-hl-key');
    // Clean existing DOM-applied marks AND any lingering note icons
    var existing = container.querySelectorAll('mark.hl-dom');
    for (var i = 0; i < existing.length; i++) {
      var mark = existing[i];
      var parent = mark.parentNode;
      while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
      parent.removeChild(mark);
    }
    // Note icons are managed globally by applyNoteIcons() — strip any
    // that were inserted into this container so they don't survive
    // a subsequent rebuild without going through the global walker.
    container.querySelectorAll('.hl-note-icon').forEach(function(el) { el.remove(); });
    container.normalize();

    var anns = AnnotationStore.get(hlKey);
    if (!anns.length) return;

    // Sort by start; track per-group first/last segment within THIS container
    var sorted = anns.slice().sort(function(a, b) { return a.start - b.start; });
    var groupCounts = {};
    sorted.forEach(function(a) { groupCounts[a.groupId] = (groupCounts[a.groupId] || 0) + 1; });
    var groupSeen = {};

    // Apply each annotation. Process in order, rebuilding map after each
    // because splitting text nodes invalidates positions.
    for (var hi = 0; hi < sorted.length; hi++) {
      var ann = sorted[hi];
      var seenIdx = groupSeen[ann.groupId] || 0;
      var isFirst = seenIdx === 0;
      var isLast = seenIdx === groupCounts[ann.groupId] - 1;
      groupSeen[ann.groupId] = seenIdx + 1;
      var kind = ann.kind || (ann.style === 'underline' ? 'underline' : 'highlight');

      // Re-walk text nodes (cheap for typical paragraph sizes)
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
      var textNodes = [];
      var charPos = 0;
      while (walker.nextNode()) {
        var node = walker.currentNode;
        textNodes.push({ node: node, start: charPos, end: charPos + node.length });
        charPos += node.length;
      }
      var lastMark = null;
      for (var ti = 0; ti < textNodes.length; ti++) {
        var tn = textNodes[ti];
        var overlapStart = Math.max(ann.start, tn.start);
        var overlapEnd = Math.min(ann.end, tn.end);
        if (overlapStart >= overlapEnd) continue;
        var localStart = overlapStart - tn.start;
        var localEnd = overlapEnd - tn.start;
        var tNode = tn.node;
        if (localEnd < tNode.length) tNode.splitText(localEnd);
        var midNode = localStart > 0 ? tNode.splitText(localStart) : tNode;
        var m = document.createElement('mark');
        var cls = 'hl-mark hl-dom hl-' + ann.color;
        if (kind === 'underline') cls += ' hl-underline';
        else if (kind === 'note') {
          cls += ' hl-note';
          if (isFirst && ti === textNodes.findIndex(function(x) { return Math.max(ann.start, x.start) < Math.min(ann.end, x.end); })) cls += ' first-segment';
        }
        m.className = cls;
        m.setAttribute('data-hl-id', ann.id);
        m.setAttribute('data-group-id', ann.groupId);
        m.setAttribute('data-kind', kind);
        midNode.parentNode.replaceChild(m, midNode);
        m.appendChild(midNode);
        lastMark = m;
      }
      // last-segment class is still useful for the active-state styling
      // anchor (right side of the wavy underline). The trailing icon is
      // added by applyNoteIcons() — once per group, globally.
      if (kind === 'note' && lastMark) lastMark.classList.add('last-segment');
      // Mid-word boundary suppression: when the annotation ends between
      // two letters in the original text, mark the last mark with
      // data-no-break-after so the CSS pseudo word-joiner prevents the
      // browser from breaking the word across the mark/text seam.
      if (lastMark) {
        var fullText = container.textContent;
        var lastCh = fullText.charAt(ann.end - 1);
        var nextCh = fullText.charAt(ann.end);
        if (lastCh && nextCh && /[\w’'-]/.test(lastCh) && /[\w’'-]/.test(nextCh)) {
          lastMark.setAttribute('data-no-break-after', '1');
        }
      }
    }
  });
}

function SelectionToolbar({ hlTick, setHlTick, onLinkRequest, onNoteRequest }) {

  const computeOffset = useCallback((container, node, offset) => {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    let charPos = 0;
    while (walker.nextNode()) {
      if (walker.currentNode === node) return charPos + offset;
      charPos += walker.currentNode.textContent.length;
    }
    return charPos + offset;

    window.__hideSelectionToolbar = () => {
      setVisible(false);

    };
    return () => { window.__hideSelectionToolbar = null; };

      if (suppressRef.current) return;

      if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
        setVisible(false);
        return;
      }
      const range = sel.getRangeAt(0);
      // Strip .fn-ref bubbles and .hl-note-icon elements from the selection text
      // so footnote numbers and note icons don't bleed into the link preview.

  if (parts[0] === 'letter' || parts[0] === 'wtlb' || parts[0] === 'blessed' || parts[0] === 'holy-days') {
    const id = parts[1];
    const ctx = findEntryContext(id, parts[0]);
    if (ctx && ctx.kind === 'study-letter') {
      return {
        type: 'study-letter', key: sourceKey,
        letterId: id, studyId: ctx.studyId, studyChapterId: ctx.studyChapterId,
        screen: ctx.screen, collection: ctx.collection,
        label: sourceLabel || ctx.title, ...excerpt
      };
    }
    if (ctx) {
      const base = {
        type: ctx.kind, key: sourceKey, screen: ctx.screen,
        collection: ctx.collection, label: sourceLabel || ctx.title, ...excerpt
      };
      if (ctx.kind === 'letter') base.letterId = id;
      else base.entryId = id;
      return base;
    }
    // Fallback: keep prior shape so we degrade gracefully on unknown ids
    if (parts[0] === 'letter') return { type: 'letter', key: sourceKey, letterId: id, label: sourceLabel || sourceKey, ...excerpt };
    if (parts[0] === 'wtlb')   return { type: 'wtlb',   key: sourceKey, entryId: id,  label: sourceLabel || sourceKey, ...excerpt };
    return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
  }
  return { type: parts[0], key: sourceKey, label: sourceLabel || sourceKey, ...excerpt };
}

/* Persist a link, dedup'ing if the exact pair already exists.
   Returns the link object on success OR when the link already exists
   (so callers can show the green ✓ either way). Returns null only when
   sourceEndpoint.key is missing. */
function persistLink(sourceEndpoint, targetEndpoint) {
  const existing = LinkStore.getForKey(sourceEndpoint.key);
  const dup = existing.find(l => l.a.key === targetEndpoint.key || l.b.key === targetEndpoint.key);
  if (dup) return dup; // already exists — return it so the green ✓ still shows
  const link = { id: lnkId(), a: sourceEndpoint, b: targetEndpoint, created: Date.now() };
  LinkStore.add(link);
  return link;
}

function LinkPicker({ sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, hlTick, setHlTick, onClose, onRequestRefine, lastCreatedLink, onLinkCreated }) {
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  // Re-read RecentNavStore every render so newly-added picks float to the top
  // without remounting the picker. Cheap localStorage read; runs at most once
  // per render.
  const [, setRecentTick] = useState(0);
  const bumpRecent = useCallback(() => setRecentTick(t => t + 1), []);
  const recent = RecentNavStore.list();
  useEffect(() => {
    if (inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
  }, []);

  // Android back button closes the picker (same save/restore pattern as every
  // other overlay in the app — picks up the previous closer on unmount).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = onClose;
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // Compute search results (or empty when input is empty)
  const results = useMemo(() => {
    if (!input.trim()) return [];
    return searchNavIndex(input.trim(), 30).map(s => s.item);
  }, [input]);

  const createLinkTo = useCallback((item) => {
    if (!item || !sourceKey) return;
    const target = navItemToEndpoint(item);
    if (!target) return;
    RecentNavStore.add(item);

    // Refinement step:
    //   Bible/study chapter without a specific verse → verse picker
    //   Letter/WTLB/Blessed/Holy-Days → excerpt picker (text range)
    const needsVersePicker =
      (target.type === 'bible' || target.type === 'study') && !target.verse;
    const needsExcerptPicker =
      target.type === 'letter' || target.type === 'wtlb' ||
      target.type === 'blessed' || target.type === 'holy-days' ||
      target.type === 'study-letter';
    if (needsVersePicker || needsExcerptPicker) {
      onRequestRefine && onRequestRefine({
        kind: needsVersePicker ? 'verse' : 'excerpt',
        target, item
      });
      return; // refinement screen takes over (it leaves us back here on confirm)
    }

    // Direct create: stay open so user can confirm (✓) or undo (×).
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, target);
    if (newLink) {
      setHlTick(t => t + 1);
      bumpRecent();
      onLinkCreated(newLink);
    }
  }, [sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, bumpRecent, onLinkCreated]);

  // Render a row for a nav item (used in both Results and Recent lists)
  const renderItemRow = (item, key) => {
    return React.createElement("button", {
      key: key, className: "navpick-row",
      onClick: () => createLinkTo(item)
    },
      React.createElement("div", { className: "navpick-row-icon navpick-row-icon-" + item.kind },
        item.kind === 'bible-chapter' ? (item.category === 'Old Testament' ? 'OT' : 'NT') :
        item.kind === 'study-chapter' ? 'SB' :
        item.kind === 'study-letter-chapter' ? 'LS' :
        (COL_NAV_ICON.get(item.collection) || '?')
      ),
      React.createElement("div", { className: "navpick-row-text" },
        React.createElement("div", { className: "navpick-row-label" }, item.label),
        React.createElement("div", { className: "navpick-row-cat" }, item.category || '')
      )
    );
  };

  const isEmptyQuery = !input.trim();

  return React.createElement("div", { className: "link-picker-overlay", onClick: onClose },
    React.createElement("div", { className: "link-picker-sheet navpick-sheet", onClick: e => e.stopPropagation() },
      // Header: title + red × (undo last link) + green ✓ (confirm & close)
      React.createElement("div", { className: "navpick-header" },
        React.createElement("span", { className: "navpick-title" }, "Link"),
        React.createElement("button", {
          className: "navpick-close navpick-close-undo",
          onClick: () => {
            if (lastCreatedLink) {
              LinkStore.remove(lastCreatedLink.id);
              onLinkCreated(null);
            }
            onClose();
          },
          "aria-label": "Cancel"
        }, "×"),
        lastCreatedLink && React.createElement("button", {
          className: "navpick-confirm-green",
          onClick: onClose,
          "aria-label": "Done"
        },
          React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement("polyline", { points: "20 6 9 17 4 12" })
          )
        )
      ),
      // Search input (rounded pill matching reference)
      React.createElement("div", { className: "navpick-search-wrap" },
        React.createElement("input", {
          ref: inputRef, className: "navpick-search-input",
          placeholder: "Search for verses, letters, or titles…",
          value: input, onChange: e => setInput(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter' && results.length > 0) createLinkTo(results[0]); }
        })
      ),
      // Body: Recent OR Results
      React.createElement("div", { className: "navpick-body" },
        isEmptyQuery ? (
          recent.length > 0 ?
            React.createElement(React.Fragment, null,
              React.createElement("div", { className: "navpick-section-label" }, "Recent"),
              recent.map((item, i) => renderItemRow(item, 'r' + i))
            ) :
            React.createElement("div", { className: "navpick-empty" },
              React.createElement("div", { className: "navpick-empty-title" }, "Search to link"),
              React.createElement("div", { className: "navpick-empty-hint" }, "Examples: \"Eph 6:5\", \"v1l2\", \"WTLB1 33\", or a letter title.")
            )
        ) : (
          results.length > 0 ?
            React.createElement(React.Fragment, null,
              React.createElement("div", { className: "navpick-section-label" }, "Results"),
              results.map((item, i) => renderItemRow(item, 's' + i))
            ) :
            React.createElement("div", { className: "navpick-empty" },
              React.createElement("div", { className: "navpick-empty-title" }, "No matches"),
              React.createElement("div", { className: "navpick-empty-hint" }, "Try \"Genesis 1\", \"Eph 6:5\", \"V2 letter 5\", \"The Wide Path\", \"WTLB1 33\".")
            )
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   VERSE PICKER SCREEN
   Full-screen overlay shown after the user picks a chapter (with
   no verse) in LinkPicker. Shows every verse of the chapter with
   tap-to-select; tap a 2nd verse to extend to a range. The check
   icon in the header confirms and creates the link.
═══════════════════════════════════════════════════════════════ */
function VersePickerScreen({ refineRequest, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose }) {
  const target = refineRequest.target;
  const item = refineRequest.item;
  const isStudy = target.type === 'study';
  const [selStart, setSelStart] = useState(null); // verse number anchor
  const [selEnd, setSelEnd] = useState(null);     // verse number end (inclusive)

  // Resolve chapter object
  const chapter = useMemo(() => {
    if (isStudy) {
      const M = _matthew();
      return M && M.chapters.find(c => c.num === target.chapter) || null;
    }
    const b = _allBooks()[target.bookId];
    return b && b.chapters.find(c => c.num === target.chapter) || null;
  }, [isStudy, target.bookId, target.chapter]);

  // Flat verses list — handles both Bible (sections[].verses[]) and study (verses[]) shapes
  const verses = useMemo(() => {
    if (!chapter) return [];
    if (chapter.verses) return chapter.verses;
    if (chapter.sections) return chapter.sections.flatMap(s => s.verses);
    return [];
  }, [chapter]);

  // Android back button goes back to LinkPicker (same save/restore pattern).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = () => onClose(null);
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  const handleVerseTap = useCallback((vn) => {
    // 1st tap: anchor; 2nd tap (different verse): range; 3rd tap (anchor again): clear
    if (selStart == null) { setSelStart(vn); setSelEnd(vn); return; }
    if (selStart === vn && selEnd === vn) { setSelStart(null); setSelEnd(null); return; }
    if (selStart != null && selEnd != null && selStart === selEnd) {
      // Extend to range
      const a = Math.min(selStart, vn), b = Math.max(selStart, vn);
      setSelStart(a); setSelEnd(b);
      return;
    }
    // Already a range — restart from this verse
    setSelStart(vn); setSelEnd(vn);
  }, [selStart, selEnd]);

  const confirmLink = useCallback(() => {
    if (selStart == null) { onClose(); return; }
    const verse = selStart;
    const verseEnd = selEnd !== selStart ? selEnd : null;
    const refinedTarget = { ...target };
    refinedTarget.verse = verse;
    if (verseEnd) refinedTarget.verseEnd = verseEnd;
    // Update key + label to reflect the chosen verse range
    if (isStudy) {
      refinedTarget.key = 'study:' + target.bookId + '-' + target.chapter + ':' + verse + (verseEnd ? '-' + verseEnd : '');
    } else {
      refinedTarget.key = bibleHlKey(target.bookId, target.chapter, verse) + (verseEnd ? '-' + verseEnd : '');
    }
    const baseLabel = item.title || target.label.replace(/\s\d+(?::\d+(?:-\d+)?)?$/, '');
    refinedTarget.label = baseLabel + ' ' + target.chapter + ':' + verse + (verseEnd ? '-' + verseEnd : '');
    // Refresh preview text using verse text
    const v = verses.find(v => v.n === verse);
    if (v) refinedTarget.preview = v.text;

    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, refinedTarget);
    if (newLink) setHlTick(t => t + 1);
    onClose(newLink || null);
  }, [selStart, selEnd, target, item, isStudy, verses, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose]);

  if (!chapter) {
    return React.createElement("div", { className: "picker-screen" },
      React.createElement("div", { className: "picker-header" },
        React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
        React.createElement("span", { className: "picker-title" }, "Select Verse")
      ),
      React.createElement("div", { className: "picker-empty" }, "Chapter not found.")
    );
  }

  const titleText = (item.title || target.label.replace(/\s\d+$/, '')) + ' ' + target.chapter;
  const hasSelection = selStart != null;
  const isInRange = (n) => hasSelection && n >= Math.min(selStart, selEnd) && n <= Math.max(selStart, selEnd);

  return React.createElement("div", { className: "picker-screen" },
    React.createElement("div", { className: "picker-header" },
      React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
      React.createElement("span", { className: "picker-title" }, "Select Text to Link"),
      React.createElement("button", {
        className: "picker-confirm" + (hasSelection ? "" : " is-disabled"),
        onClick: confirmLink, "aria-label": "Confirm", disabled: !hasSelection
      },
        React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.4", strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("polyline", { points: "20 6 9 17 4 12" })
        )
      )
    ),
    React.createElement("div", { className: "picker-body" },
      React.createElement("div", { className: "picker-chapter-title" }, titleText),
      React.createElement("div", { className: "picker-verses" },
        verses.map(v => React.createElement("p", {
          key: v.n,
          className: "picker-verse" + (isInRange(v.n) ? " is-selected" : ""),
          onClick: () => handleVerseTap(v.n)
        },
          React.createElement("span", { className: "picker-verse-num" }, v.n + " "),
          v.text
        ))
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   LETTER EXCERPT PICKER SCREEN
   Full-screen overlay shown after the user picks a Letter/WTLB/
   Blessed/Holy-Days entry in LinkPicker. Renders the entry's body
   text and lets the user select a text range with native selection.
   The check icon captures the selection's character offsets and
   stores them on the link's target endpoint.
═══════════════════════════════════════════════════════════════ */
function LetterExcerptPickerScreen({ refineRequest, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose }) {
  const target = refineRequest.target;
  const item = refineRequest.item;
  const bodyRef = useRef(null);
  const [selInfo, setSelInfo] = useState(null); // { blockIdx, start, end, text }

  // Resolve entry data via the centralized context lookup, which already
  // covers volume letters (with prefaces), Timothy/Flock/Rebuke, WTLB One/Two,
  // The Blessed, Holy Days, AND Bible Study chapters (non-Matthew).
  const entry = useMemo(() => {
    const id = target.letterId || target.entryId || target.studyChapterId;
    if (!id) return null;
    const ctx = findEntryContext(id);
    return ctx ? ctx.entry : null;
  }, [target.letterId, target.entryId, target.studyChapterId]);

  // Build a flat array of plain-text blocks from the entry. Each block's
  // `key` is the bare data-index that LetterView/WtlbEntryView use for their
  // hlKey, so a stored link with a "letter:id:N:start-end" target will
  // prefix-match the rendered block element.
  const blocks = useMemo(() => {
    if (!entry) return [];
    if (entry.paragraphs) {
      return entry.paragraphs.map((p, i) => ({
        key: String(i),
        text: (p.text || '').replace(/_([^_]+)_/g, '$1').replace(/\*\*([^*]+)\*\*/g, '$1').replace(/\{\{ref:([^}]+)\}\}/g, '$1').replace(/\{\{nav:([^}]+)\}\}/g, '')
      }));
    }
    if (entry.blocks) {
      return entry.blocks.map((b, i) => {
        let text = '';
        if (b.type === 'para' || b.type === 'closing-fn' || b.type === 'intro') {
          text = (b.segments || []).map(s => s.t === 'fn' ? '' : (s.v || '')).join('');
        } else if (b.type === 'closing') {
          text = b.text || '';
        } else if (b.type === 'poetry') {
          text = ((b.lines || b.segments) || []).map(line =>
            Array.isArray(line) ? line.map(s => s.t === 'fn' ? '' : (s.v || '')).join('') :
            (line && line.t === 'fn' ? '' : (line && line.v) || '')
          ).join('\n');
        } else if (b.type === 'note' || b.type === 'scripture') {
          text = b.text || '';
        }
        // Keep original index even when text is empty so link-back keys match.
        return { key: String(i), text };
      }).filter(b => b.text.trim().length > 0);
    }
    return [];
  }, [entry]);

  // Android back button goes back to LinkPicker (same save/restore pattern).
  useEffect(() => {
    const prev = window.__closeSheet;
    window.__closeSheet = () => onClose(null);
    return () => { window.__closeSheet = prev || null; };
  }, [onClose]);

  // Capture native selection. Two paths:
  //   captureSelectionSync — runs immediately, returns selInfo or null.
  //     Used as the fallback inside confirmLink so a fast user (select →
  //     tap ✓ within 150 ms) doesn't lose their excerpt to the race
  //     between the touchend timeout and React's state commit.
  //   captureSelection — deferred 150 ms, calls the sync fn then commits
  //     to state for UI (selection-hint quote). The delay is preserved
  //     because on Android the native selection occasionally isn't
  //     finalized immediately on touchend.
  const captureSelectionSync = useCallback(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
    const range = sel.getRangeAt(0);
    const startNode = range.startContainer;
    const blockEl = startNode.nodeType === 3 ? startNode.parentElement.closest('[data-block-key]') : startNode.closest && startNode.closest('[data-block-key]');
    if (!blockEl || !bodyRef.current || !bodyRef.current.contains(blockEl)) return null;
    const blockKey = blockEl.dataset.blockKey;
    const fullText = blockEl.textContent;
    const preRange = document.createRange();
    preRange.selectNodeContents(blockEl);
    preRange.setEnd(range.startContainer, range.startOffset);
    var start = preRange.toString().length;
    var end = start + range.toString().length;
    var snapped = snapRangeToWords(fullText, start, end);
    start = snapped.start;
    return { blockKey, start, end, text: fullText.slice(start, end) };
  }, []);
  const captureSelection = useCallback(() => {
    setTimeout(function() {
      const info = captureSelectionSync();
      if (info) setSelInfo(info);
    }, 150);
  }, [captureSelectionSync]);

  const confirmLink = useCallback(() => {
    const refinedTarget = { ...target };
    // Fall back to a fresh synchronous capture so a tap-confirm-faster-
    // than-150-ms doesn't lose the excerpt. window.getSelection() still
    // holds the user's selection at the moment the ✓ button is tapped
    // (button taps don't clear native text selection by default).
    var info = selInfo || captureSelectionSync();
    if (info) {
      refinedTarget.blockKey = info.blockKey;
      refinedTarget.start = info.start;
      refinedTarget.end = info.end;
      refinedTarget.text = info.text;
      refinedTarget.preview = info.text;
      // Refine the key so per-block link icons are scoped correctly
      const baseKey = target.key.split(':').slice(0, 2).join(':');
      refinedTarget.key = baseKey + ':' + info.blockKey + ':' + info.start + '-' + info.end;
    }
    const sourceEndpoint = buildSourceEndpoint(sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText);
    const newLink = persistLink(sourceEndpoint, refinedTarget);
    if (newLink) setHlTick(t => t + 1);
    onClose(newLink || null);
  }, [selInfo, captureSelectionSync, target, sourceKey, sourceLabel, sourceStart, sourceEnd, sourceText, setHlTick, onClose]);

  if (!entry) {
    return React.createElement("div", { className: "picker-screen" },
      React.createElement("div", { className: "picker-header" },
        React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
        React.createElement("span", { className: "picker-title" }, "Select Text to Link")
      ),
      React.createElement("div", { className: "picker-empty" }, "Letter not found.")
    );
  }

  const titleText = entry.title || item.label;
  const subtitleText = item.collection || (target.type === 'blessed' ? 'The Blessed' :
                       target.type === 'holy-days' ? 'Holy Days' : '');
  const hasSelection = !!selInfo;

  return React.createElement("div", { className: "picker-screen" },
    React.createElement("div", { className: "picker-header" },
      React.createElement("button", { className: "picker-back", onClick: () => onClose(null), "aria-label": "Back" }, "←"),
      React.createElement("span", { className: "picker-title" }, "Select Text to Link"),
      React.createElement("button", {
        className: "picker-confirm",
        onClick: confirmLink, "aria-label": "Confirm",
        title: hasSelection ? "Link this excerpt" : "Link the whole letter"
      },
        React.createElement("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.4", strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("polyline", { points: "20 6 9 17 4 12" })
        )
      )
    ),
    React.createElement("div", { className: "picker-body picker-body-letter", ref: bodyRef,
      onMouseUp: captureSelection, onTouchEnd: captureSelection
    },
      React.createElement("div", { className: "picker-letter-title" }, titleText),
      subtitleText && React.createElement("div", { className: "picker-letter-subtitle" }, subtitleText),
      hasSelection && React.createElement("div", { className: "picker-selection-hint" },
        '"' + (selInfo.text.length > 80 ? selInfo.text.slice(0, 77) + '…' : selInfo.text) + '"'
      ),
      !hasSelection && React.createElement("div", { className: "picker-selection-hint picker-selection-hint-empty" },
        "Long-press and drag to select an excerpt, then tap ✓. Tap ✓ without selecting to link the whole letter."
      ),
      blocks.map(b => React.createElement("p", {
        key: b.key,
        "data-block-key": b.key,
        className: "picker-letter-block"
      }, b.text))
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   NOTE SHEET
   Bottom sheet for adding/editing a note on a highlight.
═══════════════════════════════════════════════════════════════ */
/* NoteSheet — read + edit modes for a single note (group).
   Opens in 'read' mode by default; SelectionToolbar's Note action and
   the action chip's Convert→Note path open in 'edit' mode for fresh notes.
   The ⋯ menu surfaces Edit · Recolor · Delete (with inline confirm) · Share.
   Notebook membership lives behind a placeholder until Commit 2. */
function NoteSheet({ groupId, startInEditMode, hlTick, setHlTick, onClose, onOpenNotebookPicker }) {
  const note = useMemo(() => NoteStore.get(groupId), [groupId, hlTick]);
  const segs = useMemo(() => AnnotationStore.getByGroup(groupId), [groupId, hlTick]);
  const [mode, setMode] = useState(startInEditMode ? 'edit' : 'read');
  const [body, setBody] = useState(note ? note.body || '' : '');
  const [menuOpen, setMenuOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [showColors, setShowColors] = useState(false);
  const textareaRef = useRef(null);

  useEffect(() => {
    if (mode === 'edit' && textareaRef.current) {
      textareaRef.current.focus();
      // Move cursor to end so Edit-after-existing-content lands at the tail
      const len = textareaRef.current.value.length;
      textareaRef.current.setSelectionRange(len, len);
    }
  }, [mode]);

  if (!note || !segs.length) {
    // Note record went missing — close
    return null;
  }
  const color = note.color || 'yellow';
  const anchor = note.fullText || segs.map(s => s.ann.text || '').join(' … ');
  const truncatedAnchor = anchor.length > 220 ? anchor.slice(0, 220) + '…' : anchor;

  const save = () => {
    NoteStore.update(groupId, { body });
    setHlTick(t => t + 1);
    onClose();
  };

  const cancelEdit = () => {
    setBody(note.body || '');
    if (startInEditMode && !note.body) {
      // Fresh new note, never saved — convert back to a plain highlight
      // so the selection the user made is preserved on screen.
      AnnotationStore.convertGroup(groupId, 'highlight');
      NoteStore.remove(groupId);
      setHlTick(t => t + 1);
      onClose();
      return;
    }
    setMode('read');
  };

  const recolor = (c) => {
    AnnotationStore.recolorGroup(groupId, c);
    NoteStore.update(groupId, { color: c });
    setHlTick(t => t + 1);
    setShowColors(false);
    setMenuOpen(false);
  };

  const remove = () => {
    AnnotationStore.removeGroup(groupId);
    NoteStore.remove(groupId);
    setHlTick(t => t + 1);
    onClose();

function relativeDate(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'Just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  const d = Math.floor(hr / 24);
  if (d < 7) return d + 'd ago';
  if (d < 30) return Math.floor(d / 7) + 'w ago';
  const date = new Date(ts);
  return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
