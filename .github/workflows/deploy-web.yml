name: Deploy Web (PWA → GitHub Pages)

# ── MAINTENANCE: Node 24 Actions migration (do before 2026-09-16) ──
# The actions below (checkout@v4, setup-node@v4, setup-python@v5,
# configure-pages@v5, upload-pages-artifact@v3, deploy-pages@v4) run on
# the Node 20 runtime GitHub is retiring (forced to Node 24 2026-06-16,
# Node 20 removed 2026-09-16). Bump each `uses:` to its current major
# when you do the same in ci.yml — see ci.yml's MAINTENANCE note for the
# changelog ref and rationale.

# W5.1 — publish the web-facing asset subtree to GitHub Pages.
#
# The app is static files; there is no server. Only app/src/main/assets/
# is web-facing. Within it, src/ (ES module sources), *.d.ts, and *.lnk are
# NOT runtime assets and are excluded — with ONE exception: the alternate
# Bible translations + bible-studies.js (src/data/bible-*.js). Those are
# loaded at runtime via <script src="src/data/bible-*.js"> (loadTranslation /
# loadBibleStudies) and are NOT bundled into dist/, so they must ship; the
# staging step copies them back in after the broad src/ exclusion. (The main
# corpus IS in the dist/ bundles, so the rest of src/ stays out.)
# dist/, fonts/, icons/, and every root file (vendor libs, images, css,
# index.html, manifest.json, service-worker.js, offline.html) ship as-is.
#
# All in-app asset paths are relative (dist/bundle-a.js, fonts/..., etc.),
# and the SW + manifest use ./ scope, so serving from the
# /VOTReader-studio/ subpath works with no base-path rewriting. The app
# never changes the URL path (history.pushState({}, '', '') only adds
# back-button entries), so no SPA 404 fallback is needed.
#
# ONE-TIME SETUP (repo owner): Settings → Pages → Source → "GitHub Actions".
# configure-pages (enablement: true) attempts this automatically; the manual
# flip is the fallback if the workflow token cannot enable Pages.

on:
  push:
    branches: [main]
    # Only deploy when something that affects the published output changes.
    # Skips docs / Kotlin / hook / CI-only commits (no point redeploying
    # identical web content). workflow_dispatch is always available for a
    # manual redeploy.
    paths:
      - 'app/src/main/assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tools/build.py'
      - 'tools/sync-sw-version.js'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-flight deploys finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node (pinned via .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'   # B2 — restore ~/.npm keyed on package-lock.json

      - name: Set up Python (tools/build.py emits bundle-a)
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies (npm ci — exact lockfile)
        run: npm ci

      - name: Build bundles + sync SW version
        # `npm run build` regenerates dist/ and syncs the SW CACHE_VERSION
        # from package.json (build:sw), so the deployed SW always carries
        # the right version regardless of the committed state.
        run: npm run build

      - name: Stage web-facing files into _site/
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='src' \
            --exclude='*.d.ts' \
            --exclude='*.lnk' \
            app/src/main/assets/ _site/
          # The alternate translations + bible-studies.js are loaded at
          # runtime from src/data/ (not bundled), so copy just those back in
          # after the blanket src/ exclusion above — the rest of src/ stays out.
          mkdir -p _site/src/data
          cp app/src/main/assets/src/data/bible-*.js _site/src/data/
          echo "Staged file count: $(find _site -type f | wc -l)"
          echo "Translations staged into src/data: $(ls _site/src/data/ | wc -l)"

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
