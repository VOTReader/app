name: CI

# CI pipeline:
#   Q1 — build all 4 bundles, verify committed dist/ matches source, syntax-check src/
#   Q3.4 — lint gate: 0 errors enforced by eslint's default (any error → nonzero exit),
#          warning ceiling pinned by --max-warnings; ratchet down with each Q3.3e fix
# Typecheck / test land later (Q4 / Q5). See quality-uplift-plan.txt.

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (LTS — matches local Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # `npm run build` invokes `python tools/build.py` (which generates
      # bundle-a.js) — setup-python guarantees a `python` on PATH.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies (npm ci — exact lockfile)
        run: npm ci

      - name: Lint (0 errors hard gate, warning ceiling --max-warnings)
        # `npm run lint` chains `npm run lint:globals` (regenerates the
        # auto-globals list) and `eslint app/src/main/assets/src`. ESLint
        # exits nonzero on ANY error, so the 0-error floor (achieved at
        # 7eb491b) is enforced for free — no flag needed.
        # --max-warnings is the ratchet: drops with each Q3.3e commit
        # until exhaustive-deps warnings reach 0, then the value stays at 0.
        run: npm run lint -- --max-warnings 23

      - name: Build all 4 bundles (tools/build.py + esbuild B/C/D)
        run: npm run build

      - name: Verify committed bundles match source
        # After `npm run build` regenerates dist/, the working tree's
        # dist/ should be byte-identical to the committed copy. Any
        # diff = the committed bundles are stale relative to source
        # (someone bypassed the pre-commit hook, or built with a
        # different esbuild). Catches every scenario the hook misses.
        run: git diff --exit-code app/src/main/assets/dist/

      - name: Syntax-check every src/ module
        run: |
          # .js — Node's own parser. node --check cannot parse JSX, so
          # this pass is .js only (corpus data + un-converted modules).
          find app/src/main/assets/src -name '*.js' -print0 | xargs -0 -n1 node --check
          # .jsx — esbuild. JSX-aware, emits clean file:line errors;
          # node --check would reject the syntax outright. -r skips the
          # esbuild run on a tree that has no .jsx files yet.
          find app/src/main/assets/src -name '*.jsx' -print0 | xargs -0 -r -n1 npx esbuild --outfile=/dev/null --log-level=warning
