name: CI

# ── MAINTENANCE: Node 24 Actions migration — DONE 2026-06-03 ──
# GitHub is retiring the Node 20 Actions runtime (runs forced to Node 24 on
# 2026-06-16; Node 20 removed from runners 2026-09-16). Every `uses:` here and
# in deploy-web.yml was bumped to its current Node-24 major, verified against the
# GitHub releases API at fix time: checkout@v6, setup-node@v6, setup-python@v6,
# setup-java@v5, gradle/actions/setup-gradle@v6, cache@v5, upload-artifact@v7
# (deploy-web also: configure-pages@v6, upload-pages-artifact@v5, deploy-pages@v5).
# Only stable inputs are used, so the major jumps are behavior-compatible.
# Ref: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

# CI pipeline:
#   Q1   — build all 4 bundles, verify committed dist/ matches source, syntax-check src/
#   Q3.4 — lint gate: 0 errors enforced by eslint's default (any error → nonzero exit),
#          warning ceiling pinned by --max-warnings 0 (post-Q3.3e steady state).
#   Q4.1 — typecheck gate: `tsc --noEmit` against the Q4 scope (utils + stores +
#          hooks) with checkJs=true, strict=false. Same zero-tolerance discipline
#          as lint (any type error fails CI). Cross-bundle bare-name globals are
#          ambient-declared as `any` in tools/globals.generated.d.ts; not-yet-typed
#          stores/utils carry @ts-nocheck placeholders (lifted as Q4.2/Q4.3 land).
#   NK1  — Kotlin unit-test gate: `./gradlew :app:testDebugUnitTest` runs the
#          JUnit 5 + Robolectric suite (junit-vintage bridges JUnit 4 / JUnit 5
#          on the same platform). Zero-tolerance — any failing Kotlin test fails
#          CI. AGP 9.2.1 requires JDK 17+; we run JDK 21 to match the local
#          toolchain pinned in gradle/gradle-daemon-jvm.properties.

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node (pinned via .nvmrc — matches local)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'   # B2 — restore ~/.npm keyed on package-lock.json (skips re-fetch each push)

      # B2 — cache puppeteer's downloaded Chromium (~150 MB) keyed on the lockfile,
      # so `npm ci` reuses it across pushes instead of re-downloading the browser
      # the smoke:ci render walk drives. The path is puppeteer's default cache dir.
      - name: Cache puppeteer Chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # `npm run build` invokes `python tools/build.py` (which generates
      # bundle-a.js) — setup-python guarantees a `python` on PATH.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies (npm ci — exact lockfile)
        run: npm ci

      - name: Lint (0 errors + 0 warnings hard gate)
        # `npm run lint` chains `npm run lint:globals` (regenerates the
        # auto-globals list + the parallel TS ambient .d.ts) and
        # `eslint app/src/main/assets/src`. ESLint exits nonzero on ANY
        # error, and --max-warnings 0 means any new warning fails CI.
        # This is the permanent steady state after Q3.3e closed all 59
        # exhaustive-deps warnings (every remaining exception is a
        # documented `eslint-disable-next-line` with a named rationale).
        run: npm run lint -- --max-warnings 0

      - name: Validate data schemas (W9.1 — Format A)
        # `npm run validate:data` runs node tools/validate-schemas.js
        # --strict. Exits nonzero on any Format A schema error (missing
        # field, bad block/segment type, orphaned footnote ref, broken
        # prev/next chain) — the "valid JS but invalid letter" class the
        # syntax/parse checks can't see. Mirrors the pre-commit Step 1b
        # gate; fails fast (cheap) before the heavier typecheck/test/build.
        run: npm run validate:data

      - name: Test + run the data gate (check_balance.py — T6)
        # The front-line black-screen / white-verse gate: esprima JS parse,
        # non-ASCII verse-range dashes, smart-quote JSON delimiters, brace
        # imbalance. T6 adds test_check_balance.py (stdlib unittest) so a
        # regression in the GATE ITSELF is caught — it was previously untested,
        # i.e. it could silently stop catching the bug class it exists for.
        # This step ALSO runs the gate over the real corpus in CI; before this
        # check_balance ran only in the pre-commit hook (bypassable via
        # --no-verify), so en-dash / smart-quote contamination could reach main.
        # esprima (the authoritative JS-syntax check) is pinned in
        # requirements-dev.txt; installing it makes the esprima cases real, not
        # skipped. Cheap + deterministic — runs before the heavier build.
        run: |
          pip install -r requirements-dev.txt
          python -m unittest test_check_balance -v
          python check_balance.py

      - name: Check App() size budget (P11 canary)
        # `npm run check:app-size` fails if app.jsx exceeds its line budget.
        # Catches architectural drift — the composition root re-bloating —
        # which lint/typecheck/test/build don't see (app.jsx crept 797->838
        # unnoticed before this gate). New concerns belong in a hook under
        # src/hooks/, not inlined in App().
        run: npm run check:app-size

      - name: Typecheck (tsc --noEmit, Q4 scope)
        # `npm run typecheck` runs `tsc --noEmit` against tsconfig.json's
        # narrowed scope (utils + stores + hooks). Zero-tolerance from
        # day one — any type error fails CI.
        run: npm run typecheck

      - name: Smoke-lite (Node-runnable structural checks)
        # `node tools/smoke-lite.js` — the bridge between "smoke runs
        # in a browser" and "CI catches data/module regressions." Three
        # checks: globals mirror (gen-eslint-globals diff-check),
        # COLLECTIONS → data-file linkage, module-graph cycle detection.
        run: npm run smoke-lite

      - name: Test (vitest run --coverage, Q5 — typed hooks/stores/utils)
        # `npm run test:coverage` runs vitest with v8 coverage + the
        # coverage thresholds in vitest.config.js. Zero-tolerance: any
        # failing test OR any coverage % below the locked baseline fails
        # CI. Thresholds ratchet UPWARD only — see vitest.config.js
        # comments for the rule. Pre-commit uses the no-coverage `test`
        # script to keep the commit prompt fast (~2s vs ~3s with coverage).
        run: npm run test:coverage

      - name: Build all 4 bundles (tools/build.py + esbuild B/C/D)
        run: npm run build

      - name: Verify committed bundles + SW version + CSP hashes match source
        # After `npm run build` regenerates dist/, the CSP script-src hashes
        # (build:csp → index.html), and the SW CACHE_VERSION (build:sw), the
        # working tree should be byte-identical to the committed copies. Any
        # diff = committed dist/ bundles, index.html (stale CSP hashes), or
        # service-worker.js are stale relative to source. Catches what the hook
        # misses. index.html is included because build:csp may rewrite its CSP.
        run: git diff --exit-code app/src/main/assets/dist/ app/src/main/assets/index.html app/src/main/assets/service-worker.js

      - name: Verify CSP script-src hashes match inline scripts (U10)
        # --check (never writes): fails if index.html's committed script-src
        # sha256 allow-list doesn't match the sha256 of its inline <script>
        # blocks — i.e. an inline script changed without a re-hash, which would
        # hard-block that script under CSP (black-screen class) on the live PWA.
        run: npm run check:csp

      - name: Verify CORPUS_VERSION gate (U3)
        # The lazy corpus bundles (a-bible/matthew/vot) are SW-cached and busted
        # ONLY by a manual CORPUS_VERSION bump — CACHE_VERSION excludes them.
        # This gate (--check, never writes) fails if the committed
        # tools/corpus-version.lock doesn't match the freshly-built corpus
        # bundle hash, i.e. corpus DATA changed without bumping CORPUS_VERSION
        # (which would silently leave existing web clients on stale scripture).
        run: node tools/check-corpus-version.js --check

      - name: Syntax-check every src/ module
        run: |
          # .js — Node's own parser. node --check cannot parse JSX, so
          # this pass is .js only (corpus data + un-converted modules).
          find app/src/main/assets/src -name '*.js' -print0 | xargs -0 -n1 node --check
          # .jsx — esbuild. JSX-aware, emits clean file:line errors;
          # node --check would reject the syntax outright. -r skips the
          # esbuild run on a tree that has no .jsx files yet.
          find app/src/main/assets/src -name '*.jsx' -print0 | xargs -0 -r -n1 npx esbuild --outfile=/dev/null --log-level=warning

      - name: Smoke render walk (headless — U16)
        # smoke-lite (above) is structural-only; this runs the REAL 12-screen
        # render walk + both annotation round-trips (tools/smoke.js) in headless
        # Chrome against the built bundles, catching the black-screen class no
        # other gate sees. Puppeteer's Chrome was fetched by `npm ci`;
        # smoke-ci.js launches it with --no-sandbox (required as the Actions
        # user) + pre-loads the lazy corpora so every screen has its data.
        run: npm run smoke:ci

  kotlin-tests:
    name: Kotlin unit tests (NK1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 (matches gradle/gradle-daemon-jvm.properties)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # Cache the Gradle daemon's caches + wrapper download so subsequent
      # CI runs don't re-download AGP 9.2.1 + Robolectric every time.
      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Run :app:testDebugUnitTest (JUnit 5 + Robolectric)
        # Zero-tolerance gate. Any failing Kotlin test fails CI, mirroring
        # the JS-side vitest discipline. NK1 lands the smoke harness;
        # NK2-NK5 fill it with real test cases.
        run: ./gradlew :app:testDebugUnitTest

      - name: Verify JaCoCo coverage floor (NK6)
        # Ratchet gate on the pure-JVM-tested classes (JsBridge,
        # BoundedLogTree). Floor lives in app/build.gradle.kts and only
        # ever moves up. See the comment block on the jacoco {} extension
        # for why StorageManager + framework-coupled classes are out of
        # scope here (Robolectric sandbox CL bypasses JaCoCo's agent;
        # those tests still RUN, just aren't COUNTED here).
        run: ./gradlew :app:jacocoTestReport :app:jacocoTestCoverageVerification

      - name: Upload test + coverage reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-test-and-coverage-report
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/jacoco/
          retention-days: 14
